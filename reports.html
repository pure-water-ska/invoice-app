<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0d6efd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ใบกำกับ">
<title>รายงาน</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="./vendor/bootstrap.min.css">
<link rel="stylesheet" href="./vendor/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<style>
.rpt-table th  { background:#e9ecef; font-weight:600; white-space:nowrap; font-size:13px; }
.rpt-table td  { font-size:13px; vertical-align:middle; }
.rpt-table tfoot td { background:#f8f9fa; font-weight:700; }
.rpt-table .num { text-align:right; font-variant-numeric:tabular-nums; }
.summary-pill  { border-radius:12px; padding:.9rem 1.2rem; color:#fff; }
.drill-row     { cursor:pointer; }
.drill-row:hover td { background:#eef4ff !important; }

@media print {
  body { background:#fff !important; font-family:'Sarabun','TH Sarabun New',sans-serif; font-size:10pt; }
  .no-print { display:none !important; }
  @page { size: A4; margin: 12mm 10mm; }
  .page-wrap { padding:0 !important; max-width:none !important; }
  #navContainer { display:none !important; }
  .card { box-shadow:none !important; border:1px solid #dee2e6 !important; }
  .print-header { display:block !important; }
  .print-summary { display:flex !important; }
  .rpt-table { width:100%; border-collapse:collapse; }
  .rpt-table th, .rpt-table td { border:1px solid #aaa; padding:3px 5px; }
  .rpt-table th { background:#e0e0e0 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .rpt-table tfoot td { background:#f5f5f5 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .summary-pill { color:#000 !important; border:1px solid #aaa !important; background:#f5f5f5 !important;
                  -webkit-print-color-adjust:exact; print-color-adjust:exact; padding:.3rem .7rem; font-size:9pt; }
}
</style>
</head>
<body>
<div id="navContainer"></div>
<div class="page-wrap">

  <!-- Toolbar -->
  <div class="d-flex justify-content-between align-items-center mb-3 no-print" id="mainToolbar">
    <h5 class="mb-0 fw-bold"><i class="bi bi-bar-chart-line me-2 text-primary"></i>รายงานสรุป</h5>
    <button class="btn btn-outline-primary btn-sm" onclick="doPrint()">
      <i class="bi bi-printer me-1"></i>พิมพ์ / PDF
    </button>
  </div>

  <!-- Filter bar -->
  <div class="card mb-3 no-print filter-bar" id="filterBar">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-6 col-sm-auto">
          <label class="form-label mb-1 fw-semibold small">ตั้งแต่วันที่</label>
          <input type="text" id="filterFrom" class="form-control form-control-sm" placeholder="DD/MM/YYYY">
        </div>
        <div class="col-6 col-sm-auto">
          <label class="form-label mb-1 fw-semibold small">ถึงวันที่</label>
          <input type="text" id="filterTo" class="form-control form-control-sm" placeholder="DD/MM/YYYY">
        </div>
        <div class="col-12 col-sm-auto d-flex gap-1 flex-wrap">
          <button class="btn btn-sm btn-outline-secondary" onclick="setRange('month')">เดือนนี้</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="setRange('last3')">3 เดือน</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="setRange('year')">ปีนี้</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="setRange('all')">ทั้งหมด</button>
          <button class="btn btn-sm btn-primary" onclick="runReport()"><i class="bi bi-funnel me-1"></i>คำนวณ</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Print header (hidden on screen) -->
  <div class="print-header" id="printHeader" style="display:none;margin-bottom:10px">
    <div style="font-size:13pt;font-weight:700" id="printTitle"></div>
    <div style="font-size:9pt;color:#555" id="printSubtitle"></div>
    <hr style="margin:6px 0">
  </div>

  <!-- Summary cards -->
  <div class="print-summary d-flex gap-3 flex-wrap mb-3" id="summaryCards" style="display:none!important"></div>

  <!-- ═══════════ LIST VIEW ═══════════ -->
  <div id="listView">
    <!-- Tabs -->
    <ul class="nav nav-tabs mb-0 no-print" id="reportTabs">
      <li class="nav-item"><button class="nav-link active" onclick="switchTab('month',this)"><i class="bi bi-calendar3 me-1"></i>รายเดือน</button></li>
      <li class="nav-item"><button class="nav-link" onclick="switchTab('year',this)"><i class="bi bi-calendar4-range me-1"></i>รายปี</button></li>
      <li class="nav-item"><button class="nav-link" onclick="switchTab('customer',this)"><i class="bi bi-people me-1"></i>รายลูกค้า</button></li>
      <li class="nav-item"><button class="nav-link" onclick="switchTab('shipping',this)"><i class="bi bi-truck me-1"></i>รายการจัดส่ง</button></li>
      <li class="nav-item"><button class="nav-link" onclick="switchTab('payment',this)"><i class="bi bi-cash-coin me-1"></i>รายการชำระ</button></li>
      <li class="nav-item"><button class="nav-link" onclick="switchTab('brand',this)"><i class="bi bi-tags me-1"></i>รายยี่ห้อ</button></li>
      <li class="nav-item"><button class="nav-link" onclick="switchTab('paybehavior',this)"><i class="bi bi-star-half me-1"></i>รายงานการชำระเงิน</button></li>
    </ul>
    <div class="card" style="border-radius:0 0 12px 12px">
      <div class="card-body p-3" id="reportArea">
        <div class="text-center text-muted py-5">
          <i class="bi bi-bar-chart-line fs-1 d-block mb-2 opacity-25"></i>
          เลือกช่วงวันที่แล้วกด <strong>คำนวณ</strong>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════ DETAIL VIEW ═══════════ -->
  <div id="detailView" style="display:none">
    <div class="d-flex justify-content-between align-items-center mb-2 no-print">
      <div>
        <button class="btn btn-sm btn-outline-secondary me-2" onclick="closeDetail()">
          <i class="bi bi-arrow-left me-1"></i>กลับ
        </button>
        <span class="fw-bold fs-6" id="detailTitle"></span>
        <span class="text-muted ms-2 small" id="detailSubtitle"></span>
      </div>
      <button class="btn btn-outline-primary btn-sm" onclick="doPrint()">
        <i class="bi bi-printer me-1"></i>พิมพ์ / PDF
      </button>
    </div>
    <!-- detail summary pills -->
    <div class="d-flex gap-2 flex-wrap mb-3" id="detailSummary"></div>
    <div class="card">
      <div class="card-body p-3" id="detailArea"></div>
    </div>
  </div>

</div>

<script src="./vendor/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="utils.js?v=1.0.104"></script><script src="db.js?v=1.0.104"></script><script src="auth.js?v=1.0.104"></script><script src="nav.js?v=1.0.104"></script><script src="bedate.js"></script>
<script>
Auth.require();
DB.init();
Nav.render('reports');

const THAI_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
let currentTab = 'month';
let reportData  = null;
let reportGroups = {};   // groupKey -> { label, invoices[], payments[], items[] }
let inDetailView = false;

// ── Init ──────────────────────────────────────────────────────────────────────
let _fpRptFrom, _fpRptTo;

window.addEventListener('DOMContentLoaded', () => {
  _fpRptFrom = BEDate.byId('filterFrom');
  _fpRptTo   = BEDate.byId('filterTo');
  setRange('month');
  DB.ready.then(() => runReport());
});

function setRange(preset) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  let from, to = fmt(now);
  if (preset === 'month') {
    from = fmt(new Date(now.getFullYear(), now.getMonth(), 1));
  } else if (preset === 'last3') {
    const d = new Date(now); d.setMonth(d.getMonth()-2); d.setDate(1); from = fmt(d);
  } else if (preset === 'year') {
    from = fmt(new Date(now.getFullYear(), 0, 1));
  } else {
    from = '2020-01-01'; to = '2099-12-31';
  }
  if (_fpRptFrom) _fpRptFrom.setDate(from); else document.getElementById('filterFrom').value = Utils.isoToBE(from);
  if (_fpRptTo)   _fpRptTo.setDate(to);   else document.getElementById('filterTo').value   = Utils.isoToBE(to);
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('#reportTabs .nav-link').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (reportData) renderTab();
}

// ── Core data builder ─────────────────────────────────────────────────────────
function runReport() {
  closeDetail();
  const fromISO = Utils.parseBEToISO(document.getElementById('filterFrom').value);
  const toISO   = Utils.parseBEToISO(document.getElementById('filterTo').value);
  const from = fromISO ? new Date(fromISO+'T00:00:00') : new Date('2000-01-01');
  const to   = toISO   ? new Date(toISO  +'T23:59:59') : new Date('2099-12-31');

  const allInvoices = DB.getInvoices();
  const allPayments = DB.getPayments();
  const customers   = DB.getCustomers();

  const invByNum = {}, pagesByNum = {};
  allInvoices.forEach(inv => {
    if (!pagesByNum[inv.invoiceNumber]) pagesByNum[inv.invoiceNumber] = [];
    pagesByNum[inv.invoiceNumber].push(inv);
    if (!invByNum[inv.invoiceNumber] || inv.page === 1) invByNum[inv.invoiceNumber] = inv;
  });

  const filtered = Object.values(invByNum).filter(inv => {
    const d = new Date(inv.createdAt);
    return d >= from && d <= to;
  });

  const paymentsInRange = allPayments.filter(p => {
    const d = new Date(p.createdAt);
    return d >= from && d <= to;
  });

  let totalInvoiced=0, totalPaid=0;
  filtered.forEach(inv => {
    totalInvoiced += parseFloat(inv.totalAmount)||0;
    totalPaid     += DB.getInvoicePaidAmount(inv.invoiceNumber);
  });

  renderSummary(filtered.length, totalInvoiced, totalPaid, totalInvoiced-totalPaid);
  reportData = { filtered, pagesByNum, paymentsInRange, customers, from, to };
  renderTab();
}

// ── Summary pills ─────────────────────────────────────────────────────────────
function renderSummary(count, invoiced, paid, unpaid) {
  const el = document.getElementById('summaryCards');
  el.style.removeProperty('display');
  el.innerHTML = `
    <div class="summary-pill" style="background:#0d6efd">
      <div style="font-size:11px;opacity:.85">ใบกำกับ</div>
      <div style="font-size:1.25rem;font-weight:700">${count} ใบ</div>
    </div>
    <div class="summary-pill" style="background:#6f42c1">
      <div style="font-size:11px;opacity:.85">ยอดขายรวม</div>
      <div style="font-size:1.25rem;font-weight:700">฿${fmt(invoiced)}</div>
    </div>
    <div class="summary-pill" style="background:#198754">
      <div style="font-size:11px;opacity:.85">ชำระแล้ว</div>
      <div style="font-size:1.25rem;font-weight:700">฿${fmt(paid)}</div>
    </div>
    <div class="summary-pill" style="background:${unpaid>0?'#dc3545':'#20c997'}">
      <div style="font-size:11px;opacity:.85">ค้างชำระ</div>
      <div style="font-size:1.25rem;font-weight:700">฿${fmt(unpaid)}</div>
    </div>`;
}

// ── Tab router ────────────────────────────────────────────────────────────────
function renderTab() {
  const { filtered, pagesByNum, paymentsInRange, customers } = reportData;
  const area = document.getElementById('reportArea');
  reportGroups = {};
  if (!filtered.length && currentTab !== 'payment') {
    area.innerHTML = '<div class="text-center text-muted py-4">ไม่มีข้อมูลในช่วงเวลาที่เลือก</div>';
    return;
  }
  if      (currentTab==='month')       renderByMonth(filtered, customers, area);
  else if (currentTab==='year')        renderByYear(filtered, customers, area);
  else if (currentTab==='customer')    renderByCustomer(filtered, customers, area);
  else if (currentTab==='shipping')    renderByShipping(filtered, customers, area);
  else if (currentTab==='payment')     renderByPayment(paymentsInRange, customers, area);
  else if (currentTab==='brand')       renderByBrand(filtered, pagesByNum, customers, area);
  else if (currentTab==='paybehavior') renderByPayBehavior(customers, area);
}

// ── Group helper ──────────────────────────────────────────────────────────────
function groupInvoices(filtered, keyFn) {
  const map = {};
  filtered.forEach(inv => {
    const k = keyFn(inv);
    if (!map[k]) map[k] = { count:0, invoiced:0, paid:0 };
    map[k].count++;
    map[k].invoiced += parseFloat(inv.totalAmount)||0;
    map[k].paid     += DB.getInvoicePaidAmount(inv.invoiceNumber);
  });
  return map;
}

function tableHtml(headers, rows, footerRow) {
  const ths = headers.map(h=>`<th class="${h.cls||''}">${h.label}</th>`).join('');
  const trs = rows.map(r=>`<tr class="${r._drill?'drill-row':''}" ${r._drill?`onclick="drillDown('${r._drill}')" title="คลิกเพื่อดูรายละเอียด"`:''}>${
    r.filter((_,i)=>i!==r.length-1 || !r._drill).map((c,i)=>`<td class="${headers[i]?.cls||''}">${c}</td>`).join('')
  }</tr>`).join('');
  const tfr = footerRow?`<tfoot><tr>${footerRow.map((c,i)=>`<td class="${headers[i]?.cls||''}">${c}</td>`).join('')}</tr></tfoot>`:'';
  return `<div class="table-responsive">
    <table class="table table-hover table-bordered rpt-table mb-0">
      <thead><tr>${ths}</tr></thead>
      <tbody>${trs}</tbody>${tfr}
    </table></div>
    <div class="text-muted small mt-1 no-print"><i class="bi bi-hand-index me-1"></i>คลิกที่แถวเพื่อดูรายละเอียด</div>`;
}

// ── 1. รายเดือน ───────────────────────────────────────────────────────────────
function renderByMonth(filtered, customers, area) {
  const map = groupInvoices(filtered, inv=>{
    const d=new Date(inv.createdAt);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  });
  // store groups for drill-down
  filtered.forEach(inv=>{
    const d=new Date(inv.createdAt);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!reportGroups[k]) reportGroups[k]={label:'',invoices:[]};
    reportGroups[k].invoices.push(inv);
  });
  const keys=Object.keys(map).sort().reverse();
  keys.forEach(k=>{
    const [y,m]=k.split('-');
    reportGroups[k].label=`${THAI_MONTHS[parseInt(m)-1]} พ.ศ.${parseInt(y)+543}`;
  });
  const headers=[
    {label:'เดือน'},{label:'จำนวนใบ',cls:'num'},{label:'ยอดขาย (บาท)',cls:'num'},
    {label:'ชำระแล้ว (บาท)',cls:'num'},{label:'ค้างชำระ (บาท)',cls:'num'},{label:'%ชำระ',cls:'num'}
  ];
  let si=0,sp=0,sc=0;
  const rows=keys.map(k=>{
    const [y,m]=k.split('-');
    const g=map[k]; const u=g.invoiced-g.paid; const pct=g.invoiced>0?Math.round(g.paid/g.invoiced*100):0;
    si+=g.invoiced; sp+=g.paid; sc+=g.count;
    const r=[`${THAI_MONTHS[parseInt(m)-1]} ${parseInt(y)+543}`,g.count,fmt(g.invoiced),fmt(g.paid),
      `<span class="${u>0?'text-danger':'text-success'}">${fmt(u)}</span>`,pctBadge(pct)];
    r._drill=k; return r;
  });
  const su=si-sp,sp2=si>0?Math.round(sp/si*100):0;
  area.innerHTML=`<div class="text-muted small mb-2">รายงานรายเดือน — ${keys.length} เดือน</div>`+
    tableHtml(headers,rows,['รวม',sc,fmt(si),fmt(sp),`<span class="${su>0?'text-danger':'text-success'}">${fmt(su)}</span>`,pctBadge(sp2)]);
}

// ── 2. รายปี ──────────────────────────────────────────────────────────────────
function renderByYear(filtered, customers, area) {
  const map=groupInvoices(filtered,inv=>new Date(inv.createdAt).getFullYear().toString());
  filtered.forEach(inv=>{
    const k=new Date(inv.createdAt).getFullYear().toString();
    if(!reportGroups[k]) reportGroups[k]={label:`พ.ศ.${parseInt(k)+543}`,invoices:[]};
    reportGroups[k].invoices.push(inv);
  });
  const keys=Object.keys(map).sort().reverse();
  const headers=[
    {label:'ปี'},{label:'จำนวนใบ',cls:'num'},{label:'ยอดขาย (บาท)',cls:'num'},
    {label:'ชำระแล้ว (บาท)',cls:'num'},{label:'ค้างชำระ (บาท)',cls:'num'},{label:'%ชำระ',cls:'num'}
  ];
  let si=0,sp=0,sc=0;
  const rows=keys.map(k=>{
    const g=map[k]; const u=g.invoiced-g.paid; const pct=g.invoiced>0?Math.round(g.paid/g.invoiced*100):0;
    si+=g.invoiced; sp+=g.paid; sc+=g.count;
    const r=[`พ.ศ. ${parseInt(k)+543}`,g.count,fmt(g.invoiced),fmt(g.paid),
      `<span class="${u>0?'text-danger':'text-success'}">${fmt(u)}</span>`,pctBadge(pct)];
    r._drill=k; return r;
  });
  const su=si-sp,sp2=si>0?Math.round(sp/si*100):0;
  area.innerHTML=`<div class="text-muted small mb-2">รายงานรายปี — ${keys.length} ปี</div>`+
    tableHtml(headers,rows,['รวม',sc,fmt(si),fmt(sp),`<span class="${su>0?'text-danger':'text-success'}">${fmt(su)}</span>`,pctBadge(sp2)]);
}

// ── 3. รายลูกค้า ──────────────────────────────────────────────────────────────
function renderByCustomer(filtered, customers, area) {
  const map=groupInvoices(filtered,inv=>inv.customerId);
  filtered.forEach(inv=>{
    const k=inv.customerId;
    if(!reportGroups[k]) { const c=customers.find(x=>x.id===k); reportGroups[k]={label:c?c.name:'(ไม่ระบุ)',invoices:[]}; }
    reportGroups[k].invoices.push(inv);
  });
  const entries=Object.entries(map).sort((a,b)=>b[1].invoiced-a[1].invoiced);
  const headers=[
    {label:'ลูกค้า'},{label:'ยี่ห้อ'},{label:'จำนวนใบ',cls:'num'},{label:'ยอดขาย (บาท)',cls:'num'},
    {label:'ชำระแล้ว (บาท)',cls:'num'},{label:'ค้างชำระ (บาท)',cls:'num'},{label:'%ชำระ',cls:'num'}
  ];
  let si=0,sp=0,sc=0;
  const rows=entries.map(([k,g])=>{
    const c=customers.find(x=>x.id===k);
    const name=c?c.name:'(ไม่ระบุ)';
    const brands=(c?(Array.isArray(c.brands)&&c.brands.length?c.brands:c.brand?[c.brand]:[]):[]);
    const bHtml=brands.map(b=>`<span class="badge bg-info text-dark">${b}</span>`).join(' ')||'-';
    const u=g.invoiced-g.paid; const pct=g.invoiced>0?Math.round(g.paid/g.invoiced*100):0;
    si+=g.invoiced; sp+=g.paid; sc+=g.count;
    const r=[name,bHtml,g.count,fmt(g.invoiced),fmt(g.paid),
      `<span class="${u>0?'text-danger':'text-success'}">${fmt(u)}</span>`,pctBadge(pct)];
    r._drill=k; return r;
  });
  const su=si-sp,sp2=si>0?Math.round(sp/si*100):0;
  area.innerHTML=`<div class="text-muted small mb-2">รายงานรายลูกค้า — ${entries.length} ราย</div>`+
    tableHtml(headers,rows,['รวม','',sc,fmt(si),fmt(sp),`<span class="${su>0?'text-danger':'text-success'}">${fmt(su)}</span>`,pctBadge(sp2)]);
}

// ── 4. รายวิธีจัดส่ง ──────────────────────────────────────────────────────────
function renderByShipping(filtered, customers, area) {
  const map=groupInvoices(filtered,inv=>inv.shippingMethod||'(ไม่ระบุ)');
  filtered.forEach(inv=>{
    const k=inv.shippingMethod||'(ไม่ระบุ)';
    if(!reportGroups[k]) reportGroups[k]={label:k,invoices:[]};
    reportGroups[k].invoices.push(inv);
  });
  const entries=Object.entries(map).sort((a,b)=>b[1].invoiced-a[1].invoiced);
  const headers=[
    {label:'วิธีจัดส่ง'},{label:'จำนวนใบ',cls:'num'},{label:'ยอดขาย (บาท)',cls:'num'},
    {label:'ชำระแล้ว (บาท)',cls:'num'},{label:'ค้างชำระ (บาท)',cls:'num'},{label:'%ชำระ',cls:'num'}
  ];
  let si=0,sp=0,sc=0;
  const rows=entries.map(([k,g])=>{
    const u=g.invoiced-g.paid; const pct=g.invoiced>0?Math.round(g.paid/g.invoiced*100):0;
    si+=g.invoiced; sp+=g.paid; sc+=g.count;
    const r=[k,g.count,fmt(g.invoiced),fmt(g.paid),
      `<span class="${u>0?'text-danger':'text-success'}">${fmt(u)}</span>`,pctBadge(pct)];
    r._drill=k; return r;
  });
  const su=si-sp,sp2=si>0?Math.round(sp/si*100):0;
  area.innerHTML=`<div class="text-muted small mb-2">รายงานรายวิธีจัดส่ง — ${entries.length} ประเภท</div>`+
    tableHtml(headers,rows,['รวม',sc,fmt(si),fmt(sp),`<span class="${su>0?'text-danger':'text-success'}">${fmt(su)}</span>`,pctBadge(sp2)]);
}

// ── 5. รายวิธีชำระเงิน ────────────────────────────────────────────────────────
function renderByPayment(paymentsInRange, customers, area) {
  if(!paymentsInRange.length){
    area.innerHTML='<div class="text-center text-muted py-4">ไม่มีรายการชำระในช่วงเวลาที่เลือก</div>';
    return;
  }
  const map={};
  paymentsInRange.forEach(p=>{
    const k=p.method||'(ไม่ระบุ)';
    if(!map[k]) map[k]={count:0,amount:0};
    map[k].count++; map[k].amount+=parseFloat(p.amount)||0;
    if(!reportGroups[k]) reportGroups[k]={label:k,payments:[]};
    reportGroups[k].payments.push(p);
  });
  const entries=Object.entries(map).sort((a,b)=>b[1].amount-a[1].amount);
  const grand=Object.values(map).reduce((s,v)=>s+v.amount,0);
  const headers=[
    {label:'วิธีชำระเงิน'},{label:'จำนวนครั้ง',cls:'num'},{label:'ยอดรวม (บาท)',cls:'num'},{label:'%ของทั้งหมด',cls:'num'}
  ];
  let sc=0;
  const rows=entries.map(([k,g])=>{
    sc+=g.count;
    const pct=grand>0?Math.round(g.amount/grand*100):0;
    const r=[k,g.count,fmt(g.amount),pctBadge(pct)];
    r._drill=k; return r;
  });
  area.innerHTML=`<div class="text-muted small mb-2">รายงานรายวิธีชำระเงิน — ${entries.length} ประเภท</div>`+
    tableHtml(headers,rows,['รวม',sc,fmt(grand),'']);
}

// ── 6. รายยี่ห้อ ──────────────────────────────────────────────────────────────
function renderByBrand(filtered, pagesByNum, customers, area) {
  const filteredNums=new Set(filtered.map(i=>i.invoiceNumber));
  const brandItems={}; // brand -> [{inv, item}]
  filteredNums.forEach(num=>{
    const inv=filtered.find(i=>i.invoiceNumber===num);
    (pagesByNum[num]||[]).forEach(page=>{
      (page.items||[]).forEach(item=>{
        const k=item.brand||'(ไม่มียี่ห้อ)';
        if(!brandItems[k]) brandItems[k]=[];
        brandItems[k].push({inv,item});
      });
    });
  });
  const map={};
  Object.entries(brandItems).forEach(([k,arr])=>{
    map[k]={items:arr.length,invoiced:arr.reduce((s,{item})=>s+(parseFloat(item.total)||0),0),
      qty:arr.reduce((s,{item})=>s+(parseFloat(item.qty)||0)*(parseFloat(item.unitSize)||0)+(parseFloat(item.remainder)||0),0)};
    reportGroups[k]={label:k,brandItems:arr};
  });
  const entries=Object.entries(map).sort((a,b)=>b[1].invoiced-a[1].invoiced);
  if(!entries.length){area.innerHTML='<div class="text-center text-muted py-4">ไม่มีข้อมูล</div>';return;}
  const grand=entries.reduce((s,[,v])=>s+v.invoiced,0);
  const headers=[
    {label:'ยี่ห้อ'},{label:'รายการ',cls:'num'},{label:'จำนวน (ชิ้น)',cls:'num'},
    {label:'ยอดขาย (บาท)',cls:'num'},{label:'%ของทั้งหมด',cls:'num'}
  ];
  let si=0,sq=0,sc=0;
  const rows=entries.map(([k,g])=>{
    sc+=g.items; si+=g.invoiced; sq+=g.qty;
    const pct=grand>0?Math.round(g.invoiced/grand*100):0;
    const r=[k,g.items,fmt(g.qty),fmt(g.invoiced),pctBadge(pct)];
    r._drill=k; return r;
  });
  area.innerHTML=`<div class="text-muted small mb-2">รายงานรายยี่ห้อ — ${entries.length} ยี่ห้อ</div>`+
    tableHtml(headers,rows,['รวม',sc,fmt(sq),fmt(si),'']);
}

// ── 7. รายงานพฤติกรรมการชำระเงิน ─────────────────────────────────────────────
function renderByPayBehavior(customers, area) {
  const allInvoices = DB.getInvoices();
  const allPayments = DB.getPayments();

  // Build invoice map: invoiceNumber -> first-page invoice record
  const invByNum = {};
  allInvoices.forEach(inv => {
    if (!invByNum[inv.invoiceNumber] || inv.page === 1) invByNum[inv.invoiceNumber] = inv;
  });

  // Only customers with maxDays > 0
  const eligible = customers.filter(c => c.payTerms && c.payTerms.maxDays > 0);
  if (!eligible.length) {
    area.innerHTML = '<div class="text-center text-muted py-4"><i class="bi bi-info-circle me-1"></i>ไม่มีลูกค้าที่กำหนดเงื่อนไข <strong>ค้างนานไม่เกิน (วัน)</strong></div>';
    return;
  }

  const rows = [];
  eligible.forEach(c => {
    const maxDays = c.payTerms.maxDays;
    // All payments for this customer
    const custPayments = allPayments.filter(p => p.customerId === c.id);
    if (!custPayments.length) return;

    // Group payments by invoiceNumber to get one record per bill paid
    const paidBills = [...new Set(custPayments.map(p => p.invoiceNumber))];
    let onTime = 0, late = 0, totalLateDays = 0;

    paidBills.forEach(num => {
      const inv = invByNum[num];
      if (!inv) return;
      const invoiceDate = new Date(inv.createdAt).getTime();
      // Use latest payment date for this invoice
      const billPayments = custPayments.filter(p => p.invoiceNumber === num);
      const lastPaidAt = Math.max(...billPayments.map(p => new Date(p.paidAt || p.createdAt).getTime()));
      const daysToPayment = Math.floor((lastPaidAt - invoiceDate) / 86400000);
      if (daysToPayment > maxDays) {
        late++;
        totalLateDays += (daysToPayment - maxDays);
      } else {
        onTime++;
      }
    });

    const total = onTime + late;
    if (!total) return;
    const score = Math.round(100 * onTime / total);
    const avgLate = late > 0 ? Math.round(totalLateDays / late) : 0;
    const grade = score >= 90 ? 'A' : score >= 70 ? 'B' : score >= 50 ? 'C' : 'D';
    rows.push({ name: c.name, total, onTime, late, avgLate, score, grade });
  });

  if (!rows.length) {
    area.innerHTML = '<div class="text-center text-muted py-4">ไม่มีข้อมูลการชำระเงินสำหรับลูกค้าที่กำหนดเงื่อนไข</div>';
    return;
  }

  // Sort worst first (ascending score)
  rows.sort((a, b) => a.score - b.score);

  const gradeColors = { A: 'success', B: 'primary', C: 'warning', D: 'danger' };
  const gradeTextColors = { A: 'text-white', B: 'text-white', C: 'text-dark', D: 'text-white' };

  const aCount = rows.filter(r => r.grade === 'A').length;
  const avgScore = rows.length ? Math.round(rows.reduce((s, r) => s + r.score, 0) / rows.length) : 0;
  const aPct = rows.length ? Math.round(aCount / rows.length * 100) : 0;

  const summaryHtml = `
    <div class="d-flex gap-3 flex-wrap mb-3">
      <div class="summary-pill" style="background:#0d6efd">
        <div style="font-size:11px;opacity:.85">ลูกค้าทั้งหมด</div>
        <div style="font-size:1.25rem;font-weight:700">${rows.length} ราย</div>
      </div>
      <div class="summary-pill" style="background:#6f42c1">
        <div style="font-size:11px;opacity:.85">คะแนนเฉลี่ย</div>
        <div style="font-size:1.25rem;font-weight:700">${avgScore} / 100</div>
      </div>
      <div class="summary-pill" style="background:#198754">
        <div style="font-size:11px;opacity:.85">เกรด A (ชำระตรงเวลา)</div>
        <div style="font-size:1.25rem;font-weight:700">${aCount} ราย (${aPct}%)</div>
      </div>
    </div>`;

  const tableRows = rows.map((r, i) => {
    const gc = gradeColors[r.grade];
    const gtc = gradeTextColors[r.grade];
    return `<tr>
      <td class="text-muted">${i + 1}</td>
      <td class="fw-semibold">${r.name}</td>
      <td class="text-center">${r.total}</td>
      <td class="text-center text-success fw-semibold">${r.onTime}</td>
      <td class="text-center text-danger fw-semibold">${r.late}</td>
      <td class="text-center">${r.avgLate > 0 ? r.avgLate + ' วัน' : '-'}</td>
      <td class="text-center">
        <div class="progress" style="height:16px;min-width:80px">
          <div class="progress-bar bg-${gc}" style="width:${r.score}%">${r.score}</div>
        </div>
      </td>
      <td class="text-center"><span class="badge bg-${gc} ${gtc} fs-6 px-2">${r.grade}</span></td>
    </tr>`;
  }).join('');

  area.innerHTML = `
    <div class="text-muted small mb-2">รายงานพฤติกรรมการชำระเงิน — เรียงจากแย่ไปดี — เฉพาะลูกค้าที่มีเงื่อนไขวันชำระ</div>
    ${summaryHtml}
    <div class="table-responsive">
      <table class="table table-hover table-bordered rpt-table mb-0">
        <thead><tr>
          <th>#</th>
          <th>ชื่อลูกค้า</th>
          <th class="text-center">จำนวนบิลทั้งหมด</th>
          <th class="text-center">ชำระตรงเวลา (บิล)</th>
          <th class="text-center">ชำระล่าช้า (บิล)</th>
          <th class="text-center">ล่าช้าเฉลี่ย (วัน)</th>
          <th class="text-center" style="min-width:120px">คะแนน (0-100)</th>
          <th class="text-center">เกรด</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div class="text-muted small mt-2"><i class="bi bi-info-circle me-1"></i>เกรด: <span class="badge bg-success">A</span> 90+ &nbsp; <span class="badge bg-primary">B</span> 70-89 &nbsp; <span class="badge bg-warning text-dark">C</span> 50-69 &nbsp; <span class="badge bg-danger">D</span> &lt;50</div>`;
}

// ── Drill-down ────────────────────────────────────────────────────────────────
function drillDown(key) {
  const group = reportGroups[key];
  if (!group) return;
  inDetailView = true;

  document.getElementById('listView').style.display   = 'none';
  document.getElementById('detailView').style.display = 'block';
  document.getElementById('filterBar').style.display  = 'none';
  document.getElementById('summaryCards').style.display = 'none';

  document.getElementById('detailTitle').textContent = group.label;

  if (group.invoices) renderDetailInvoices(group);
  else if (group.payments) renderDetailPayments(group);
  else if (group.brandItems) renderDetailBrandItems(group);
}

function closeDetail() {
  inDetailView = false;
  document.getElementById('listView').style.display   = 'block';
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('filterBar').style.display  = 'block';
  document.getElementById('summaryCards').style.removeProperty('display');
  document.getElementById('detailSummary').innerHTML  = '';
}

// Detail: invoices table
function renderDetailInvoices(group) {
  const { invoices, label } = group;
  const customers = reportData.customers;
  const sorted = [...invoices].sort((a,b) => new Date(a.createdAt)-new Date(b.createdAt));

  let totalInv=0, totalPaid=0;
  sorted.forEach(inv => { totalInv+=parseFloat(inv.totalAmount)||0; totalPaid+=DB.getInvoicePaidAmount(inv.invoiceNumber); });
  const unpaid = totalInv-totalPaid;

  document.getElementById('detailSubtitle').textContent = `${sorted.length} ใบกำกับ`;
  document.getElementById('detailSummary').innerHTML = `
    <span class="badge bg-primary fs-6 px-3 py-2">${sorted.length} ใบ</span>
    <span class="badge bg-purple fs-6 px-3 py-2" style="background:#6f42c1">ยอดขาย ฿${fmt(totalInv)}</span>
    <span class="badge bg-success fs-6 px-3 py-2">ชำระแล้ว ฿${fmt(totalPaid)}</span>
    <span class="badge fs-6 px-3 py-2" style="background:${unpaid>0?'#dc3545':'#20c997'}">ค้างชำระ ฿${fmt(unpaid)}</span>`;

  const rows = sorted.map(inv => {
    const cust = customers.find(c=>c.id===inv.customerId);
    const paid = DB.getInvoicePaidAmount(inv.invoiceNumber);
    const u    = (parseFloat(inv.totalAmount)||0) - paid;
    const statusBadge = u <= 0
      ? '<span class="badge bg-success">ชำระครบ</span>'
      : `<span class="badge bg-danger">ค้าง ${fmt(u)}</span>`;
    const brands = (inv.items||[]).map(i=>i.brand).filter(Boolean);
    const uniqBrands = [...new Set(brands)].map(b=>`<span class="badge bg-info text-dark">${b}</span>`).join(' ');
    return `<tr>
      <td><a href="invoice-create.html?view=${inv.invoiceNumber}" target="_blank" class="fw-semibold text-decoration-none">${inv.invoiceNumber}</a></td>
      <td>${Utils.formatDateTH(inv.createdAt)}</td>
      <td>${cust?cust.name:'-'}</td>
      <td>${inv.shippingMethod||'-'}</td>
      <td>${uniqBrands||'-'}</td>
      <td class="text-end">${fmt(inv.totalAmount||0)}</td>
      <td class="text-end text-success">${fmt(paid)}</td>
      <td class="text-end">${statusBadge}</td>
    </tr>`;
  }).join('');

  const tfoot=`<tfoot><tr>
    <td colspan="5" class="text-end fw-bold">รวม</td>
    <td class="text-end fw-bold">${fmt(totalInv)}</td>
    <td class="text-end fw-bold text-success">${fmt(totalPaid)}</td>
    <td class="text-end fw-bold ${unpaid>0?'text-danger':'text-success'}">${fmt(unpaid)}</td>
  </tr></tfoot>`;

  document.getElementById('detailArea').innerHTML = `
    <div class="table-responsive">
    <table class="table table-hover table-bordered rpt-table mb-0">
      <thead><tr>
        <th>เลขที่</th><th>วันที่</th><th>ลูกค้า</th><th>จัดส่ง</th><th>ยี่ห้อ</th>
        <th class="num">ยอดรวม</th><th class="num">ชำระแล้ว</th><th class="num">สถานะ</th>
      </tr></thead>
      <tbody>${rows}</tbody>${tfoot}
    </table></div>`;
}

// ── Print ─────────────────────────────────────────────────────────────────────
function doPrint() {
  const cfg = DB.getSettings();
  const fromVal = document.getElementById('filterFrom').value;
  const toVal   = document.getElementById('filterTo').value;
  const tabLabels = { month:'รายเดือน', year:'รายปี', customer:'รายลูกค้า',
                      shipping:'รายการจัดส่ง', payment:'รายการชำระเงิน', brand:'รายยี่ห้อ' };

  const ph = document.getElementById('printHeader');
  if (inDetailView) {
    const title = document.getElementById('detailTitle').textContent;
    document.getElementById('printTitle').textContent   = `รายงาน${tabLabels[currentTab]} — ${title}`;
    document.getElementById('printSubtitle').textContent =
      `${cfg.companyName||''} | ช่วง: ${fromVal||'ทั้งหมด'} ถึง ${toVal||'ทั้งหมด'} | พิมพ์: ${Utils.formatDateTimeTH(new Date().toISOString())}`;
  } else {
    document.getElementById('printTitle').textContent   = `รายงานสรุป — ${tabLabels[currentTab]}`;
    document.getElementById('printSubtitle').textContent =
      `${cfg.companyName||''} | ช่วง: ${fromVal||'ทั้งหมด'} ถึง ${toVal||'ทั้งหมด'} | พิมพ์: ${Utils.formatDateTimeTH(new Date().toISOString())}`;
  }
  ph.style.display = 'block';
  window.print();
  ph.style.display = 'none';
}

// ── Util ──────────────────────────────────────────────────────────────────────
function fmt(n) { return Utils.formatNumber(n); }
function pctBadge(pct) {
  const cls = pct>=100?'bg-success':pct>=50?'bg-warning text-dark':'bg-danger';
  return `<span class="badge ${cls}">${pct}%</span>`;
}
