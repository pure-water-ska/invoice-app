<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0d6efd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ใบกำกับ">
<title>ฉลากขวด</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.tl-group        { margin-bottom: 2rem; }
.tl-group-header { font-weight: 700; font-size: 15px; color: #0d6efd;
                   border-bottom: 2px solid #0d6efd; padding-bottom: 4px; margin-bottom: 1rem; }
.tl-wrap   { position: relative; padding-left: 28px; }
.tl-wrap::before {
  content:''; position:absolute; left:9px; top:0; bottom:0;
  width:2px; background:#dee2e6;
}
.tl-item { position:relative; margin-bottom:1rem; }
.tl-dot  { position:absolute; left:-24px; top:5px;
           width:14px; height:14px; border-radius:50%;
           border:2px solid #fff; box-shadow:0 0 0 2px currentColor; }
.tl-card { background:#fff; border:1px solid #dee2e6; border-radius:10px;
           padding:.6rem .9rem; box-shadow:0 1px 4px rgba(0,0,0,.06); transition:box-shadow .15s; }
.tl-card:hover { box-shadow:0 3px 10px rgba(0,0,0,.12); }
.tl-brand { display:inline-block; font-weight:700; font-size:13px;
            background:#e0f2fe; color:#0369a1;
            border-radius:20px; padding:1px 10px; }
.tl-size  { display:inline-block; font-size:12px; background:#f0fdf4; color:#166634;
            border:1px solid #bbf7d0; border-radius:20px; padding:1px 9px; }
.tl-note  { font-size:12px; color:#555; margin-top:3px; }
.tl-by    { font-size:11px; color:#aaa; }
.tl-date  { font-size:11px; white-space:nowrap; }
mark { background:#fff3cd; padding:0 2px; border-radius:2px; }
.tl-img { max-height:90px; border-radius:6px; border:1px solid #dee2e6; cursor:zoom-in; object-fit:cover; }
.img-fullscreen { position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;
                  display:flex;align-items:center;justify-content:center;cursor:zoom-out; }
.img-fullscreen img { max-width:95vw;max-height:95vh;border-radius:8px; }

@media print {
  .no-print { display:none !important; }
  @page { size:A4; margin:12mm 10mm; }
  body { font-size:10pt; }
  #navContainer { display:none !important; }
  .tl-card { border:1px solid #aaa !important; box-shadow:none !important; }
  .tl-wrap::before { background:#aaa; }
}
</style>
</head>
<body>
<div id="navContainer"></div>
<div class="page-wrap">

  <div class="d-flex justify-content-between align-items-center mb-3 no-print">
    <h5 class="mb-0 fw-bold"><i class="bi bi-tag me-2 text-primary"></i>ฉลากขวด</h5>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-primary" onclick="window.print()">
        <i class="bi bi-printer me-1"></i>พิมพ์
      </button>
      <button class="btn btn-sm btn-primary" onclick="openModal()">
        <i class="bi bi-plus-lg me-1"></i>เพิ่มฉลากขวด
      </button>
    </div>
  </div>

  <div id="alertBox" class="mb-2"></div>

  <!-- Filter bar -->
  <div class="card mb-3 no-print">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="searchQ" class="form-control"
                   placeholder="ค้นหา ลูกค้า / ยี่ห้อ / ขนาด..." oninput="render()">
          </div>
        </div>
        <div class="col-md-3">
          <select id="filterCust" class="form-select form-select-sm" onchange="render()">
            <option value="">— ลูกค้าทั้งหมด —</option>
          </select>
        </div>
        <div class="col-md-2">
          <input type="date" id="filterFrom" class="form-control form-control-sm"
                 onchange="render()" title="ตั้งแต่วันที่">
        </div>
        <div class="col-md-2">
          <input type="date" id="filterTo" class="form-control form-control-sm"
                 onchange="render()" title="ถึงวันที่">
        </div>
        <div class="col-md-2">
          <select id="groupBy" class="form-select form-select-sm" onchange="render()">
            <option value="customer">จัดกลุ่มตามลูกค้า</option>
            <option value="date">จัดกลุ่มตามเดือน</option>
            <option value="brand">จัดกลุ่มตามยี่ห้อ</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div id="tlOutput"></div>

</div>

<!-- Add / Edit Modal -->
<div class="modal fade" id="verModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">เพิ่มฉลากขวด</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalAlert"></div>
        <input type="hidden" id="verId">
        <div class="row g-3">

          <div class="col-12">
            <label class="form-label fw-semibold">ลูกค้า <span class="text-danger">*</span></label>
            <select id="vCust" class="form-select" onchange="onVerCustChange()">
              <option value="">— เลือกลูกค้า —</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">ยี่ห้อ <span class="text-danger">*</span></label>
            <input type="text" id="vBrand" class="form-control" list="vBrandDatalist"
                   placeholder="เลือกหรือพิมพ์ยี่ห้อ" autocomplete="off">
            <datalist id="vBrandDatalist"></datalist>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">ขนาด / สินค้า <span class="text-danger">*</span></label>
            <input type="text" id="vSize" class="form-control" list="vSizeDatalist"
                   placeholder="เลือกหรือพิมพ์ขนาด" autocomplete="off">
            <datalist id="vSizeDatalist"></datalist>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">สีฉลาก</label>
            <div class="input-group">
              <input type="color" id="vColor" class="form-control form-control-color" value="#0d6efd" style="width:48px" oninput="document.getElementById('vColorText').value=this.value">
              <input type="text" id="vColorText" class="form-control" value="#0d6efd" placeholder="#0d6efd"
                     oninput="syncVerColor(this.value)">
              <button class="btn btn-outline-secondary" type="button" onclick="resetVerColor()" title="รีเซ็ตสี">
                <i class="bi bi-arrow-counterclockwise"></i>
              </button>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">วันที่ <span class="text-danger">*</span></label>
            <input type="date" id="vDate" class="form-control">
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">หมายเหตุ</label>
            <textarea id="vNote" class="form-control" rows="2"
                      placeholder="เช่น เปลี่ยนจากยี่ห้อเดิม, ออกแบบใหม่..."></textarea>
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold"><i class="bi bi-image me-1 text-primary"></i>รูปฉลากขวด</label>
            <input type="file" id="vImage" class="form-control" accept="image/*"
                   onchange="loadVerImage(this)">
            <div id="vImagePreview" class="mt-2"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
        <button class="btn btn-primary" onclick="saveVersion()">
          <i class="bi bi-save me-1"></i>บันทึก
        </button>
      </div>
    </div>
  </div>
</div>

<div id="lightbox" class="img-fullscreen" style="display:none" onclick="this.style.display='none'">
  <img id="lightboxImg" src="">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script><script src="db.js"></script><script src="auth.js"></script><script src="nav.js"></script>
<script>
const session = Auth.require();
DB.init();
Nav.render('versions');

let verModal;
let verImageB64 = '';

window.addEventListener('DOMContentLoaded', () => {
  verModal = new bootstrap.Modal(document.getElementById('verModal'));

  const custs = DB.getCustomers().sort((a,b) => a.name.localeCompare(b.name,'th'));
  custs.forEach(c => {
    document.getElementById('filterCust').innerHTML += `<option value="${c.id}">${c.name}</option>`;
    document.getElementById('vCust').innerHTML      += `<option value="${c.id}">${c.name}</option>`;
  });

  document.getElementById('vSizeDatalist').innerHTML =
    DB.getProducts().map(p => `<option value="${p.name}">`).join('');

  render();
});

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const q      = document.getElementById('searchQ').value.trim().toLowerCase();
  const custF  = document.getElementById('filterCust').value;
  const from   = document.getElementById('filterFrom').value;
  const to     = document.getElementById('filterTo').value;
  const groupBy = document.getElementById('groupBy').value;
  const customers = DB.getCustomers();

  let list = DB.getVersions().filter(v => {
    const cust  = customers.find(c => c.id === v.customerId);
    const name  = (cust?.name||'').toLowerCase();
    const brand = (v.brand || (v.brands||[])[0] || '').toLowerCase();
    const size  = (v.size  || (v.sizes||[])[0]  || '').toLowerCase();
    const d     = v.date || '';
    if (q && !name.includes(q) && !brand.includes(q) && !size.includes(q) && !(v.note||'').toLowerCase().includes(q)) return false;
    if (custF && v.customerId !== custF) return false;
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    return true;
  });

  list.sort((a,b) => (b.date||'').localeCompare(a.date||''));

  if (!list.length) {
    document.getElementById('tlOutput').innerHTML = `
      <div class="text-center text-muted py-5">
        <i class="bi bi-tag fs-1 d-block mb-2 opacity-25"></i>
        ${q||custF ? 'ไม่พบรายการที่ตรงกับการค้นหา'
                   : 'ยังไม่มีข้อมูล กดปุ่ม <strong>+ เพิ่มฉลากขวด</strong>'}
      </div>`;
    return;
  }

  // Group
  const groups = {};
  list.forEach(v => {
    const cust  = customers.find(c => c.id === v.customerId);
    const brand = v.brand || (v.brands||[])[0] || '(ไม่ระบุยี่ห้อ)';
    let k;
    if      (groupBy === 'customer') k = cust?.name || '(ไม่ระบุ)';
    else if (groupBy === 'brand')    k = brand;
    else {
      const [y,m] = (v.date||'').split('-');
      k = (y&&m) ? `${Utils.THAI_MONTHS_SHORT[parseInt(m)-1]} ${parseInt(y)+543}` : '(ไม่ระบุวันที่)';
    }
    if (!groups[k]) groups[k] = [];
    groups[k].push(v);
  });

  const icon = { customer:'person-fill', brand:'tag-fill', date:'calendar3' };
  let html = '';

  Object.entries(groups).forEach(([gLabel, items]) => {
    const dotColor = strColor(gLabel);
    html += `<div class="tl-group">
      <div class="tl-group-header">
        <i class="bi bi-${icon[groupBy]} me-1"></i>${hl(gLabel,q)}
        <span class="badge bg-primary ms-1 fw-normal" style="font-size:11px">${items.length}</span>
      </div>
      <div class="tl-wrap">`;

    items.forEach(v => {
      const cust      = customers.find(c => c.id === v.customerId);
      const brand     = v.brand || (v.brands||[])[0] || '';
      const size      = v.size  || (v.sizes||[])[0]  || '';
      const dateTH    = v.date ? Utils.formatDateTH(v.date) : '-';
      const labelColor = v.color || dotColor;

      html += `
        <div class="tl-item">
          <span class="tl-dot" style="color:${labelColor};background:${labelColor}"></span>
          <div class="tl-card" style="border-left:4px solid ${labelColor}">
            <div class="d-flex justify-content-between align-items-start gap-2">
              <div class="flex-grow-1">
                ${groupBy !== 'customer'
                  ? `<div class="fw-semibold mb-1" style="font-size:13px">
                       <i class="bi bi-person me-1 text-muted"></i>${hl(cust?.name||'-',q)}
                     </div>` : ''}
                <div class="d-flex flex-wrap gap-2 align-items-center mb-1">
                  ${brand ? `<span class="tl-brand" style="background:${labelColor}22;color:${labelColor};border-color:${labelColor}66">${hl(brand,q)}</span>` : ''}
                  ${size  ? `<span class="tl-size"><i class="bi bi-box me-1"></i>${hl(size,q)}</span>` : ''}
                </div>
                ${v.note ? `<div class="tl-note"><i class="bi bi-chat-left-text me-1 opacity-50"></i>${hl(v.note,q)}</div>` : ''}
                ${v.image ? `<div class="mt-2"><img src="${v.image}" class="tl-img" onclick="openLightboxById('${v.id}')"></div>` : ''}
                <div class="tl-by mt-1">บันทึกโดย ${v.createdBy||'-'} · ${Utils.formatDateTimeTH(v.createdAt)}</div>
              </div>
              <div class="d-flex flex-column align-items-end gap-1">
                <span class="badge bg-light text-dark border tl-date">
                  <i class="bi bi-calendar3 me-1"></i>${dateTH}
                </span>
                <div class="d-flex gap-1 no-print">
                  <a class="btn btn-sm btn-outline-success py-0 px-1" title="สร้างใบกำกับสำหรับลูกค้านี้"
                     href="invoice-create.html?cust=${v.customerId}">
                    <i class="bi bi-plus-circle" style="font-size:11px"></i>
                  </a>
                  <button class="btn btn-sm btn-outline-secondary py-0 px-1" onclick="openModal('${v.id}')">
                    <i class="bi bi-pencil" style="font-size:11px"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="deleteVersion('${v.id}')">
                    <i class="bi bi-trash" style="font-size:11px"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('tlOutput').innerHTML = html;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById('verId').value   = id || '';
  document.getElementById('modalTitle').textContent = id ? 'แก้ไขฉลากขวด' : 'เพิ่มฉลากขวด';
  document.getElementById('modalAlert').innerHTML   = '';
  document.getElementById('vBrand').value = '';
  document.getElementById('vSize').value  = '';
  document.getElementById('vNote').value  = '';
  document.getElementById('vImage').value = '';
  document.getElementById('vImagePreview').innerHTML = '';
  verImageB64 = '';
  _setVerColor('#0d6efd');

  if (id) {
    const v = DB.getVersions().find(x => x.id === id);
    if (v) {
      document.getElementById('vCust').value  = v.customerId || '';
      document.getElementById('vDate').value  = v.date || '';
      document.getElementById('vBrand').value = v.brand || (v.brands||[])[0] || '';
      document.getElementById('vSize').value  = v.size  || (v.sizes||[])[0]  || '';
      document.getElementById('vNote').value  = v.note  || '';
      _setVerColor(v.color || '#0d6efd');
      if (v.image) {
        verImageB64 = v.image;
        document.getElementById('vImagePreview').innerHTML = imgPreviewHtml(v.image);
      }
      updateBrandDatalist(v.customerId);
    }
  } else {
    document.getElementById('vCust').value = '';
    document.getElementById('vDate').value = Utils.todayInputValue();
    updateBrandDatalist('');
  }
  verModal.show();
}

function onVerCustChange() {
  updateBrandDatalist(document.getElementById('vCust').value);
}

// Pull brands from customer record (shared data)
function updateBrandDatalist(custId) {
  const cust = custId ? DB.getCustomerById(custId) : null;
  const brands = cust
    ? (Array.isArray(cust.brands) && cust.brands.length ? cust.brands : cust.brand ? [cust.brand] : [])
    : [];
  document.getElementById('vBrandDatalist').innerHTML =
    brands.map(b => `<option value="${b}">`).join('');
}

// ── Save / Delete ─────────────────────────────────────────────────────────────
function saveVersion() {
  const custId = document.getElementById('vCust').value;
  const brand  = document.getElementById('vBrand').value.trim();
  const size   = document.getElementById('vSize').value.trim();
  const date   = document.getElementById('vDate').value;
  if (!custId) { Utils.showAlert('กรุณาเลือกลูกค้า',   'warning','modalAlert'); return; }
  if (!brand)  { Utils.showAlert('กรุณาระบุยี่ห้อ',    'warning','modalAlert'); return; }
  if (!size)   { Utils.showAlert('กรุณาระบุขนาด/สินค้า','warning','modalAlert'); return; }
  if (!date)   { Utils.showAlert('กรุณาระบุวันที่',     'warning','modalAlert'); return; }

  const id   = document.getElementById('verId').value;
  const cust = DB.getCustomerById(custId);
  const data = {
    customerId: custId,
    brand,
    size,
    date,
    color: document.getElementById('vColorText').value.trim() || document.getElementById('vColor').value || '#0d6efd',
    note:  document.getElementById('vNote').value.trim(),
    image: verImageB64,
    createdBy: session.name,
    createdByUser: session.username
  };

  if (id) {
    DB.updateVersion(id, data);
  } else {
    DB.addVersion({ id: Utils.uuid(), ...data, createdAt: new Date().toISOString() });
  }

  // Sync brand → customer brands list (shared data)
  if (cust) {
    const existing = Array.isArray(cust.brands) && cust.brands.length
      ? cust.brands : cust.brand ? [cust.brand] : [];
    if (!existing.includes(brand)) {
      const updated = [...existing, brand];
      DB.updateCustomer(custId, { brands: updated, brand: updated[0] });
    }
  }

  DB.logActivity(session.userId, session.username, id ? 'แก้ไขฉลากขวด' : 'เพิ่มฉลากขวด',
    { customer: cust?.name, brand, size });
  Utils.showAlert('บันทึกสำเร็จ');
  verModal.hide();
  render();
}

function deleteVersion(id) {
  if (!confirm('ลบรายการนี้ใช่หรือไม่?')) return;
  DB.deleteVersion(id);
  DB.logActivity(session.userId, session.username, 'ลบฉลากขวด', {});
  Utils.showAlert('ลบแล้ว','info');
  render();
}

// ── Image ─────────────────────────────────────────────────────────────────────
function loadVerImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    verImageB64 = e.target.result;
    document.getElementById('vImagePreview').innerHTML = imgPreviewHtml(verImageB64);
  };
  reader.readAsDataURL(file);
}

function imgPreviewHtml(src) {
  return `<div class="d-flex align-items-start gap-2">
    <img src="${src}" class="img-thumbnail" style="max-height:160px;cursor:zoom-in" onclick="openLightbox('${src.substring(0,30)}')">
    <button class="btn btn-sm btn-outline-danger" onclick="clearVerImage()"><i class="bi bi-x-lg"></i></button>
  </div>`;
}

function clearVerImage() {
  verImageB64 = '';
  document.getElementById('vImage').value = '';
  document.getElementById('vImagePreview').innerHTML = '';
}

function openLightbox(src) {
  // src might be truncated key — get full from preview img
  const previewImg = document.querySelector('#vImagePreview img');
  const fullSrc = previewImg ? previewImg.src : src;
  document.getElementById('lightboxImg').src = fullSrc;
  document.getElementById('lightbox').style.display = 'flex';
}

function openLightboxSrc(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}

function openLightboxById(id) {
  const v = DB.getVersions().find(x => x.id === id);
  if (v?.image) openLightboxSrc(v.image);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function hl(text, q) {
  if (!q || !text) return text || '';
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return String(text).replace(re,'<mark>$1</mark>');
}

function strColor(str) {
  const p = ['#0d6efd','#6f42c1','#d63384','#fd7e14','#198754','#0dcaf0','#20c997','#dc3545'];
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) & 0xfffff;
  return p[h % p.length];
}

// ── Label color helpers ────────────────────────────────────────────────────────
function _setVerColor(hex) {
  document.getElementById('vColor').value     = hex;
  document.getElementById('vColorText').value = hex;
}
function syncVerColor(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) document.getElementById('vColor').value = val;
}
function resetVerColor() { _setVerColor('#0d6efd'); }
</script>
</body>
</html>
