<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0d6efd">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ใบกำกับ">
<title>เข้าสู่ระบบ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="card shadow-lg">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-droplet-fill text-primary" style="font-size:3rem"></i>
          <h4 class="fw-bold mt-2 mb-0">ระบบใบกำกับสินค้า</h4>
          <p class="text-muted small" id="companySubtitle"></p>
        </div>
        <div id="alertBox"></div>
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">ชื่อผู้ใช้</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" id="username" class="form-control" placeholder="username" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">รหัสผ่าน</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" class="form-control" placeholder="password" required>
              <button class="btn btn-outline-secondary" type="button" id="togglePw">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i>เข้าสู่ระบบ
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script src="db.js"></script>
<script src="auth.js"></script>
<script>
  DB.init();
  const cfg = DB.getSettings();
  document.getElementById('companySubtitle').textContent = cfg.companyName || '';

  if (Auth.session()) window.location.href = 'dashboard.html';

  document.getElementById('togglePw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const eye = document.getElementById('eyeIcon');
    if (pw.type === 'password') { pw.type = 'text'; eye.className = 'bi bi-eye-slash'; }
    else { pw.type = 'password'; eye.className = 'bi bi-eye'; }
  });

  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) { Utils.showAlert('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน', 'warning'); return; }
    const result = Auth.login(u, p);
    if (result.ok) {
      sessionStorage.removeItem('connModalDone'); // reset so modal shows on each login
      sessionStorage.setItem('justLoggedIn', '1');
      window.location.href = 'dashboard.html';
    } else {
      Utils.showAlert(result.msg, 'danger');
    }
  });
</script>
</body>
</html>
