<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0d6efd">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ใบกำกับ">
<title>เข้าสู่ระบบ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="./vendor/bootstrap.min.css">
<link rel="stylesheet" href="./vendor/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="card shadow-lg">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-droplet-fill text-primary" style="font-size:3rem"></i>
          <h4 class="fw-bold mt-2 mb-0">ระบบใบกำกับสินค้า</h4>
          <p class="text-muted small" id="companySubtitle"></p>
        </div>
        <div id="restorePointBanner"></div>
        <div id="alertBox"></div>
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">ชื่อผู้ใช้</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" id="username" class="form-control" placeholder="username" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">รหัสผ่าน</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" class="form-control" placeholder="password" required>
              <button class="btn btn-outline-secondary" type="button" id="togglePw">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>
          <button type="submit" id="loginBtn" class="btn btn-primary w-100 btn-lg fw-semibold" disabled>
            <span id="loginBtnText"><i class="bi bi-box-arrow-in-right me-1"></i>เข้าสู่ระบบ</span>
          </button>
          <div id="syncStatus" class="text-center text-muted small mt-2">
            <span class="spinner-border spinner-border-sm me-1" role="status"></span>กำลังเชื่อมต่อ...
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="./vendor/bootstrap.bundle.min.js"></script>
<script src="utils.js?v=1.0.22"></script>
<script src="db.js?v=1.0.22"></script>
<script src="auth.js?v=1.0.22"></script>
<script>
  // ── Tauri: unregister any old service worker immediately ─────────────────
  // An old SW from a pre-fix build could serve outdated JS (without Tauri guards).
  // Unregistering here ensures the fresh bundle files are always used.
  if (window.IS_TAURI && 'serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
      if (regs.length) console.log('[Tauri] Unregistered', regs.length, 'old service worker(s)');
    });
  }

  DB.init();
  const cfg = DB.getSettings();
  document.getElementById('companySubtitle').textContent = cfg.companyName || '';

  // ── Restore-pending banner: shown after an unclean browser close ─────────────
  (function() {
    let _pendingRaw;
    try { _pendingRaw = localStorage.getItem('wt_restore_pending'); } catch {}
    if (!_pendingRaw) return;
    let _pending;
    try { _pending = JSON.parse(_pendingRaw); } catch { return; }
    const savedAt = _pending.savedAt ? new Date(_pending.savedAt) : null;
    if (!savedAt || isNaN(savedAt)) return;

    // Format timestamp as Thai locale + BE year
    const pad = n => String(n).padStart(2, '0');
    const beYear = savedAt.getFullYear() + 543;
    const timeStr = `${pad(savedAt.getDate())}/${pad(savedAt.getMonth()+1)}/${beYear} ${pad(savedAt.getHours())}:${pad(savedAt.getMinutes())}`;

    const banner = document.getElementById('restorePointBanner');
    banner.innerHTML = `
      <div class="alert alert-warning d-flex align-items-start gap-2 mb-3 py-2" id="rpBanner">
        <i class="bi bi-exclamation-triangle-fill mt-1 flex-shrink-0"></i>
        <div class="flex-grow-1">
          <div class="fw-semibold small">พบ Restore Point จากเซสชันก่อน</div>
          <div class="text-muted" style="font-size:12px">บันทึกอัตโนมัติเมื่อ <strong>${timeStr}</strong> (ปิด browser โดยไม่ออกจากระบบ)</div>
          <div class="mt-1 d-flex gap-2 flex-wrap">
            <button class="btn btn-sm btn-warning fw-semibold" onclick="downloadRestorePoint()">
              <i class="bi bi-download me-1"></i>ดาวน์โหลดไฟล์สำรอง
            </button>
            <button class="btn btn-sm btn-outline-secondary" onclick="dismissRestorePoint()">ไม่สนใจ</button>
          </div>
        </div>
      </div>`;

    window.downloadRestorePoint = function() {
      try {
        const now = new Date();
        const by = savedAt.getFullYear() + 543;
        const fn = `restore-${by}-${pad(savedAt.getMonth()+1)}-${pad(savedAt.getDate())}_${pad(savedAt.getHours())}-${pad(savedAt.getMinutes())}.json`;
        const blob = new Blob([JSON.stringify(DB.buildBackupPayload(), null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = fn;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 3000);
        localStorage.removeItem('wt_restore_pending');
        document.getElementById('rpBanner').remove();
      } catch(e) { alert('ดาวน์โหลดล้มเหลว: ' + e.message); }
    };

    window.dismissRestorePoint = function() {
      localStorage.removeItem('wt_restore_pending');
      document.getElementById('rpBanner').remove();
    };
  })();

  // Clear any stale localStorage session left from the old localStorage-based auth.
  localStorage.removeItem('wt_session');
  if (Auth.session()) window.location.href = 'dashboard.html';

  // Restore username from last session, but NEVER pre-fill password
  const savedUser = localStorage.getItem('wt_last_user');
  if (savedUser) document.getElementById('username').value = savedUser;

  // Clear password immediately and after a short delay (overrides browser autofill which fires late)
  document.getElementById('password').value = '';
  setTimeout(() => { document.getElementById('password').value = ''; }, 300);

  document.getElementById('togglePw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const eye = document.getElementById('eyeIcon');
    if (pw.type === 'password') { pw.type = 'text'; eye.className = 'bi bi-eye-slash'; }
    else { pw.type = 'password'; eye.className = 'bi bi-eye'; }
  });

  // ── Bootstrap Firebase sync so users are in localStorage before login ────────
  (function loadSyncForLogin() {
    const loginBtn  = document.getElementById('loginBtn');
    const syncStatus = document.getElementById('syncStatus');
    let syncDone = false;

    function onSyncReady() {
      if (syncDone) return;
      syncDone = true;
      loginBtn.disabled = false;
      syncStatus.style.display = 'none';
    }

    // Fallback: enable login after 6 seconds regardless
    const fallback = setTimeout(onSyncReady, 6000);

    window.addEventListener('sync:ready', () => {
      clearTimeout(fallback);
      onSyncReady();
    }, { once: true });

    function loadScript(src, cb, errCb) {
      const s = document.createElement('script');
      s.src = src;
      s.onload  = cb  || function(){};
      s.onerror = errCb || function(){};
      document.head.appendChild(s);
    }

    // Use 9.23.0 compat (matches nav.js) — has enableIndexedDbPersistence and
    // works in Tauri once sync.js sets Auth persistence to NONE (no OAuth iframe).
    const FB_VER  = '9.23.0';
    const FB_BASE = `https://www.gstatic.com/firebasejs/${FB_VER}`;

    loadScript('./firebase-config.js', function() {
      if (typeof FIREBASE_CONFIG === 'undefined' || !FIREBASE_CONFIG.apiKey ||
          FIREBASE_CONFIG.apiKey.startsWith('AIzaSy...')) {
        onSyncReady(); // no Firebase — enable immediately
        return;
      }
      // Load Firebase + sync on the login page so Firestore users are pulled
      // BEFORE login — otherwise accounts that exist only in Firestore (created
      // on another device) can't be authenticated. In Tauri, sync.js uses
      // setPersistence(NONE) which avoids the Google OAuth iframe rejection.
      loadScript('./firebase-credentials.js', startSDK, startSDK);
      function startSDK() {
        loadScript(`${FB_BASE}/firebase-app-compat.js`, function() {
          loadScript(`${FB_BASE}/firebase-auth-compat.js`, function() {
            loadScript(`${FB_BASE}/firebase-firestore-compat.js`, function() {
              loadScript('./sync.js', null, onSyncReady);
            }, onSyncReady);
          }, onSyncReady);
        }, onSyncReady);
      }
    }, onSyncReady); // firebase-config.js not found → local-only, enable immediately
  })();

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) { Utils.showAlert('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน', 'warning'); return; }
    const result = await Auth.login(u, p);
    if (result.ok) {
      localStorage.setItem('wt_last_user', u);           // remember username only
      sessionStorage.removeItem('connModalDone'); // reset so modal shows on each login
      sessionStorage.setItem('justLoggedIn', '1');

      // ── Phase 3: switch Firebase Auth to per-user account ─────────────────
      // Pre-caches the correct Firebase token in IndexedDB so sync.js on
      // dashboard.html has the right account immediately without a sign-out
      // / sign-in round-trip.  Non-fatal: sync.js handles any residual mismatch.
      // Skipped in Tauri — Firebase not loaded (HDD storage handles persistence).
      try {
        if (!window.IS_TAURI && window.firebase &&
            typeof FIREBASE_CONFIG !== 'undefined' &&
            FIREBASE_CONFIG.apiKey &&
            !FIREBASE_CONFIG.apiKey.startsWith('AIzaSy...')) {
          const userRecord = DB.getUserByUsername(u);
          const fbEmail    = userRecord?.firebaseEmail    || FIREBASE_CONFIG.teamEmail;
          const fbPass     = userRecord?.firebasePassword || FIREBASE_CONFIG.teamPassword;
          const current    = firebase.auth().currentUser;
          if (fbEmail && fbPass && (!current || current.email !== fbEmail)) {
            if (current) await firebase.auth().signOut();
            await firebase.auth().signInWithEmailAndPassword(fbEmail, fbPass);
            console.log('[Login] Firebase Auth → per-user account:', fbEmail);
          }
        }
      } catch (e) {
        console.warn('[Login] Firebase Auth switch failed (non-fatal):', e.message);
        // sync.js will handle the mismatch on the next page load
      }

      window.location.href = 'dashboard.html';
    } else {
      Utils.showAlert(result.msg, 'danger');
    }
  });
</script>
</body>
</html>
