name: Release Desktop App

# Builds the Windows .exe/.msi, signs it for the Tauri auto-updater, and
# publishes a GitHub Release containing the installer + latest.json manifest.
#
# Trigger: push a version tag, e.g.
#     git tag v1.0.1 && git push origin v1.0.1
#
# Installed apps poll the "releases/latest/download/latest.json" endpoint
# (configured in src-tauri/tauri.conf.json) and auto-prompt to update when the
# tagged version is newer than the installed package.version.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_PRIVATE_KEY       contents of src-tauri/.updater-private.key
#   TAURI_KEY_PASSWORD      the key password (empty string if none)
#   FIREBASE_TEAM_PASSWORD  (optional) injected into firebase-config.js for sync

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub Release
    env:
      # Opt into Node.js 24 for JS actions (silences the Node 20 deprecation
      # warning; Node 20 is removed from runners on 2026-09-16).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase teamPassword
        shell: bash
        env:
          FIREBASE_TEAM_PASSWORD: ${{ secrets.FIREBASE_TEAM_PASSWORD }}
        run: |
          if [ -n "$FIREBASE_TEAM_PASSWORD" ]; then
            sed -i "s|teamPassword: \"\"|teamPassword: \"$FIREBASE_TEAM_PASSWORD\"|" firebase-config.js
            echo "Firebase teamPassword injected"
          else
            echo "No FIREBASE_TEAM_PASSWORD secret — desktop sync will use anonymous auth"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ระบบใบกำกับสินค้า ${{ github.ref_name }}'
          releaseBody: 'ดาวน์โหลดตัวติดตั้งจากไฟล์แนบด้านล่าง — แอปที่ติดตั้งแล้วจะอัปเดตอัตโนมัติ'
          releaseDraft: false
          prerelease: false

      # tauri-action skips latest.json when the product name contains non-ASCII
      # characters (Thai filename matching fails). Generate it manually instead.
      #
      # CRITICAL: GitHub strips non-ASCII characters from asset filenames on
      # upload, so the local file "ระบบใบกำกับสินค้า_X_x64-setup.nsis.zip" becomes
      # "_X_x64-setup.nsis.zip" on the release. The updater URL MUST use the
      # actual uploaded asset name (queried from the GitHub API), not the local
      # filename — otherwise the download 404s.
      - name: Generate and upload latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Query the ACTUAL uploaded asset names from the release (post-sanitization)
          ASSETS_JSON="$(gh release view "$GITHUB_REF_NAME" --json assets)"
          echo "Release assets:"
          echo "$ASSETS_JSON" | node -e "JSON.parse(require('fs').readFileSync(0)).assets.forEach(a=>console.log(' -',a.name))"

          ASSETS_JSON="$ASSETS_JSON" node - <<'EOF'
          const fs   = require('fs');
          const path = require('path');

          const nsisDir = 'src-tauri/target/release/bundle/nsis';
          const msiDir  = 'src-tauri/target/release/bundle/msi';

          // Read the .sig CONTENT locally (the signature itself, not the name)
          let sigContent, preferExt;
          const nsisFiles = fs.existsSync(nsisDir) ? fs.readdirSync(nsisDir) : [];
          const nsisSigFile = nsisFiles.find(f => f.endsWith('.nsis.zip.sig'));
          if (nsisSigFile) {
            sigContent = fs.readFileSync(path.join(nsisDir, nsisSigFile), 'utf8').trim();
            preferExt = '.nsis.zip';
          } else {
            const msiFiles  = fs.readdirSync(msiDir);
            const msiSigFile = msiFiles.find(f => f.endsWith('.msi.zip.sig'));
            sigContent = fs.readFileSync(path.join(msiDir, msiSigFile), 'utf8').trim();
            preferExt = '.msi.zip';
          }

          // Find the REAL asset name on the GitHub release (Thai chars stripped)
          const assets = JSON.parse(process.env.ASSETS_JSON).assets;
          const asset  = assets.find(a => a.name.endsWith(preferExt) && !a.name.endsWith('.sig'));
          if (!asset) {
            console.error('FATAL: no uploaded asset ending in', preferExt);
            console.error('Available:', assets.map(a => a.name).join(', '));
            process.exit(1);
          }

          const tag     = process.env.GITHUB_REF_NAME;
          const version = require('./package.json').version;
          // Use the actual uploaded asset name; encode for the URL path segment.
          const url     = 'https://github.com/pure-water-ska/invoice-app/releases/download/'
                          + tag + '/' + encodeURIComponent(asset.name);

          const latest = {
            version,
            notes:    '',
            pub_date: new Date().toISOString(),
            platforms: {
              'windows-x86_64': { signature: sigContent, url }
            }
          };

          fs.writeFileSync('latest.json', JSON.stringify(latest, null, 2));
          console.log('Generated latest.json → asset:', asset.name);
          console.log('URL:', url);
          EOF

          gh release upload "$GITHUB_REF_NAME" latest.json --clobber
