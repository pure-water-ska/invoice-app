name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout
        uses: actions/checkout@v6

      # 2. Inject firebase-config.js from GitHub Secrets
      #    ตั้งค่า Secrets ที่: Repo → Settings → Secrets and variables → Actions
      #    ชื่อ secret ที่ต้องสร้าง:
      #      FIREBASE_API_KEY, FIREBASE_AUTH_DOMAIN, FIREBASE_PROJECT_ID,
      #      FIREBASE_STORAGE_BUCKET, FIREBASE_MESSAGING_SENDER_ID, FIREBASE_APP_ID,
      #      FIREBASE_ORG_ID, FIREBASE_TEAM_EMAIL, FIREBASE_TEAM_PASSWORD
      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY:            ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:        ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:     ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:             ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_ORG_ID:             ${{ secrets.FIREBASE_ORG_ID }}
          FIREBASE_TEAM_EMAIL:         ${{ secrets.FIREBASE_TEAM_EMAIL }}
          FIREBASE_TEAM_PASSWORD:      ${{ secrets.FIREBASE_TEAM_PASSWORD }}
        run: |
          if [ -n "$FIREBASE_API_KEY" ]; then
            cat > firebase-config.js << JSEOF
          const FIREBASE_CONFIG = {
            apiKey:            "$FIREBASE_API_KEY",
            authDomain:        "$FIREBASE_AUTH_DOMAIN",
            projectId:         "$FIREBASE_PROJECT_ID",
            storageBucket:     "$FIREBASE_STORAGE_BUCKET",
            messagingSenderId: "$FIREBASE_MESSAGING_SENDER_ID",
            appId:             "$FIREBASE_APP_ID",
            orgId:             "$FIREBASE_ORG_ID",
            teamEmail:         "$FIREBASE_TEAM_EMAIL",
            teamPassword:      "$FIREBASE_TEAM_PASSWORD",
          };
          JSEOF
            echo "Firebase config injected from secrets"
          else
            echo "No FIREBASE_API_KEY secret found — using firebase-config.js from repo"
          fi

      # 3. Inject drive-config.js from GitHub Secrets
      #    ชื่อ secret ที่ต้องสร้าง: GOOGLE_CLIENT_ID
      - name: Inject Drive config
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          if [ -n "$GOOGLE_CLIENT_ID" ]; then
            cat > drive-config.js << JSEOF
          const GOOGLE_CLIENT_ID = "$GOOGLE_CLIENT_ID";
          JSEOF
            echo "Drive config injected from secrets"
          else
            echo "No GOOGLE_CLIENT_ID secret found — using drive-config.js from repo"
          fi

      # 3. Update Service Worker cache version with build timestamp
      #    → ทุก deploy ใหม่จะ bust cache เก่า, browser จะดาวน์โหลดไฟล์ใหม่ทั้งหมด
      - name: Update SW cache version
        run: |
          BUILD_TS=$(date -u +%Y%m%dT%H%M%S)
          sed -i "s/const CACHE_VERSION  = .*/const CACHE_VERSION  = '${BUILD_TS}';/" sw.js
          echo "Cache version: ${BUILD_TS}"

      # 4. Upload and deploy
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
