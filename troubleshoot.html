<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0d6efd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ใบกำกับ">
<title>วินิจฉัยระบบ</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="./vendor/bootstrap.min.css">
<link rel="stylesheet" href="./vendor/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navContainer"></div>
<div class="page-wrap">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h5 class="mb-0 fw-bold"><i class="bi bi-tools me-2 text-primary"></i>วินิจฉัยระบบ (Troubleshooter)</h5>
      <div class="text-muted small mt-1">ตรวจสอบ Storage, ความถูกต้องของข้อมูล และ JS Error log</div>
    </div>
    <button class="btn btn-primary" onclick="runDiagnostics()" id="runBtn">
      <i class="bi bi-play-circle me-1"></i>ตรวจสอบระบบ
    </button>
  </div>
  <div id="alertBox" class="mb-2"></div>

  <div id="diagResults">
    <div class="text-center text-muted py-5">
      <i class="bi bi-tools fs-1 d-block mb-3 opacity-50"></i>
      <p class="mb-0">คลิก <strong>"ตรวจสอบระบบ"</strong> เพื่อเริ่มการวินิจฉัย</p>
      <p class="small text-muted mt-1">ระบบจะตรวจสอบ Storage, ข้อมูล Orphan, ความถูกต้องของ JSON และ Error Log</p>
    </div>
  </div>

</div>

<script src="./vendor/bootstrap.bundle.min.js"></script>
<script src="utils.js?v=1.0.161"></script><script src="db.js?v=1.0.161"></script><script src="auth.js?v=1.0.161"></script><script src="nav.js?v=1.0.161"></script>
<script>
const session = Auth.require();
if (!Auth.isAdmin()) { location.href = 'dashboard.html'; }
DB.init();
Nav.render('troubleshoot');

// ─── Helpers ─────────────────────────────────────────────────────────────────
function _checkItem(level, text, extra, fix) {
  return { level, text, extra: extra || '', fix: fix || null };
}

function _renderSection(title, icon, checks) {
  const lvMap  = { ok: 'success', warning: 'warning', error: 'danger', info: 'secondary' };
  const icMap  = { ok: 'check-circle-fill', warning: 'exclamation-triangle-fill', error: 'x-circle-fill', info: 'info-circle-fill' };
  return `
  <div class="card mb-3">
    <div class="card-header fw-semibold"><i class="bi bi-${icon} me-2"></i>${title}</div>
    <ul class="list-group list-group-flush">
      ${checks.map(c => {
        const lv = lvMap[c.level] || 'secondary';
        const ic = icMap[c.level] || 'info-circle-fill';
        return `<li class="list-group-item">
          <div class="d-flex align-items-start gap-2">
            <i class="bi bi-${ic} text-${lv} mt-1 flex-shrink-0"></i>
            <div class="flex-grow-1">
              <div>${c.text}</div>
              ${c.extra ? `<div class="mt-1">${c.extra}</div>` : ''}
            </div>
            ${c.fix ? `<button class="btn btn-sm btn-outline-${lv} flex-shrink-0 ms-2" onclick="${c.fix.action}">${c.fix.label}</button>` : ''}
          </div>
        </li>`;
      }).join('')}
    </ul>
  </div>`;
}

// ─── Main diagnostics ─────────────────────────────────────────────────────────
function runDiagnostics() {
  document.getElementById('runBtn').disabled = true;
  document.getElementById('runBtn').innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>กำลังตรวจสอบ...';

  // Defer to let UI update first
  setTimeout(() => {
    try { _doRun(); } catch(e) { Utils.showAlert('เกิดข้อผิดพลาดขณะวินิจฉัย: ' + e.message, 'danger'); }
    document.getElementById('runBtn').disabled = false;
    document.getElementById('runBtn').innerHTML = '<i class="bi bi-play-circle me-1"></i>ตรวจสอบระบบ';
  }, 50);
}

function _doRun() {
  const sections = [];

  // ══════════════════════════════════════════════════════════════
  // 1. STORAGE
  // ══════════════════════════════════════════════════════════════
  const storageChecks = [];
  let totalBytes = 0;
  const keyMap = {};
  for (const k in localStorage) {
    if (!Object.prototype.hasOwnProperty.call(localStorage, k)) continue;
    const sz = ((localStorage.getItem(k) || '').length) * 2;
    totalBytes += sz;
    keyMap[k] = sz;
  }
  const LIMIT = 5 * 1024 * 1024;
  const pct = Math.min(100, (totalBytes / LIMIT) * 100);
  const pctCls = pct >= 95 ? 'danger' : pct >= 80 ? 'warning' : 'success';
  const progressBar = `<div class="progress mt-1" style="height:8px"><div class="progress-bar bg-${pctCls}" style="width:${pct.toFixed(1)}%"></div></div>`;
  storageChecks.push(_checkItem(
    pct >= 95 ? 'error' : pct >= 80 ? 'warning' : 'ok',
    `พื้นที่รวม: <strong>${(totalBytes/1024).toFixed(1)} KB</strong> / ~5,120 KB (${pct.toFixed(1)}%)`,
    progressBar,
    pct >= 80 ? { label: 'ไปตั้งค่า', action: "location.href='settings.html'" } : null
  ));

  // Top-10 keys by size
  const topKeys = Object.entries(keyMap).sort((a, b) => b[1] - a[1]).slice(0, 12);
  const keyRows = topKeys.map(([k, sz]) =>
    `<tr><td class="font-monospace small text-break">${k}</td><td class="text-end small text-nowrap">${(sz/1024).toFixed(1)} KB</td></tr>`
  ).join('');
  storageChecks.push(_checkItem('info', 'รายละเอียดพื้นที่ต่อ key (Top 12)',
    `<div class="table-responsive"><table class="table table-sm table-bordered mb-0 mt-1 small">
      <thead class="table-light"><tr><th>Key</th><th class="text-end">ขนาด</th></tr></thead>
      <tbody>${keyRows}</tbody>
    </table></div>`
  ));

  // JSON parse integrity
  // Keys stored intentionally as plain strings (not JSON-encoded) — skip parse check
  const PLAIN_STR_KEYS = new Set([
    'wt_last_user', 'wt_lz_migrated', 'wt_customers_seeded',
    'wt_sync_device_id', 'wt_sync_lastAt', 'wt_sync_lastPulledAt',
    'wt_overdue_check_date', 'wt_restore_pending',
  ]);
  let parseErrors = 0;
  for (const k in localStorage) {
    if (!k.startsWith('wt_')) continue;
    if (PLAIN_STR_KEYS.has(k)) continue; // plain string — not expected to be JSON
    try {
      // DB._lzRead() decompresses LZString-compressed values before parsing;
      // raw JSON.parse(localStorage.getItem()) would always fail on compressed data.
      const raw = (typeof DB !== 'undefined' && DB._lzRead) ? DB._lzRead(k) : localStorage.getItem(k);
      if (raw !== null) JSON.parse(raw);
    } catch {
      parseErrors++;
      storageChecks.push(_checkItem('error',
        `JSON เสียหาย (parse error): <code>${k}</code>`,
        '', { label: 'ลบ key นี้', action: `Utils.confirm('ลบ ${k}?').then(function(ok){if(ok){localStorage.removeItem('${k}');runDiagnostics();}})` }
      ));
    }
  }
  if (!parseErrors) {
    storageChecks.push(_checkItem('ok', `JSON ทุก key (${Object.keys(keyMap).filter(k=>k.startsWith('wt_')).length} keys) อ่านได้ปกติ — ไม่มีข้อมูลเสียหาย`));
  }
  sections.push({ title: 'พื้นที่จัดเก็บข้อมูล', icon: 'hdd', checks: storageChecks });

  // ══════════════════════════════════════════════════════════════
  // 2. DATA INTEGRITY
  // ══════════════════════════════════════════════════════════════
  const intChecks = [];
  const customers  = DB.getCustomers();
  const products   = DB.getProducts();
  const invoices   = DB.getInvoices();
  const payments   = DB.getPayments();
  const pricing    = DB.getPricing();
  const returns    = DB.getReturns ? DB.getReturns() : [];
  const users      = DB.getUsers();
  const capReceipts    = DB.getCapReceipts ? DB.getCapReceipts() : [];
  const capDeductions  = DB.getCapDeductions ? DB.getCapDeductions() : [];

  const custIds  = new Set(customers.map(c => c.id));
  const prodIds  = new Set(products.map(p => p.id));
  const invNums  = new Set(invoices.map(i => i.invoiceNumber));
  const uniqInvs = [...invNums].length;

  // Data summary
  intChecks.push(_checkItem('info',
    `สรุปข้อมูล: ลูกค้า <strong>${customers.length}</strong> | สินค้า <strong>${products.length}</strong> | ใบกำกับ <strong>${uniqInvs}</strong> | ชำระ <strong>${payments.length}</strong> | คืนสินค้า <strong>${returns.length}</strong> | ผู้ใช้ <strong>${users.length}</strong>`
  ));

  // Payments without invoices
  const orphanPay = payments.filter(p => !invNums.has(p.invoiceNumber));
  window._fixOrphanPayments = async function() {
    if (!await Utils.confirm(`ลบรายการชำระ ${orphanPay.length} รายการที่ไม่มีใบกำกับ?`)) return;
    DB.savePayments(DB.getPayments().filter(p => invNums.has(p.invoiceNumber)));
    DB.logActivity(session.userId, session.username, 'ลบ orphan payments', { count: orphanPay.length });
    Utils.showAlert(`ลบแล้ว ${orphanPay.length} รายการ`, 'success');
    runDiagnostics();
  };
  intChecks.push(_checkItem(
    orphanPay.length ? 'warning' : 'ok',
    `รายการชำระเงินที่ไม่มีใบกำกับ: <strong>${orphanPay.length}</strong> รายการ`,
    orphanPay.length ? `<div class="small text-muted">เลขที่: ${orphanPay.slice(0,5).map(p=>p.invoiceNumber).join(', ')}${orphanPay.length>5?'...':''}</div>` : '',
    orphanPay.length ? { label: `ลบ ${orphanPay.length} รายการ`, action: '_fixOrphanPayments()' } : null
  ));

  // Invoices without customer
  const invNoCust = [...new Set(invoices.filter(i => !custIds.has(i.customerId)).map(i => i.invoiceNumber))];
  intChecks.push(_checkItem(
    invNoCust.length ? 'warning' : 'ok',
    `ใบกำกับที่ลูกค้าถูกลบไปแล้ว: <strong>${invNoCust.length}</strong> ใบ`,
    invNoCust.length ? `<div class="small text-muted">${invNoCust.slice(0,8).join(', ')}${invNoCust.length>8?'...':''}</div>` : ''
  ));

  // Orphan pricing (product deleted)
  const orphanPricing = pricing.filter(p => !prodIds.has(p.productId));
  window._fixOrphanPricing = async function() {
    if (!await Utils.confirm(`ลบรายการราคา ${orphanPricing.length} รายการที่ไม่มีสินค้า?`)) return;
    DB.savePricing(DB.getPricing().filter(p => prodIds.has(p.productId)));
    DB.logActivity(session.userId, session.username, 'ลบ orphan pricing', { count: orphanPricing.length });
    Utils.showAlert(`ลบแล้ว ${orphanPricing.length} รายการ`, 'success');
    runDiagnostics();
  };
  intChecks.push(_checkItem(
    orphanPricing.length ? 'warning' : 'ok',
    `ราคาที่อ้างอิงสินค้าที่ลบไปแล้ว: <strong>${orphanPricing.length}</strong> รายการ`,
    '',
    orphanPricing.length ? { label: `ลบ ${orphanPricing.length} รายการ`, action: '_fixOrphanPricing()' } : null
  ));

  // Cap deductions without invoice
  const orphanCapDeduct = capDeductions.filter(d => d.invoiceNumber && !invNums.has(d.invoiceNumber));
  window._fixOrphanCapDeduct = async function() {
    if (!await Utils.confirm(`ลบรายการหักฝาขวด ${orphanCapDeduct.length} รายการที่ไม่มีใบกำกับ?`)) return;
    DB.saveCapDeductions(DB.getCapDeductions().filter(d => !d.invoiceNumber || invNums.has(d.invoiceNumber)));
    DB.logActivity(session.userId, session.username, 'ลบ orphan cap deductions', { count: orphanCapDeduct.length });
    Utils.showAlert(`ลบแล้ว ${orphanCapDeduct.length} รายการ`, 'success');
    runDiagnostics();
  };
  intChecks.push(_checkItem(
    orphanCapDeduct.length ? 'warning' : 'ok',
    `รายการหักฝาขวดที่ไม่มีใบกำกับ: <strong>${orphanCapDeduct.length}</strong> รายการ`,
    '',
    orphanCapDeduct.length ? { label: `ลบ ${orphanCapDeduct.length} รายการ`, action: '_fixOrphanCapDeduct()' } : null
  ));

  // Returns without customer
  const orphanReturns = returns.filter(r => r.customerId && !custIds.has(r.customerId));
  intChecks.push(_checkItem(
    orphanReturns.length ? 'warning' : 'ok',
    `รายการคืนสินค้าที่ลูกค้าถูกลบ: <strong>${orphanReturns.length}</strong> รายการ`
  ));

  // Duplicate usernames
  const unames  = users.map(u => u.username);
  const dupU    = unames.filter((u, i) => unames.indexOf(u) !== i);
  intChecks.push(_checkItem(
    dupU.length ? 'error' : 'ok',
    `Username ซ้ำกัน: ${dupU.length ? '<strong class="text-danger">' + dupU.join(', ') + '</strong>' : 'ไม่มี'}`
  ));

  // Users without password
  const noPwd = users.filter(u => !u.password);
  intChecks.push(_checkItem(
    noPwd.length ? 'error' : 'ok',
    `ผู้ใช้ที่ไม่มีรหัสผ่าน: ${noPwd.length ? '<strong class="text-danger">' + noPwd.map(u=>u.username).join(', ') + '</strong>' : 'ไม่มี'}`
  ));

  // Settings
  const cfg = DB.getSettings();
  intChecks.push(_checkItem(
    cfg && cfg.companyName ? 'ok' : 'warning',
    cfg && cfg.companyName
      ? `การตั้งค่าปกติ: <strong>${cfg.companyName}</strong>`
      : 'ไม่มีชื่อบริษัทในการตั้งค่า',
    '',
    (!cfg || !cfg.companyName) ? { label: 'ไปตั้งค่า', action: "location.href='settings.html'" } : null
  ));

  sections.push({ title: 'ความถูกต้องของข้อมูล', icon: 'database-check', checks: intChecks });

  // ══════════════════════════════════════════════════════════════
  // 3. JS ERROR LOG
  // ══════════════════════════════════════════════════════════════
  const errChecks = [];
  const errors = DB.getErrors();
  if (!errors.length) {
    errChecks.push(_checkItem('ok', 'ไม่มีข้อผิดพลาด JavaScript บันทึกไว้'));
  } else {
    errChecks.push(_checkItem(
      errors.length >= 20 ? 'warning' : 'info',
      `พบข้อผิดพลาด JavaScript <strong>${errors.length}</strong> รายการ`,
      '',
      { label: 'ล้าง Error Log', action: "Utils.confirm('ล้าง Error Log ทั้งหมด?').then(function(ok){if(ok){DB.clearErrors();Utils.showAlert('ล้าง Error Log แล้ว','success');runDiagnostics();}})" }
    ));
    const errRows = errors.slice(0, 25).map(e => `
      <tr>
        <td class="small text-nowrap text-muted">${Utils.formatDateTimeTH(e.timestamp)}</td>
        <td class="small">${e.page || '-'}</td>
        <td class="small text-danger">${e.type ? `<strong>${e.type}:</strong> ` : ''}${String(e.message || '').slice(0, 120)}</td>
        <td class="small text-muted">${e.user || '-'}</td>
      </tr>`).join('');
    errChecks.push(_checkItem('info', `รายการล่าสุด ${Math.min(25, errors.length)} รายการ`,
      `<div class="table-responsive"><table class="table table-sm table-bordered mb-0 mt-1">
        <thead class="table-light"><tr><th>เวลา</th><th>หน้า</th><th>ข้อผิดพลาด</th><th>ผู้ใช้</th></tr></thead>
        <tbody>${errRows}</tbody>
      </table></div>`
    ));
  }
  sections.push({ title: 'ประวัติข้อผิดพลาด JavaScript', icon: 'bug', checks: errChecks });

  // ══════════════════════════════════════════════════════════════
  // 4. SYSTEM INFO
  // ══════════════════════════════════════════════════════════════
  const sysChecks = [];
  sysChecks.push(_checkItem('info', `App Version: <strong>${APP_VERSION.label}</strong>`));
  sysChecks.push(_checkItem('info', `วันที่ตรวจสอบ: <strong>${Utils.formatDateTimeTH(new Date().toISOString())}</strong>`));
  sysChecks.push(_checkItem('info', `localStorage Keys ทั้งหมด: <strong>${Object.keys(localStorage).length} keys</strong>`));
  sysChecks.push(_checkItem('info',
    `Browser: <span class="font-monospace small">${navigator.userAgent.slice(0, 100)}</span>`
  ));
  // Snapshot count
  const snapCount = DB.getSnapshots ? DB.getSnapshots().length : 0;
  sysChecks.push(_checkItem(
    snapCount > 0 ? 'info' : 'info',
    `Snapshots ที่เก็บไว้: <strong>${snapCount} / 3</strong>`,
    '',
    { label: 'จัดการ Snapshots', action: "location.href='snapshots.html'" }
  ));
  sections.push({ title: 'ข้อมูลระบบ', icon: 'info-circle', checks: sysChecks });

  // ══════════════════════════════════════════════════════════════
  // RENDER
  // ══════════════════════════════════════════════════════════════
  const allChecks  = sections.flatMap(s => s.checks);
  const errCount   = allChecks.filter(c => c.level === 'error').length;
  const warnCount  = allChecks.filter(c => c.level === 'warning').length;
  const fixableCount = allChecks.filter(c => c.fix && (c.level === 'error' || c.level === 'warning')).length;

  const summCls  = errCount ? 'danger' : warnCount ? 'warning' : 'success';
  const summIcon = errCount ? 'x-circle-fill' : warnCount ? 'exclamation-triangle-fill' : 'check-circle-fill';
  const summTxt  = errCount
    ? `พบ <strong>${errCount}</strong> ข้อผิดพลาด, <strong>${warnCount}</strong> คำเตือน`
    : warnCount
      ? `พบ <strong>${warnCount}</strong> คำเตือน — ระบบยังทำงานได้ปกติ`
      : '<strong>ระบบปกติ</strong> ทุกรายการผ่านการตรวจสอบ';

  document.getElementById('diagResults').innerHTML = `
    <div class="alert alert-${summCls} d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-${summIcon} fs-5 flex-shrink-0"></i>
      <div>${summTxt}${fixableCount ? ` &nbsp;·&nbsp; แก้ไขอัตโนมัติได้ <strong>${fixableCount}</strong> รายการ` : ''}</div>
    </div>
    ${sections.map(s => _renderSection(s.title, s.icon, s.checks)).join('')}
    <div class="text-end text-muted small mt-2">
      <i class="bi bi-clock me-1"></i>ตรวจสอบเมื่อ: ${Utils.formatDateTimeTH(new Date().toISOString())}
    </div>`;

  // Log the check
  DB.logActivity(session.userId, session.username, 'วินิจฉัยระบบ', { errors: errCount, warnings: warnCount });
}
</script>
</body>
</html>
