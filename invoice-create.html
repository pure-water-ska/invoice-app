@media (max-width: 767px) { .no-mobile-hide { display: none !important; } }
/* ── Searchable customer dropdown ── */
#custSearchWrap { position: relative; }
#custDropdown {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 1055;
  background: #fff; border: 1px solid #86b7fe; border-top: none;
  border-radius: 0 0 6px 6px; max-height: 240px; overflow-y: auto;
  box-shadow: 0 6px 16px rgba(0,0,0,.12); display: none;
}
#custDropdown .copt {
  padding: 8px 12px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f0f0f0;
}
#custDropdown .copt:last-child { border-bottom: none; }
#custDropdown .copt:hover, #custDropdown .copt.hi { background: #e8f0ff; color: #0d6efd; }
#custDropdown .copt-empty { padding: 10px 12px; color: #999; font-size: 13px; }
#custNote {
  display:none; margin-top:6px; background:#fff8e1; border:0.5px solid #ffe082;
  border-radius:6px; padding:7px 10px; font-size:13px; color:#7c5e00;
  line-height:1.4; gap:7px; align-items:flex-start;
}
/* ── On-screen invoice preview: force portrait A5 (148mm × 210mm) ──
   Scoped to .invoice-preview.inv-page (the HTML preview page). The PDF-iframe
   wrapper has only .invoice-preview (no .inv-page) so it is unaffected. */
#invoicePreview .invoice-preview.inv-page,
#previewArea .invoice-preview.inv-page {
  width: 148mm;
  min-height: 210mm;
  max-width: 100%;
  margin: 0 auto 12px;
  box-sizing: border-box;
}

<body>
<div id="navContainer"></div>
<div class="page-wrap">

  <!-- Header toolbar -->
  <div class="d-flex justify-content-between align-items-center mb-3 no-print">

  <!-- Invoice Form (edit mode) -->

    <div class="card-header bg-light fw-semibold py-2 inv-section-header">ข้อมูลใบกำกับ</div>
    <div class="card-body">
      <div class="row g-3">

        <div class="col-12 col-md-4">

          <div id="custSearchWrap">
            <input type="text" id="invCustomerSearch" class="form-control" placeholder="พิมพ์ชื่อลูกค้า..."
                   autocomplete="off" oninput="_custFilter()" onfocus="_custOpen()" onkeydown="_custKey(event)">

            <div id="custDropdown"></div>
            <div id="custNote">
              <i class="bi bi-journal-text" style="font-size:14px;flex-shrink:0;margin-top:1px"></i>

        </div>
        <div class="col-12 col-md-2">
          <label class="form-label fw-semibold">วิธีจัดส่ง <span class="text-danger">*</span></label>

      </div>
      <div id="balanceAlert" class="mt-2"></div>

  </div>

  <!-- Product rows editor -->
  <div id="editTable" class="card mb-3 no-print">
    <div class="card-header bg-light d-flex justify-content-between align-items-center py-2 inv-section-header">
      <span class="fw-semibold">รายการสินค้า</span>

      <div class="text-end mt-2 pe-2">

    <button class="btn btn-outline-secondary" onclick="clearForm()"><i class="bi bi-arrow-counterclockwise me-1"></i>ล้างข้อมูล</button>

<script>
const session = Auth.require();
try { DB.init(); } catch(e) {
  document.body.innerHTML = '<div style="padding:2rem;color:red;font-family:sans-serif"><h3>DB Error</h3><pre>' + e.stack + '</pre></div>';
  throw e;
}
Nav.render('invoice-create');

// ── PDF Auto-Save ─────────────────────────────────────────────────────────────
const PdfGen = {
  sanitize(s) {
    return String(s || '').replace(/[\\/:*?"<>|\x00-\x1f]/g, '_').replace(/_+/g, '_').trim();
  },

  _wrapHtml(bodyHtml) {
    // A5 portrait at 96 DPI: 148mm × 210mm ≈ 559px × 794px
    // @media print CSS does NOT apply inside html2canvas iframe (screen rendering only)
    // so we must replicate print-equivalent layout rules here as screen CSS.
    return `<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body{margin:0;padding:0;background:#fff;font-family:'Sarabun','TH Sarabun New',sans-serif}
.no-print{display:none!important}
*{-webkit-print-color-adjust:exact;print-color-adjust:exact}
/* Replicate @media print layout for html2canvas rendering */
.invoice-preview{border:none!important;border-radius:0!important;box-shadow:none!important;padding:6mm!important}
.inv-header-table{border:1.5px solid #444!important;margin-bottom:3mm!important}
.inv-table{border:1.5px solid #444!important;border-collapse:collapse}
/* Force A5 page height (794px = 210mm at 96dpi) so flex:1 spacer pushes footer to bottom */
.inv-page{height:794px!important;box-sizing:border-box!important}
/* Increase watermark opacity for PDF rendering (0.07 is too faint for JPEG compression) */
.inv-wm{opacity:0.18!important}
</style>
</head><body>${bodyHtml}</body></html>`;
  },

  async _buildBlob(bodyHtml) {
    // A5 portrait: 148mm × 210mm ≈ 559px × 794px at 96 DPI
    const A5_W = 559;
    const A5_H = 794;
    const iframe = document.createElement('iframe');
    iframe.style.cssText = `position:fixed;left:-9999px;top:0;width:${A5_W}px;height:${A5_H}px;border:none;background:#fff;`;
    document.body.appendChild(iframe);
    try {
      iframe.contentDocument.open();
      iframe.contentDocument.write(this._wrapHtml(bodyHtml));
      iframe.contentDocument.close();
      await new Promise(r => setTimeout(r, 1200));
      const body = iframe.contentDocument.body;
      iframe.style.height = Math.max(body.scrollHeight, A5_H) + 'px';

      const canvas = await html2canvas(body, {
        scale: 1.5, useCORS: true, allowTaint: true, logging: false,
        width: A5_W, windowWidth: A5_W
      });

      const { jsPDF } = window.jspdf;
      const pdf  = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });
      const pdfW = pdf.internal.pageSize.getWidth();
      const pdfH = pdf.internal.pageSize.getHeight();
      const a5PxH = Math.round(canvas.width * (pdfH / pdfW));

      // Capture first-page image for Firestore cross-device viewing
      const firstSlice = document.createElement('canvas');
      firstSlice.width = canvas.width;
      firstSlice.height = Math.min(a5PxH, canvas.height);
      firstSlice.getContext('2d').drawImage(canvas, 0, 0, canvas.width, firstSlice.height, 0, 0, canvas.width, firstSlice.height);
      const firstPageJpeg = firstSlice.toDataURL('image/jpeg', 0.82);

      let yOff = 0, pageNum = 0;
      while (yOff < canvas.height) {
        if (canvas.height - yOff < 15) break;
        if (pageNum > 0) pdf.addPage();
        const sliceH = Math.min(a5PxH, canvas.height - yOff);
        const tmp = document.createElement('canvas');
        tmp.width = canvas.width; tmp.height = a5PxH;
        const ctx = tmp.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, tmp.width, tmp.height);
        ctx.drawImage(canvas, 0, yOff, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
        pdf.addImage(tmp.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, pdfW, pdfH);
        yOff += a5PxH; pageNum++;
      }
      return { blob: pdf.output('blob'), firstPageJpeg };
    } finally {
      document.body.removeChild(iframe);
    }
  },

  async _saveToLocalFolder(blob, filename) {
    try {
      const handle = await IDB.get('pdf_dir');
      if (!handle) return false;
      const perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm !== 'granted') return false;
      const fh = await handle.getFileHandle(filename, { create: true });
      const w  = await fh.createWritable();
      await w.write(blob); await w.close();
      return true;
    } catch(e) { console.warn('PDF folder save:', e); return false; }
  },

  async run(bodyHtml, filename, invoiceNumber) {
    try {
      const { blob, firstPageJpeg } = await this._buildBlob(bodyHtml);

      // ── 1. Always mark hasPdfPage on the invoice (button always shows) ────────
      if (invoiceNumber) {
        try {
          const invs = DB.getInvoices();
          const inv  = invs.find(i => i.invoiceNumber === invoiceNumber);
          if (inv && !inv.hasPdfPage) {
            inv.hasPdfPage = true;
            DB._set('wt_invoices', invs);
          }
        } catch(e) { console.warn('[PdfPage] hasPdfPage set failed:', e.message); }
      }

      // ── 2. Firestore pdf_pages — cross-device image storage ─────────────────
      // Use Date.now() instead of FieldValue.serverTimestamp() to avoid dependency
      // on the firebase global which may not be initialized at call time.
      if (invoiceNumber && firstPageJpeg) {
        const uploadPage = async () => {
          if (!window.Sync?.ready) return; // called again after sync:ready if needed
          try {
            await Sync._orgRef().collection('pdf_pages').doc(invoiceNumber).set({
              image:         firstPageJpeg,
              invoiceNumber: invoiceNumber,
              uploadedAt:    new Date().toISOString(),
              _by:           Sync._deviceId,
            });
            console.log('[PdfPage] stored in Firestore:', invoiceNumber);
          } catch(e) { console.warn('[PdfPage] Firestore upload failed:', e.message); }
        };
        if (window.Sync?.ready) {
          uploadPage();
        } else {
          // Sync not ready yet — retry once it initialises
          window.addEventListener('sync:ready', uploadPage, { once: true });
          // Fallback: try after 5s even without the event
          setTimeout(() => { if (!window.Sync?.ready) return; uploadPage(); }, 5000);
        }
      }

      // ── 2. Local folder backup (no auto-download) ──────────────────────────
      const toDir = await this._saveToLocalFolder(blob, filename);

      Utils.showAlert(
        `<i class="bi bi-file-earmark-pdf me-1 text-danger"></i>` +
        `บันทึก PDF: <strong>${filename}</strong>` +
        (toDir ? '' : '')
      );
      return { ok: true, toDir };
    } catch(e) {
      console.error('PdfGen.run:', e);
      Utils.showAlert('สร้าง PDF ล้มเหลว: ' + e.message, 'warning');
      return { ok: false };
    }
  }
};

const ROWS_PER_PAGE = 14;
let items = [];          // all product rows
let viewMode = false;
let editMode = false;
let currentInvNum = null;
let _editBaseEditCount = 0;   // editCount snapshot taken when entering edit mode — baseline for conflict detection
let _editSaving = false;      // true while saveInvoiceEdit() is committing — suppresses false-positive conflict banner

let _fpInvDate;

// Selected invoice date as ISO (YYYY-MM-DD); falls back to today.
function _selectedInvISO() {
  try { return Utils.parseBEToISO(document.getElementById('invDate').value) || Utils.todayInputValue(); }
  catch { return Utils.todayInputValue(); }
}
// When the date changes in CREATE mode: re-run the invoice number for that date
// and re-price items from the price timeline as of that date.
function _onInvDateChange() {
  if (editMode || viewMode) return;
  try { document.getElementById('invNumber').value = DB.peekNextInvoiceNumberForDate(_selectedInvISO()); } catch {}
  if (typeof refreshPrices === 'function') refreshPrices();
}

window.addEventListener('DOMContentLoaded', () => {
  _fpInvDate = BEDate.byId('invDate', { onChange: _onInvDateChange });
  const params = new URLSearchParams(location.search);
  const viewNum = params.get('view');
  const editNum = params.get('edit');

  // ── Mobile: create/edit not supported — view only ─────────────────────────
  const isMobile = window.innerWidth < 768;
  if (isMobile && !viewNum) {
    if (editNum) {
      location.replace('invoice-create.html?view=' + editNum);
      return;
    }
    // Create mode on mobile
    document.getElementById('editForm').style.display  = 'none';
    document.getElementById('editTable').style.display = 'none';
    document.getElementById('saveBtnRow').style.display = 'none';
    document.getElementById('alertBox').innerHTML = `
      <div class="alert alert-info d-flex align-items-start gap-3 mb-0">
        <i class="bi bi-phone fs-4 flex-shrink-0 mt-1 text-primary"></i>
        <div>
          <div class="fw-bold mb-1">ใช้งานบนมือถือ</div>
          <div class="small mb-2">การสร้าง/แก้ไขใบกำกับรองรับเฉพาะบนคอมพิวเตอร์
            — บนมือถือรองรับเฉพาะการ <strong>ดูใบกำกับ</strong></div>
          <a href="invoices.html" class="btn btn-sm btn-primary">
            <i class="bi bi-receipt me-1"></i>ดูรายการใบกำกับ
          </a>
        </div>
      </div>`;
    return;
  }

  // ⚠️ Tauri loads HDD data into DB._cache ASYNCHRONOUSLY (DB.ready). Building
  // the customer list / loading the invoice synchronously here would read an
  // EMPTY cache → permanently empty customer box and blank edit/view. So defer
  // the entire data-dependent init until DB.ready resolves (instant on web).
  const _startInit = () => {

  // Build customer list for searchable dropdown.
  // Defensive: a single record with a missing/non-string name used to throw in
  // .localeCompare and abort the whole list build. Coerce names to strings and
  // keep only records with an id. Exposed so it can be rebuilt when customers
  // sync in from another device.
  window.buildCustList = function () {
    window._custList = DB.getCustomers()
      .filter(c => c && c.id)
      .map(c => ({ ...c, name: (c.name == null ? '' : String(c.name)) }))
      .sort((a, b) => a.name.localeCompare(b.name, 'th'));
  };
  window.buildCustList();
  // Rebuild the list (and refresh an open dropdown) when customers arrive via sync
  ['sync:pulled', 'sync:updated', 'sync:ready'].forEach(evt =>
    window.addEventListener(evt, () => {
      try {
        window.buildCustList();
        const dd = document.getElementById('custDropdown');
        if (dd && dd.style.display === 'block') _custOpen();
      } catch {}
    }));

  // ── Searchable customer dropdown helpers ───────────────────────────────────
  let _custHi = -1; // highlighted index

  function _custRender(filtered) {
    const dd = document.getElementById('custDropdown');
    if (!filtered.length) {
      dd.innerHTML = '<div class="copt-empty">ไม่พบลูกค้า</div>';
    } else {
      dd.innerHTML = filtered.map((c, i) =>
        `<div class="copt${i===_custHi?' hi':''}" data-id="${c.id}" data-name="${c.name}"
              onmousedown="setCustomerById('${c.id}','${c.name.replace(/'/g,"\\'")}')">
           ${c.name}
         </div>`
      ).join('');
    }
    dd.style.display = 'block';
  }

  function _custOpen() {
    _custHi = -1;
    _custRender(window._custList);
  }

  function _custFilter() {
    _custHi = -1;
    const q = document.getElementById('invCustomerSearch').value.trim().toLowerCase();
    const filtered = q ? window._custList.filter(c => c.name.toLowerCase().includes(q)) : window._custList;
    _custRender(filtered);
    // Clear hidden ID if user is typing a new search
    document.getElementById('invCustomer').value = '';
  }

  function _custClose() {
    document.getElementById('custDropdown').style.display = 'none';
    _custHi = -1;
  }

  window.setCustomerById = function(id, name) {
    const c = window._custList.find(x => x.id === id);
    document.getElementById('invCustomer').value = id || '';
    document.getElementById('invCustomerSearch').value = (name || (c && c.name) || '');
    _custClose();
    // Show most recent note if customer has one
    const noteBox  = document.getElementById('custNote');
    const noteText = document.getElementById('custNoteText');
    const notes    = (c && Array.isArray(c.notes) && c.notes.length) ? c.notes : null;
    if (notes) {
      const latest = notes.reduce((a, b) => (a.createdAt > b.createdAt ? a : b));
      noteText.textContent = latest.text;
      noteBox.style.display = 'flex';
    } else {
      noteBox.style.display = 'none';
    }
    if (id) onCustomerChange();
  };

  window._custFilter  = _custFilter;
  window._custOpen    = _custOpen;
  window._custKey     = function(e) {
    const dd    = document.getElementById('custDropdown');
    const items = dd.querySelectorAll('.copt');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      _custHi = Math.min(_custHi + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('hi', i === _custHi));
      items[_custHi]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      _custHi = Math.max(_custHi - 1, 0);
      items.forEach((el, i) => el.classList.toggle('hi', i === _custHi));
      items[_custHi]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const hi = dd.querySelector('.copt.hi') || dd.querySelector('.copt');
      if (hi) { setCustomerById(hi.dataset.id, hi.dataset.name); }
    } else if (e.key === 'Escape') {
      _custClose();
    }
  };

  // Close dropdown when clicking outside
  document.addEventListener('mousedown', (e) => {
    if (!document.getElementById('custSearchWrap').contains(e.target)) _custClose();
  });

  // ── Concurrent-edit conflict detection ────────────────────────────────────
  // When another device saves changes to the same invoice we're editing,
  // sync.js fires sync:updated for wt_invoices.  We compare the remote
  // editCount against _editBaseEditCount (set in loadEdit) to decide
  // whether the remote change touches OUR invoice.
  window.addEventListener('sync:updated', (e) => {
    // ── Admin settings change: re-render preview header ──────────────────────
    if (e.detail?.key === 'wt_settings' && currentInvNum && (viewMode || editMode)) {
      const pages = DB.getInvoices().filter(i => i.invoiceNumber === currentInvNum);
      if (pages.length) renderPreview(pages);
      return;
    }

    // ── Concurrent-edit conflict detection ───────────────────────────────────
    if (!editMode || _editSaving) return;
    if (e.detail?.key !== 'wt_invoices') return;
    const remotePages = DB.getInvoices().filter(i => i.invoiceNumber === currentInvNum);
    if (!remotePages.length) {
      _showEditConflictBanner('deleted');
      return;
    }
    const remoteEditCount = remotePages[0].editCount || 0;
    if (remoteEditCount > _editBaseEditCount) {
      _showEditConflictBanner('edited', remotePages[0]);
    }
  });

  if (editNum) {
    loadEdit(editNum);
  } else if (viewNum) {
    loadView(viewNum);
  } else {
    // Create mode — show save/preview buttons
    viewMode = false;
    document.getElementById('saveBtnRow').style.display = '';
    document.getElementById('invNumber').value = DB.peekNextInvoiceNumber();
    _fpInvDate.setDate(new Date());
    initRows();

    // Pre-select customer from URL param (e.g. from payment overpay redirect)
    const custParam = params.get('cust');
    if (custParam) setCustomerById(custParam);

    // Pre-fill adjustment item if coming from overpay/underpay
    const adjustParam = params.get('adjust');
    if (adjustParam) {
      const pending = sessionStorage.getItem('pendingAdjust');
      if (pending) {
        try {
          const adj = JSON.parse(pending);
          sessionStorage.removeItem('pendingAdjust');
          const isOver = adj.amount > 0;
          items[0].name = adj.label || (isOver ? 'ยอดชำระเกิน' : 'ยอดค้างชำระ');
          items[0].qty = 1;
          items[0].unitSize = 1;
          items[0].remainder = 0;
          items[0].price = Math.abs(adj.amount).toFixed(2);
          items[0].total = Math.abs(adj.amount);
          renderRows();
          Utils.showAlert(
            `โหลดรายการ${isOver ? 'ชำระเกิน' : 'ค้างชำระ'} ฿${Utils.formatNumber(Math.abs(adj.amount))} จากใบกำกับเดิมแล้ว`,
            'warning'
          );
        } catch(e) {}
      }
    }
  }

  }; // end _startInit

  // Run init only after the local cache is populated (HDD load in Tauri).
  if (window.DB && DB.ready && typeof DB.ready.then === 'function') DB.ready.then(_startInit);
  else _startInit();
});

// ── VIEW MODE ─────────────────────────────────────────────────────────────────
async function loadView(invNum) {
  viewMode = true;
  currentInvNum = invNum;
  document.getElementById('pageTitle').textContent = `ใบกำกับ: ${invNum}`;
  document.getElementById('editForm').style.display = 'none';
  document.getElementById('editTable').style.display = 'none';
  document.getElementById('saveBtnRow').style.display = 'none';
  document.querySelectorAll('#toolbarBtns .save-btn').forEach(b => b.remove());

  // Retry up to 4 s — Firestore listener may briefly overwrite cache before
  // _startInit runs, or Tauri HDD init may still be settling on first load.
  let pages = DB.getInvoices().filter(i => i.invoiceNumber === invNum);
  if (!pages.length) {
    for (let t = 0; t < 8 && !pages.length; t++) {
      await new Promise(r => setTimeout(r, 500));
      pages = DB.getInvoices().filter(i => i.invoiceNumber === invNum);
    }
  }
  if (pages.length === 0) { Utils.showAlert(`ไม่พบใบกำกับ ${invNum}`, 'danger'); return; }

  document.getElementById('toolbarBtns').innerHTML = `
    <button class="btn btn-outline-secondary btn-sm" onclick="history.back()"><i class="bi bi-arrow-left me-1"></i>กลับ</button>
    <a href="invoice-create.html?edit=${invNum}" class="btn btn-warning btn-sm no-mobile-hide"><i class="bi bi-pencil me-1"></i>แก้ไข</a>
    <a href="payments.html?inv=${invNum}" class="btn btn-success btn-sm"><i class="bi bi-cash-coin me-1"></i>บันทึกชำระเงิน</a>
    <button class="btn btn-outline-info btn-sm" onclick="copyInvoiceImage()"><i class="bi bi-clipboard-image me-1"></i>คัดลอกรูป</button>
    <button class="btn btn-primary btn-sm no-mobile-hide" onclick="doPrint()"><i class="bi bi-printer me-1"></i>พิมพ์</button>
    <button class="btn btn-danger btn-sm no-mobile-hide" onclick="deleteThis()"><i class="bi bi-trash me-1"></i>ลบ</button>
  `;

  await renderPreview(pages);

  // Auto-print if flagged by saveInvoice(true) / saveInvoiceEdit(true)
  const _ap = sessionStorage.getItem('autoPrint');
  if (_ap === invNum) {
    sessionStorage.removeItem('autoPrint');
    setTimeout(() => doPrint(), 800);
  }
}

async function doPrint() {
  const pages = DB.getInvoices().filter(i => i.invoiceNumber === currentInvNum);
  if (!pages.length) return;

  const reprintCount = pages[0].printCount || 0;  // count BEFORE this print
  const editCount    = pages[0].editCount    || 0;
  const printNum     = reprintCount + 1;
  const printRecord  = { at: new Date().toISOString(), by: session.name, byUser: session.username };

  pages.forEach(p => {
    const history = [...(p.printHistory || []), printRecord];
    DB.updateInvoice(p.id, { printCount: (p.printCount||0) + 1, printHistory: history });
  });
  DB.logActivity(session.userId, session.username, 'พิมพ์ใบกำกับ', { invoiceNumber: currentInvNum, reprintCount });
  // Commit the updated print count to Firestore immediately; upload bar shows progress.
  try { if (window.Sync && typeof Sync.flushNow === 'function') Sync.flushNow(); } catch (e) {}

  const cfg        = DB.getSettings();
  const cust       = DB.getCustomers().find(c => c.id === pages[0].customerId);
  const totalPages = pages[0].totalPages || pages.length;

  // Build print HTML (ต้นฉบับ + สำเนา) for window.print()
  let html = '';
  ['ต้นฉบับ', 'สำเนา'].forEach((copyType, ci) => {
    pages.forEach((page, pi) => {
      if (ci > 0 || pi > 0) html += '<div class="page-break"></div>';
      html += buildInvoicePage(page, cust, cfg, page.page, totalPages, copyType, reprintCount, editCount);
    });
  });

  // Print first — immediately, no waiting for PDF
  document.getElementById('printArea').innerHTML = html;
  window.print();

  // Save PDF in background after print dialog opens
  const _custName = cust ? cust.name : 'unknown';
  const _fn = [
    PdfGen.sanitize(_custName),
    PdfGen.sanitize(currentInvNum),
    `E${editCount}`,
    `P${printNum}`
  ].join('_') + '.pdf';

  const _freshRaw = (() => { try { return JSON.parse(sessionStorage.getItem('freshPdf') || 'null'); } catch(e) { return null; } })();
  const _useFresh = _freshRaw && _freshRaw.inv === currentInvNum;
  if (_useFresh) {
    sessionStorage.removeItem('freshPdf');
    Utils.showAlert(`<i class="bi bi-file-earmark-pdf me-1 text-danger"></i>ใช้ PDF ที่บันทึกไว้: <strong>${_freshRaw.file}</strong>`);
  } else {
    let _pdfBody = '';
    ['ต้นฉบับ', 'สำเนา'].forEach((ct, ci) => {
      pages.forEach((page, pi) => {
        if (ci > 0 || pi > 0) _pdfBody += '<div class="page-break"></div>';
        _pdfBody += buildInvoicePage(page, cust, cfg, page.page, totalPages, ct, reprintCount, editCount);
      });
    });
    PdfGen.run(_pdfBody, _fn, currentInvNum).catch(e => console.warn('PDF save error:', e));
  }
}

async function deleteThis() {
  if (!await Utils.confirm(`ลบใบกำกับ "${currentInvNum}" ใช่หรือไม่?`)) return;
  const all = DB.getInvoices().filter(i => i.invoiceNumber !== currentInvNum);
  DB.saveInvoices(all);
  DB.removeCapDeductionsByInvoice(currentInvNum);
  DB.logActivity(session.userId, session.username, 'ลบใบกำกับ', { invoiceNumber: currentInvNum });
  location.href = 'invoices.html';
}

// ── EDIT MODE ─────────────────────────────────────────────────────────────────
function initRows() {
  items = Array.from({ length: ROWS_PER_PAGE }, () => emptyItem());
  renderRows();
}

function emptyItem() {
  return { productId: '', name: '', brand: '', qty: '', unitSize: '', remainder: 0, price: '', total: 0 };
}

function getCustBrands(c) {
  if (Array.isArray(c.brands) && c.brands.length) return c.brands;
  if (c.brand) return [c.brand];
  return [];
}

function onCustomerChange() {
  const custId = document.getElementById('invCustomer').value;
  if (custId) {
    const cust = DB.getCustomerById(custId);
    if (cust) {
      const brands = getCustBrands(cust);
      const defaultBrand = brands.length === 1 ? brands[0] : '';
      items.forEach(item => { if (!item.brand && item.name) item.brand = defaultBrand; });
    }
  }
  _deductReturnIds = [];
  checkCustomerBalance(custId);
  checkPendingReturns(custId);
  refreshPrices();
}

// Unit price for a deduct line: customer's current price as of the invoice
// date (same chain as normal lines), falling back to the product default.
function _returnUnitPrice(productId) {
  const custId   = document.getElementById('invCustomer').value;
  const shipping = document.getElementById('invShipping').value;
  let p = null;
  try { p = DB.getPriceAsOf(productId, custId, shipping, _selectedInvISO()); } catch (e) {}
  if (p == null || p === '') {
    const prod = DB.getProductById(productId);
    p = prod ? (prod.defaultPrice || 0) : 0;
  }
  return parseFloat(p) || 0;
}

let _returnDetails = [];   // [{ id, items:[{productId,productName,qty,price}], total, sourceInvoice, reason, returnDate }]

function checkPendingReturns(custId) {
  const alertDiv = document.getElementById('returnsAlert');
  _returnDetails = [];
  if (!custId) { alertDiv.innerHTML = ''; return; }

  const pending = DB.getPendingReturns().filter(r => r.customerId === custId);
  if (!pending.length) { alertDiv.innerHTML = ''; return; }

  _returnDetails = pending.map(r => {
    // Multi-item returns store items[]; older records only the legacy first item.
    const its = (r.items && r.items.length)
      ? r.items
      : [{ productId: r.productId, productName: r.productName, qty: r.qty }];
    const priced = its.map(it => ({ ...it, price: _returnUnitPrice(it.productId) }));
    const total = priced.reduce((s, it) => s + (parseFloat(it.qty) || 0) * it.price, 0);
    return { id: r.id, items: priced, total,
             sourceInvoice: r.sourceInvoice || '', reason: r.reason || '',
             returnDate: r.returnDate || '' };
  });

  const rows = _returnDetails.map((d, idx) => `
    <tr>
      <td class="text-center">
        <input type="checkbox" class="return-chk form-check-input" data-idx="${idx}" data-id="${d.id}" id="rchk${idx}" checked onchange="updateReturnBtn()">
      </td>
      <td class="text-muted small">${d.returnDate ? Utils.formatDateTH(d.returnDate) : '-'}</td>
      <td><label for="rchk${idx}" style="cursor:pointer;margin:0">${d.items.map(it => `${it.productName || '-'} × ${it.qty}`).join(', ')}</label></td>
      <td class="text-muted small">${d.sourceInvoice || '-'}</td>
      <td class="text-muted small">${d.reason || '-'}</td>
      <td class="text-end text-danger fw-semibold">−${Utils.formatNumber(d.total)}</td>
    </tr>`).join('');

  alertDiv.innerHTML = `
    <div class="alert alert-danger p-2 mb-0">
      <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
        <i class="bi bi-arrow-return-left"></i>
        <strong>ลูกค้ามีรายการคืนสินค้า รอหักออก ${pending.length} รายการ</strong>
        <button id="addReturnsBtn" class="btn btn-sm btn-danger ms-auto" onclick="addSelectedReturns()">
          <i class="bi bi-plus-circle me-1"></i>เพิ่มที่เลือกลงใบใหม่ (<span id="returnBtnCount"></span>)
        </button>
      </div>
      <table class="table table-sm table-bordered mb-1" style="font-size:12px;background:#fff">
        <thead>
          <tr>
            <th style="width:32px"><input type="checkbox" class="form-check-input" id="rchkAll" checked onchange="toggleAllReturns(this.checked)"></th>
            <th>วันที่คืน</th>
            <th>สินค้า / จำนวน</th>
            <th>ใบกำกับต้นทาง</th>
            <th>สาเหตุ</th>
            <th class="text-end">ยอดหัก (ราคาปัจจุบัน)</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="small text-muted">ราคาหักคิดจากราคาปัจจุบันของลูกค้า — แก้ไขได้ในตารางสินค้าหลังเพิ่ม</div>
    </div>`;
  updateReturnBtn();
}

function toggleAllReturns(checked) {
  document.querySelectorAll('.return-chk').forEach(el => el.checked = checked);
  updateReturnBtn();
}

function updateReturnBtn() {
  const checked = [...document.querySelectorAll('.return-chk:checked')];
  const btn = document.getElementById('addReturnsBtn');
  const countEl = document.getElementById('returnBtnCount');
  if (!btn) return;
  const sum = checked.reduce((s, el) => s + (_returnDetails[+el.dataset.idx]?.total || 0), 0);
  countEl.textContent = checked.length === 0 ? 'ไม่มีที่เลือก'
    : `${checked.length} รายการ, −${Utils.formatNumber(sum)} บ.`;
  btn.disabled = checked.length === 0;
  const all = document.querySelectorAll('.return-chk');
  const chkAll = document.getElementById('rchkAll');
  if (chkAll) {
    chkAll.indeterminate = checked.length > 0 && checked.length < all.length;
    chkAll.checked = checked.length === all.length;
  }
}

function addSelectedReturns() {
  const checked = [...document.querySelectorAll('.return-chk:checked')];
  if (!checked.length) return;

  const added = [];
  let deductSum = 0;
  checked.forEach(el => {
    const d = _returnDetails[+el.dataset.idx];
    if (!d) return;

    // One negative line per returned product (a return may hold several items).
    d.items.forEach(it => {
      let idx = items.findIndex(item => !item.name && !item.qty);
      if (idx === -1) { items.push(emptyItem()); idx = items.length - 1; }
      const prod = it.productId ? DB.getProductById(it.productId) : null;
      items[idx].name = `หักคืน ${it.productName || '-'}${d.sourceInvoice ? ` (จากใบ ${d.sourceInvoice})` : ''}`;
      items[idx].qty = it.qty;
      items[idx].unitSize = prod ? (prod.unitSize || 1) : 1;
      items[idx].remainder = 0;
      items[idx].price = (-it.price).toFixed(2);   // negative = deduction; editable after
      items[idx].total = -(parseFloat(it.qty) || 0) * it.price;
      deductSum += items[idx].total;
      added.push(`${it.productName} × ${it.qty}`);
    });
    if (!_deductReturnIds.includes(d.id)) _deductReturnIds.push(d.id);
  });

  renderRows();
  try {
    const cust = DB.getCustomerById(document.getElementById('invCustomer').value);
    DB.logActivity(session.userId, session.username, 'โหลดรายการคืนลงใบกำกับ', {
      customer: cust ? cust.name : '', items: added.join(', '),
      returns: _deductReturnIds.length, amount: deductSum.toFixed(2),
    });
  } catch (e) {}
  document.getElementById('returnsAlert').innerHTML = `
    <div class="alert alert-success p-2 mb-0">
      <i class="bi bi-check-circle me-1"></i>เพิ่มรายการหักคืน ${added.length} บรรทัด (−${Utils.formatNumber(Math.abs(deductSum))} บ.) —
      รายการคืนจะถูกปิดอัตโนมัติเมื่อบันทึกใบกำกับ
    </div>`;
}

// store details for use by addBalanceRow()
let _balanceDetails = [];

// pending return IDs the user chose to deduct in this invoice
let _deductReturnIds = [];

function checkCustomerBalance(custId) {
  const alertDiv = document.getElementById('balanceAlert');
  if (!custId) { alertDiv.innerHTML = ''; _balanceDetails = []; return; }

  const cust = DB.getCustomerById(custId);
  const allInvoices = DB.getInvoices().filter(i => i.customerId === custId);
  const invNums = [...new Set(allInvoices.map(i => i.invoiceNumber))];

  _balanceDetails = [];
  invNums.forEach(num => {
    const page1 = allInvoices.find(i => i.invoiceNumber === num && i.page === 1)
                || allInvoices.find(i => i.invoiceNumber === num);
    const total = parseFloat(page1.totalAmount) || 0;
    const paid  = DB.getInvoicePaidAmount(num);
    const diff  = total - paid;
    if (Math.abs(diff) > 0.005) _balanceDetails.push({ num, total, paid, diff });
  });

  // Payment terms violations
  const payTermsViolHtml = (() => {
    const pt = cust && cust.payTerms;
    if (!pt || (!pt.maxBills && !pt.maxDays)) return '';
    const unpaidNums = invNums.filter(num => {
      const page1 = allInvoices.find(i => i.invoiceNumber === num && i.page === 1)
                  || allInvoices.find(i => i.invoiceNumber === num);
      if (!page1) return false;
      return DB.getInvoicePaidAmount(num) < (parseFloat(page1.totalAmount) || 0);
    });
    const viols = [];
    if (pt.maxBills && unpaidNums.length > pt.maxBills)
      viols.push(`ค้างชำระ <strong>${unpaidNums.length} บิล</strong> เกินกำหนด (สูงสุด ${pt.maxBills} บิล)`);
    if (pt.maxDays && unpaidNums.length > 0) {
      const now = Date.now();
      const oldestTs = Math.min(...unpaidNums.map(num => {
        const inv = allInvoices.find(i => i.invoiceNumber === num);
        return inv ? new Date(inv.createdAt).getTime() : now;
      }));
      const days = Math.floor((now - oldestTs) / 86400000);
      if (days > pt.maxDays)
        viols.push(`ค้างนานสุด <strong>${days} วัน</strong> เกินกำหนด (สูงสุด ${pt.maxDays} วัน)`);
    }
    if (!viols.length) return '';
    return `<div class="alert alert-danger p-2 mb-2">
      <div class="fw-semibold mb-1"><i class="bi bi-exclamation-triangle-fill me-1"></i>เงื่อนไขการชำระเงินเกินกำหนด</div>
      ${viols.map(v => `<div class="small">• ${v}</div>`).join('')}
    </div>`;
  })();

  if (_balanceDetails.length === 0) {
    alertDiv.innerHTML = payTermsViolHtml;
    return;
  }

  const netBalance = _balanceDetails.reduce((s, d) => s + d.diff, 0);
  const hasOwed  = _balanceDetails.some(d => d.diff > 0);
  const alertClass = hasOwed ? 'warning' : 'info';
  const icon = hasOwed ? 'exclamation-triangle-fill' : 'info-circle-fill';
  const title = `พบยอดค้างชำระ/เกิน ${_balanceDetails.length} ใบ (สุทธิ ${netBalance >= 0 ? '+' : ''}${Utils.formatNumber(netBalance)} บาท)`;

  const rows = _balanceDetails.map((d, idx) => `
    <tr>
      <td class="text-center">
        <input type="checkbox" class="balance-chk form-check-input" data-idx="${idx}" id="bchk${idx}" checked onchange="updateAddBtn()">
      </td>
      <td><label for="bchk${idx}" style="cursor:pointer;margin:0">${d.num}</label></td>
      <td class="text-end">${Utils.formatNumber(d.total)}</td>
      <td class="text-end">${Utils.formatNumber(d.paid)}</td>
      <td class="text-end ${d.diff > 0 ? 'text-danger fw-semibold' : 'text-success fw-semibold'}">${d.diff > 0 ? '+' : ''}${Utils.formatNumber(d.diff)}</td>
    </tr>`).join('');

  alertDiv.innerHTML = payTermsViolHtml + `
    <div class="alert alert-${alertClass} p-2 mb-0">
      <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
        <i class="bi bi-${icon}"></i>
        <strong>${title}</strong>
        <button id="addBalanceBtn" class="btn btn-sm btn-${hasOwed ? 'warning' : 'primary'} ms-auto" onclick="addSelectedBalances()">
          <i class="bi bi-plus-circle me-1"></i>เพิ่มที่เลือกลงใบใหม่ (<span id="addBalanceSummary"></span>)
        </button>
      </div>
      <table class="table table-sm table-bordered mb-0" style="font-size:12px;background:#fff">
        <thead>
          <tr>
            <th style="width:32px"><input type="checkbox" class="form-check-input" id="chkAll" checked onchange="toggleAllBalance(this.checked)"></th>
            <th>เลขที่ใบกำกับ</th>
            <th class="text-end">ยอดรวม</th>
            <th class="text-end">ชำระแล้ว</th>
            <th class="text-end">ส่วนต่าง</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  updateAddBtn();
}

function toggleAllBalance(checked) {
  document.querySelectorAll('.balance-chk').forEach(el => el.checked = checked);
  updateAddBtn();
}

function updateAddBtn() {
  const checked = [...document.querySelectorAll('.balance-chk:checked')];
  const net = checked.reduce((s, el) => s + _balanceDetails[+el.dataset.idx].diff, 0);
  const btn = document.getElementById('addBalanceBtn');
  const summary = document.getElementById('addBalanceSummary');
  if (!btn) return;
  const label = checked.length === 0 ? 'ไม่มีที่เลือก'
    : `${checked.length} ใบ, ${net >= 0 ? '+' : ''}${Utils.formatNumber(net)} บ.`;
  summary.textContent = label;
  btn.disabled = checked.length === 0;

  // update header checkbox state
  const all = document.querySelectorAll('.balance-chk');
  const chkAll = document.getElementById('chkAll');
  if (chkAll) chkAll.indeterminate = checked.length > 0 && checked.length < all.length;
  if (chkAll) chkAll.checked = checked.length === all.length;
}

function addSelectedBalances() {
  const checked = [...document.querySelectorAll('.balance-chk:checked')];
  if (checked.length === 0) return;

  const added = [];
  checked.forEach(el => {
    const d = _balanceDetails[+el.dataset.idx];
    const isOwed = d.diff > 0;
    const label = (isOwed ? 'ค้างชำระ ' : 'ชำระเกิน ') + d.num;

    let idx = items.findIndex(item => !item.name && !item.qty);
    if (idx === -1) { items.push(emptyItem()); idx = items.length - 1; }

    items[idx].name = label;
    items[idx].qty = 1;
    items[idx].unitSize = 1;
    items[idx].remainder = 0;
    items[idx].price = d.diff.toFixed(2);
    items[idx].total = d.diff;
    added.push(label);
  });

  renderRows();
  document.getElementById('balanceAlert').innerHTML = `
    <div class="alert alert-success p-2 mb-0">
      <i class="bi bi-check-circle me-1"></i>เพิ่ม ${added.length} รายการลงใบกำกับแล้ว: ${added.join(', ')}
    </div>`;
}

function refreshPrices() {
  // Changing customer/shipping/date re-prices everything (clears manual overrides),
  // applying volume tiers via recomputeAutoPrices.
  items.forEach(it => { it._manual = false; });
  recomputeAutoPrices();
  renderRows();
}

function renderRows() {
  const tbody = document.getElementById('itemRows');
  tbody.innerHTML = '';
  const custId = document.getElementById('invCustomer').value;
  const cust = custId ? DB.getCustomerById(custId) : null;
  const shipping = document.getElementById('invShipping').value;
  const products = DB.getProducts().slice().sort((a, b) => ((a.order ?? 1e9) - (b.order ?? 1e9)));

  items.forEach((item, i) => {
    const tr = document.createElement('tr');
    tr.className = 'item-row';
    const total = calcTotal(item);
    item.total = total;

    // Product selector options
    const prodOpts = '<option value="">— เลือกหรือพิมพ์ —</option>' +
      products.map(p => `<option value="${p.id}" ${item.productId===p.id?'selected':''}>${p.name}</option>`).join('');

    tr.innerHTML = `
      <td class="text-center text-muted">${i+1}</td>
      <td>
        <select onchange="onProductSelect(${i},this.value)" style="width:100%;font-size:12px;border:1px solid #dee2e6;border-radius:4px;padding:2px 4px">${prodOpts}</select>
        <input type="text" value="${item.name||''}" placeholder="หรือพิมพ์รายการ" oninput="items[${i}].name=this.value;updateTotal(${i})" style="margin-top:2px;width:100%;border:1px solid #dee2e6;border-radius:4px;padding:2px 5px;font-size:12px">
      </td>
      <td>${buildBrandCell(i, item.brand)}</td>
      <td><input type="number" value="${item.qty === 0 ? '0' : (item.qty || '')}" placeholder="0" step="any" oninput="items[${i}].qty=this.value;onQtyChange(${i})" class="text-center"></td>
      <td>
        <input type="number" value="${item.unitSize||''}" placeholder="0" min="0" oninput="items[${i}].unitSize=this.value;updateTotal(${i})" class="text-center">
        ${(() => { const p = item.productId ? DB.getProductById(item.productId) : null; const u = (p && p.unit) || Utils.productUnit(item.name); return u ? `<div style="font-size:10px;color:#6c757d;text-align:center;margin-top:1px">${u}</div>` : ''; })()}
      </td>
      <td><input type="number" value="${item.remainder||0}" placeholder="0" min="0" oninput="items[${i}].remainder=this.value;updateTotal(${i})" class="text-center"></td>
      <td><input type="number" id="priceInp${i}" value="${item.price||''}" placeholder="0.00" min="0" step="0.01" oninput="items[${i}].price=this.value;items[${i}]._manual=true;updateTotal(${i})" class="text-end"></td>
      <td class="text-end fw-semibold pe-2" id="rowTotal${i}">${total>0?'฿'+Utils.formatNumber(total):'-'}</td>
      <td class="text-center"><button class="btn btn-sm text-danger p-0" onclick="removeRow(${i})" title="ลบแถว"><i class="bi bi-x-circle"></i></button></td>
    `;
    tbody.appendChild(tr);
  });
  updateGrandTotal();
}

function onProductSelect(i, productId) {
  items[i].productId = productId;
  if (productId) {
    const p = DB.getProductById(productId);
    const custId = document.getElementById('invCustomer').value;
    const shipping = document.getElementById('invShipping').value;
    const cust = custId ? DB.getCustomerById(custId) : null;
    items[i].name = p.name;
    items[i].unitSize = p.unitSize;
    const custBrandsArr = cust ? getCustBrands(cust) : [];
    items[i].brand = custBrandsArr.length === 1 ? custBrandsArr[0] : '';
    items[i]._manual = false;
    items[i].price = (custId && shipping) ? (_effectivePriceForItem(items[i]) ?? DB.getPriceAsOf(productId, custId, shipping, _selectedInvISO())) : (p.defaultPrice || '');
  }
  renderRows();
}

function buildBrandCell(i, currentBrand) {
  const custId = document.getElementById('invCustomer').value;
  const cust = custId ? DB.getCustomerById(custId) : null;
  const brands = cust ? getCustBrands(cust) : [];

  if (brands.length === 0) {
    return `<input type="text" value="${currentBrand||''}" placeholder="ยี่ห้อ" oninput="items[${i}].brand=this.value" style="width:100%;border:1px solid #dee2e6;border-radius:4px;padding:2px 5px;font-size:13px">`;
  }

  const opts = brands.map(b =>
    `<option value="${b}" ${currentBrand===b?'selected':''}>${b}</option>`
  ).join('');
  const hasCustom = currentBrand && !brands.includes(currentBrand);
  return `
    <select onchange="items[${i}].brand=this.value;renderRows()" style="width:100%;font-size:13px;border:1px solid #dee2e6;border-radius:4px;padding:2px 4px">
      <option value="" ${!currentBrand?'selected':''}>— เลือก —</option>
      ${opts}
      ${hasCustom ? `<option value="${currentBrand}" selected>${currentBrand}</option>` : ''}
    </select>`;
}

function calcTotal(item) {
  const qty = parseFloat(item.qty) || 0;
  const unitSize = parseFloat(item.unitSize) || 0;
  const rem = parseFloat(item.remainder) || 0;
  const price = parseFloat(item.price) || 0;
  return (qty * unitSize + rem) * price;
}

function updateTotal(i) {
  items[i].total = calcTotal(items[i]);
  const el = document.getElementById('rowTotal' + i);
  if (el) el.textContent = items[i].total > 0 ? '฿' + Utils.formatNumber(items[i].total) : '-';
  updateGrandTotal();
}

function updateGrandTotal() {
  const total = items.reduce((s, item) => s + (item.total || 0), 0);
  document.getElementById('grandTotal').textContent = '฿' + Utils.formatNumber(total);
  document.getElementById('totalWords').textContent = Utils.numberToThaiWords(total);
}

// Effective unit price for a line: base price (as of invoice date) with the
// pricing rule's volume tier applied. Tier qty basis = this line's qty, or the
// total of that product across the whole invoice (rule.tierBasis === 'invoice').
// A product counts as a "ขวด" (bottle) when its unit contains ขวด (e.g. "ขวด/ห่อ")
// or its name starts with ขวด. Used by the "รวมขวดทั้งใบ" tier basis.
function _isBottleProduct(productId) {
  const p = productId ? DB.getProductById(productId) : null;
  if (!p) return false;
  const unit = p.unit || (Utils.productUnit ? Utils.productUnit(p.name) : '') || '';
  return unit.includes('ขวด') || (p.name || '').trim().startsWith('ขวด');
}

function _effectivePriceForItem(item) {
  const custId = document.getElementById('invCustomer').value;
  const shipping = document.getElementById('invShipping').value;
  if (!item.productId || !custId || !shipping) return null;
  const base = DB.getPriceAsOf(item.productId, custId, shipping, _selectedInvISO());
  const rule = DB.getPricingRule(item.productId, custId, shipping);
  let qty = parseFloat(item.qty) || 0;
  if (rule && rule.tierBasis === 'invoice') {
    // total of THIS product across all lines
    qty = items.filter(x => x.productId === item.productId).reduce((s, x) => s + (parseFloat(x.qty) || 0), 0);
  } else if (rule && rule.tierBasis === 'bottle') {
    // total of EVERY "ขวด" (bottle) product across all lines
    qty = items.reduce((s, x) => s + (_isBottleProduct(x.productId) ? (parseFloat(x.qty) || 0) : 0), 0);
  }
  return DB.applyTier(rule, base, qty);
}
// Recompute auto (non-manually-edited) line prices from rules + tiers.
function recomputeAutoPrices() {
  items.forEach(it => {
    if (!it._manual && it.productId) {
      const p = _effectivePriceForItem(it);
      if (p != null) it.price = p;
    }
  });
}
// Qty changed → tier thresholds may flip; re-price (respecting manual edits) and
// update price inputs + totals in place (no full re-render, to keep qty focus).
function onQtyChange(i) {
  recomputeAutoPrices();
  items.forEach((it, k) => {
    const inp = document.getElementById('priceInp' + k);
    if (inp && document.activeElement !== inp) inp.value = (it.price || it.price === 0) ? it.price : '';
    it.total = calcTotal(it);
    const tEl = document.getElementById('rowTotal' + k);
    if (tEl) tEl.textContent = it.total > 0 ? '฿' + Utils.formatNumber(it.total) : '-';
  });
  updateGrandTotal();
}

function addRow() {
  items.push(emptyItem());
  renderRows();
}

function removeRow(i) {
  if (items.length <= ROWS_PER_PAGE) {
    items[i] = emptyItem();
  } else {
    items.splice(i, 1);
  }
  renderRows();
}

// ── Copy invoice preview as image to clipboard ────────────────────────────────
async function copyInvoiceImage() {
  // Capture first invoice-preview page (skip watermark issues with multi-copy)
  const previewEl = document.querySelector('#invoicePreview .invoice-preview')
                 || document.querySelector('#previewArea .invoice-preview');
  if (!previewEl) { Utils.showAlert('ไม่พบใบกำกับที่จะคัดลอก', 'warning'); return; }
  Utils.showAlert('<i class="bi bi-hourglass-split me-1"></i>กำลังสร้างรูป...', 'info');
  try {
    const canvas = await html2canvas(previewEl, {
      scale: 2, useCORS: true, allowTaint: true, logging: false,
      backgroundColor: '#ffffff'
    });
    canvas.toBlob(async blob => {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        Utils.showAlert('<i class="bi bi-check-circle me-1"></i>คัดลอกใบกำกับเป็นรูปสำเร็จ — วางในไลน์/แอปอื่นได้เลย');
      } catch {
        // Clipboard API blocked (non-HTTPS / permission denied) → download
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = (currentInvNum || 'invoice') + '.png';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 3000);
        Utils.showAlert('<i class="bi bi-download me-1"></i>คัดลอกไม่ได้ — ดาวน์โหลดรูปแทน', 'info');
      }
    }, 'image/png');
  } catch(e) {
    Utils.showAlert('เกิดข้อผิดพลาด: ' + e.message, 'danger');
  }
}

// ── Check brand/size mismatch against recorded versions ───────────────────────
function checkVersionMismatch(customerId, activeItems) {
  if (!customerId) return [];
  const versions = DB.getVersions().filter(v => v.customerId === customerId);
  if (!versions.length) return [];
  const mismatches = [];
  const seen = new Set();
  activeItems.forEach(item => {
    if (!item.brand || !item.name) return;
    const key = item.brand + '|' + item.name;
    if (seen.has(key)) return;
    seen.add(key);
    const matched = versions.some(v => {
      const vBrand = v.brand || '';
      const vSize  = v.size  || '';
      return vBrand === item.brand &&
             (vSize === item.name || item.name.includes(vSize) || vSize.includes(item.name));
    });
    if (!matched) mismatches.push({ brand: item.brand, size: item.name });
  });
  return mismatches;
}

async function saveInvoice(shouldPrint = false) {
  if (editMode) { await saveInvoiceEdit(shouldPrint); return; }
  const customerId = document.getElementById('invCustomer').value;
  const shippingMethod = document.getElementById('invShipping').value;
  const dateVal = document.getElementById('invDate').value;
  if (!customerId) { Utils.showAlert('กรุณาเลือกลูกค้า', 'warning'); return; }
  if (!shippingMethod) { Utils.showAlert('กรุณาเลือกวิธีจัดส่ง', 'warning'); return; }

  const activeItems = items.filter(item => {
    if (!item.name) return false;
    const qty = parseFloat(item.qty) || 0;   // '' → 0 intentionally
    const rem = parseFloat(item.remainder) || 0;
    return qty !== 0 || rem !== 0;
  });
  if (activeItems.length === 0) { Utils.showAlert('กรุณากรอกรายการสินค้าอย่างน้อย 1 รายการ', 'warning'); return; }

  // Check cap stock minimum quantity
  const capWarnings = checkCapMinQty(activeItems);
  if (capWarnings.length) {
    const lines = capWarnings.map(w =>
      `• ${w.color}: สต๊อก ${Utils.formatNumber(w.currentStock)} → ${Utils.formatNumber(w.afterStock)} ลัง (ขั้นต่ำ ${Utils.formatNumber(w.minQty)} ลัง)`
    ).join('\n');
    if (!await Utils.confirm(`⚠️ สต๊อกฝาขวดต่ำกว่าขั้นต่ำที่กำหนด!\n\n${lines}\n\nยืนยันบันทึกใบกำกับต่อไปหรือไม่?`)) return;
  }

  const totalAmount = activeItems.reduce((s, item) => s + calcTotal(item), 0);
  const _dateISO  = Utils.parseBEToISO(dateVal) || Utils.todayInputValue();
  // Number prefix/run follows the chosen invoice DATE (continues that day's sequence)
  const invNumber = DB.generateInvoiceNumberForDate(_dateISO);
  const createdAt = new Date(_dateISO).toISOString();

  // Split into pages of 14 rows
  const chunks = [];
  for (let i = 0; i < activeItems.length; i += ROWS_PER_PAGE) {
    chunks.push(activeItems.slice(i, i + ROWS_PER_PAGE));
  }

  chunks.forEach((chunk, pageIdx) => {
    DB.addInvoice({
      id: Utils.uuid(),
      invoiceNumber: invNumber,
      page: pageIdx + 1,
      totalPages: chunks.length,
      customerId,
      shippingMethod,
      items: chunk.map(item => ({
        productId: item.productId,
        name: item.name,
        brand: item.brand,
        qty: parseFloat(item.qty) || 0,
        unitSize: parseFloat(item.unitSize) || 0,
        remainder: parseFloat(item.remainder) || 0,
        price: parseFloat(item.price) || 0,
        total: calcTotal(item)
      })),
      totalAmount,
      createdAt,
      createdBy: session.name,
      createdByUser: session.username,
      printCount: 0
    });
  });

  deductCapStock(invNumber, activeItems, createdAt, customerId);
  // Close out deducted returns: stamp the NEW invoice number + deduction date on
  // each return record (shows in the returns page "หักออกใบ" column) and log
  // readable detail (products + source invoices, not raw ids).
  _deductReturnIds.forEach(id => {
    const ret = DB.getReturnById(id);
    DB.updateReturn(id, { deductedInvoice: invNumber, deductedAt: new Date().toISOString() });
    if (ret) DB.logActivity(session.userId, session.username, 'หักคืนสินค้าในใบกำกับ', {
      invoiceNumber: invNumber,
      sourceInvoice: ret.sourceInvoice || '',
      items: ((ret.items && ret.items.length) ? ret.items : [{ productName: ret.productName, qty: ret.qty }])
        .map(it => `${it.productName} × ${it.qty}`).join(', '),
    });
  });
  _deductReturnIds = [];
  DB.logActivity(session.userId, session.username, 'สร้างใบกำกับ', { invoiceNumber: invNumber, totalAmount, customer: customerId });

  // Auto-save PDF
  const _pgs  = DB.getInvoices().filter(i => i.invoiceNumber === invNumber);
  const _cust = DB.getCustomerById(customerId);
  const _cfg  = DB.getSettings();
  let _pdfBody = '';
  ['ต้นฉบับ', 'สำเนา'].forEach((ct, ci) => {
    _pgs.forEach((pg, pi) => {
      if (ci > 0 || pi > 0) _pdfBody += '<div class="page-break"></div>';
      _pdfBody += buildInvoicePage(pg, _cust, _cfg, pg.page, _pgs.length, ct, 0, 0);
    });
  });
  const _fn = PdfGen.sanitize(_cust ? _cust.name : 'unknown') + '_' + PdfGen.sanitize(invNumber) + '.pdf';
  // If Sync not yet ready, schedule a retry push once it initialises so the
  // invoice reaches Firestore even when saved immediately after page load.
  const _syncReadyAtSave = window.Sync?.ready;
  if (!_syncReadyAtSave) {
    console.warn('[saveInvoice] Sync not ready at save time — scheduling retry push');
    const retryPush = () => { if (window.Sync?.ready) { console.log('[saveInvoice] retry push fired'); Sync.push('wt_invoices', DB.getInvoices()); } };
    window.addEventListener('sync:ready', retryPush, { once: true });
    setTimeout(retryPush, 5000);
  }

  // Commit the new invoice to Firestore immediately (not after the 600 ms debounce)
  // so it's uploaded before we navigate away; the upload bar shows progress.
  try { if (window.Sync && typeof Sync.flushNow === 'function') Sync.flushNow(); } catch (e) {}

  Utils.showAlert('<i class="bi bi-hourglass-split me-1"></i>กำลังสร้าง PDF...', 'info');
  await PdfGen.run(_pdfBody, _fn, invNumber);
  // Mark PDF as fresh so doPrint() can skip regeneration
  try { sessionStorage.setItem('freshPdf', JSON.stringify({ inv: invNumber, file: _fn })); } catch(e) {}

  if (shouldPrint) {
    // "บันทึก & พิมพ์" — navigate to view mode to trigger auto-print
    try { sessionStorage.setItem('autoPrint', invNumber); } catch(e) {}
    setTimeout(() => { location.href = 'invoice-create.html?view=' + invNumber; }, 1500);
  } else {
    // "บันทึก PDF" — go straight to invoice list to avoid race condition
    // where Tauri HDD write hasn't completed when ?view= calls DB.getInvoices()
    setTimeout(() => { location.href = 'invoices.html'; }, 1000);
  }
}

// ── CAP STOCK MIN-QTY CHECK (called before saving) ──────────────────────────
// Returns array of { color, currentStock, afterStock, minQty } for colors that
// would drop below their minimum after this invoice's deduction.
function checkCapMinQty(items) {
  const colors = DB.getCapColors();
  const warnings = [];
  colors.forEach(color => {
    if (!color.minQty || color.minQty <= 0) return;
    if (!color.productIds || !color.productIds.length) return;
    let deductQty = 0;
    items.forEach(item => {
      if (color.productIds.includes(item.productId))
        deductQty += parseFloat(item.qty) || 0;
    });
    if (deductQty <= 0) return;
    const currentStock = DB.getCapCurrentStock(color.id);
    const afterStock   = currentStock - deductQty;
    if (afterStock < color.minQty) {
      warnings.push({ color: color.color, colorCode: color.colorCode, currentStock, afterStock, minQty: color.minQty, deductQty });
    }
  });
  return warnings;
}

// ── CAP STOCK AUTO-DEDUCTION ─────────────────────────────────────────────────
function deductCapStock(invNumber, items, date, custId) {
  const colors = DB.getCapColors();
  if (!colors.length) return;
  const cust = DB.getCustomerById(custId);
  colors.forEach(color => {
    if (!color.productIds || !color.productIds.length) return;
    let totalQty = 0;
    items.forEach(item => {
      if (color.productIds.includes(item.productId)) {
        totalQty += parseFloat(item.qty) || 0;
      }
    });
    if (totalQty > 0) {
      DB.addCapDeduction({
        id:            Utils.uuid(),
        colorId:       color.id,
        color:         color.color,
        colorCode:     color.colorCode || '#6c757d',
        qty:           totalQty,
        invoiceNumber: invNumber,
        customerId:    custId,
        customerName:  cust ? cust.name : '',
        invoiceDate:   date,
        createdAt:     new Date().toISOString()
      });
    }
  });
}

// ── Conflict banner — shown when a remote device edits the same invoice ──────
function _showEditConflictBanner(type, remotePage) {
  const id = 'editConflictBanner';
  if (document.getElementById(id)) return; // don't stack duplicate banners

  const banner = document.createElement('div');
  banner.id        = id;
  banner.className = 'alert alert-warning alert-dismissible mb-3 no-print';
  banner.style.cssText = 'border-left:4px solid #e6a817;';

  let msg;
  if (type === 'deleted') {
    msg = '<i class="bi bi-trash text-warning me-2"></i>' +
          `<strong>ใบกำกับ ${currentInvNum} ถูกลบโดยอุปกรณ์อื่น</strong> — ` +
          'การแก้ไขของคุณไม่สามารถบันทึกได้';
  } else {
    const lastEdit = remotePage?.editHistory?.slice(-1)[0];
    const editor   = lastEdit?.by || 'ผู้ใช้อื่น';
    msg = '<i class="bi bi-exclamation-triangle text-warning me-2"></i>' +
          `<strong>ใบกำกับนี้ถูกแก้ไขโดย ${editor} ขณะที่คุณกำลังแก้ไขอยู่</strong> — ` +
          'การบันทึกจะทับข้อมูลล่าสุด &nbsp; ' +
          `<a href="invoice-create.html?view=${currentInvNum}" class="alert-link fw-semibold">` +
          '<i class="bi bi-eye me-1"></i>ดูเวอร์ชันล่าสุด</a>';
  }
  banner.innerHTML = msg +
    '<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>';

  // Insert right after alertBox so it appears between the header and the form
  document.getElementById('alertBox').insertAdjacentElement('afterend', banner);
}

// ── EDIT MODE (load existing invoice into form) ───────────────────────────────
async function loadEdit(invNum) {
  editMode = true;
  currentInvNum = invNum;
  document.getElementById('pageTitle').textContent = `แก้ไขใบกำกับ: ${invNum}`;
  document.getElementById('editForm').style.display = '';
  document.getElementById('editTable').style.display = '';
  document.getElementById('saveBtnRow').style.display = '';  // show in edit mode

  // Retry up to 4 s (same race-condition guard as loadView)
  let pages = DB.getInvoices().filter(i => i.invoiceNumber === invNum);
  if (!pages.length) {
    for (let t = 0; t < 8 && !pages.length; t++) {
      await new Promise(r => setTimeout(r, 500));
      pages = DB.getInvoices().filter(i => i.invoiceNumber === invNum);
    }
  }
  if (!pages.length) { Utils.showAlert(`ไม่พบใบกำกับ ${invNum}`, 'danger'); return; }

  const first = pages[0];
  // Snapshot the current editCount — any remote update that increments this triggers the conflict banner
  _editBaseEditCount = first.editCount || 0;
  _editSaving = false;
  document.getElementById('invNumber').value  = invNum;
  if (_fpInvDate) _fpInvDate.setDate(first.createdAt ? first.createdAt.slice(0, 10) : new Date());
  else document.getElementById('invDate').value = first.createdAt ? Utils.isoToBE(first.createdAt) : Utils.todayBE();
  setCustomerById(first.customerId);
  document.getElementById('invShipping').value = first.shippingMethod;

  items = pages.flatMap(p => p.items || []).map(item => ({
    productId: item.productId || '',
    name:      item.name      || '',
    brand:     item.brand     || '',
    qty:       item.qty != null && item.qty !== '' ? item.qty : '',
    unitSize:  item.unitSize  || '',
    remainder: item.remainder || 0,
    price:     item.price     || '',
    total:     item.total     || 0
  }));
  while (items.length < ROWS_PER_PAGE) items.push(emptyItem());
  renderRows();

  document.getElementById('toolbarBtns').innerHTML = `
    <button class="btn btn-outline-secondary btn-sm" onclick="location.href='invoice-create.html?view=${invNum}'">
      <i class="bi bi-arrow-left me-1"></i>ยกเลิก
    </button>`;

  // Update preview button label for edit mode
  const previewBtn = document.getElementById('previewBtn');
  if (previewBtn) previewBtn.innerHTML = '<i class="bi bi-eye me-1"></i>ดูตัวอย่างการแก้ไข';

  const ec = first.editCount || 0;
  Utils.showAlert(`กำลังแก้ไขใบกำกับ ${invNum} (แก้ไขมาแล้ว ${ec} ครั้ง)`, 'warning');
}

async function saveInvoiceEdit(shouldPrint = false) {
  const customerId     = document.getElementById('invCustomer').value;
  const shippingMethod = document.getElementById('invShipping').value;
  const dateVal        = document.getElementById('invDate').value;
  if (!customerId)     { Utils.showAlert('กรุณาเลือกลูกค้า', 'warning'); return; }
  if (!shippingMethod) { Utils.showAlert('กรุณาเลือกวิธีจัดส่ง', 'warning'); return; }

  const activeItems = items.filter(item => {
    if (!item.name) return false;
    const qty = parseFloat(item.qty) || 0;   // '' → 0 intentionally
    const rem = parseFloat(item.remainder) || 0;
    return qty !== 0 || rem !== 0;
  });
  if (!activeItems.length) { Utils.showAlert('กรุณากรอกรายการสินค้าอย่างน้อย 1 รายการ', 'warning'); return; }

  // Check cap stock minimum quantity (re-deduction: current stock already excludes old deduction)
  const capWarningsEdit = checkCapMinQty(activeItems);
  if (capWarningsEdit.length) {
    const lines = capWarningsEdit.map(w =>
      `• ${w.color}: สต๊อก ${Utils.formatNumber(w.currentStock)} → ${Utils.formatNumber(w.afterStock)} ลัง (ขั้นต่ำ ${Utils.formatNumber(w.minQty)} ลัง)`
    ).join('\n');
    if (!await Utils.confirm(`⚠️ สต๊อกฝาขวดต่ำกว่าขั้นต่ำที่กำหนด!\n\n${lines}\n\nยืนยันบันทึกการแก้ไขต่อไปหรือไม่?`)) return;
  }

  const existingPages = DB.getInvoices().filter(i => i.invoiceNumber === currentInvNum);
  const meta          = existingPages[0] || {};
  const newEditCount  = (meta.editCount || 0) + 1;
  const editHistory   = [...(meta.editHistory || []), {
    at:     new Date().toISOString(),
    by:     session.name,
    byUser: session.username
  }];

  const totalAmount = activeItems.reduce((s, item) => s + calcTotal(item), 0);
  const _editDateISO = Utils.parseBEToISO(dateVal) || Utils.todayInputValue();
  const createdAt    = new Date(_editDateISO).toISOString() || (meta.createdAt || new Date().toISOString());
  const chunks = [];
  for (let i = 0; i < activeItems.length; i += ROWS_PER_PAGE) chunks.push(activeItems.slice(i, i + ROWS_PER_PAGE));

  // Build the new pages array first, then write once — avoids an intermediate state
  // where the invoice is absent from wt_invoices (which caused the list to flash empty
  // on invoices.html if Sync or a re-render fired between the remove and re-add).
  const newPages = chunks.map((chunk, pageIdx) => ({
    id:            Utils.uuid(),
    invoiceNumber: currentInvNum,
    page:          pageIdx + 1,
    totalPages:    chunks.length,
    customerId,
    shippingMethod,
    items: chunk.map(item => ({
      productId: item.productId,
      name:      item.name,
      brand:     item.brand,
      qty:       parseFloat(item.qty)       || 0,
      unitSize:  parseFloat(item.unitSize)  || 0,
      remainder: parseFloat(item.remainder) || 0,
      price:     parseFloat(item.price)     || 0,
      total:     calcTotal(item)
    })),
    totalAmount,
    createdAt,
    createdBy:      meta.createdBy      || session.name,
    createdByUser:  meta.createdByUser  || session.username,
    printCount:     meta.printCount     || 0,
    printHistory:   meta.printHistory   || [],
    editCount:      newEditCount,
    editHistory
  }));
  // Suppress conflict banner for our own save — the sync:updated that fires
  // after this write is our own echo, not a concurrent change from another device.
  _editSaving = true;
  // Replace old pages with new pages in one atomic DB write
  DB.saveInvoices([...newPages, ...DB.getInvoices().filter(i => i.invoiceNumber !== currentInvNum)]);

  DB.removeCapDeductionsByInvoice(currentInvNum);
  deductCapStock(currentInvNum, activeItems, createdAt, customerId);
  _deductReturnIds.forEach(id => {
    const ret = DB.getReturnById(id);
    DB.updateReturn(id, { deductedInvoice: currentInvNum, deductedAt: new Date().toISOString() });
    if (ret) DB.logActivity(session.userId, session.username, 'หักคืนสินค้าในใบกำกับ', {
      invoiceNumber: currentInvNum,
      sourceInvoice: ret.sourceInvoice || '',
      items: ((ret.items && ret.items.length) ? ret.items : [{ productName: ret.productName, qty: ret.qty }])
        .map(it => `${it.productName} × ${it.qty}`).join(', '),
    });
  });
  _deductReturnIds = [];
  DB.logActivity(session.userId, session.username, 'แก้ไขใบกำกับ', { invoiceNumber: currentInvNum, editCount: newEditCount });

  // Auto-save PDF
  const _ePgs  = DB.getInvoices().filter(i => i.invoiceNumber === currentInvNum);
  const _eCust = DB.getCustomerById(customerId);
  const _eCfg  = DB.getSettings();
  let _ePdfBody = '';
  ['ต้นฉบับ', 'สำเนา'].forEach((ct, ci) => {
    _ePgs.forEach((pg, pi) => {
      if (ci > 0 || pi > 0) _ePdfBody += '<div class="page-break"></div>';
      _ePdfBody += buildInvoicePage(pg, _eCust, _eCfg, pg.page, _ePgs.length, ct, 0, newEditCount);
    });
  });
  const _eFn = PdfGen.sanitize(_eCust ? _eCust.name : 'unknown') + '_' + PdfGen.sanitize(currentInvNum) + '.pdf';
  // Commit edits to Firestore immediately before navigating; upload bar shows progress.
  try { if (window.Sync && typeof Sync.flushNow === 'function') Sync.flushNow(); } catch (e) {}
  Utils.showAlert('<i class="bi bi-hourglass-split me-1"></i>กำลังสร้าง PDF...', 'info');
  await PdfGen.run(_ePdfBody, _eFn);
  try { sessionStorage.setItem('freshPdf', JSON.stringify({ inv: currentInvNum, file: _eFn })); } catch(e) {}
  if (shouldPrint) { try { sessionStorage.setItem('autoPrint', currentInvNum); } catch(e) {} }

  setTimeout(() => { location.href = 'invoice-create.html?view=' + currentInvNum; }, 1500);
}

function buildHistorySection(page) {
  const ph = page.printHistory || [];
  const eh = page.editHistory  || [];
  const ec = page.editCount    || 0;
  const pc = page.printCount   || 0;
  if (!ph.length && !eh.length) return '';

  const editRows = eh.map((e, i) => `
    <li class="small text-muted py-1 border-bottom">
      <i class="bi bi-pencil text-warning me-1"></i>
      <strong>ครั้งที่ ${i + 1}</strong> &nbsp;${Utils.formatDateTimeTH(e.at)} — ${e.by} (${e.byUser})
    </li>`).join('');

  const printRows = ph.map((p, i) => `
    <li class="small text-muted py-1 border-bottom">
      <i class="bi bi-printer text-primary me-1"></i>
      <strong>ครั้งที่ ${i + 1}</strong> &nbsp;${Utils.formatDateTimeTH(p.at)} — ${p.by} (${p.byUser})
    </li>`).join('');

  return `
    <div class="card mt-3 no-print">
      <div class="card-header bg-light py-2 d-flex align-items-center gap-2 fw-semibold">
        <i class="bi bi-clock-history text-primary"></i>ประวัติใบกำกับ
        ${ec > 0 ? `<span class="badge bg-warning text-dark ms-1">แก้ไข ${ec} ครั้ง</span>` : ''}
        ${pc > 0 ? `<span class="badge bg-info text-dark ms-1">พิมพ์ ${pc} ครั้ง</span>` : ''}
      </div>
      <div class="card-body py-2 row g-3">
        ${eh.length ? `
        <div class="col-md-6">
          <h6 class="fw-semibold small mb-1"><i class="bi bi-pencil me-1 text-warning"></i>ประวัติการแก้ไข</h6>
          <ul class="list-unstyled mb-0">${editRows}</ul>
        </div>` : ''}
        ${ph.length ? `
        <div class="col-md-6">
          <h6 class="fw-semibold small mb-1"><i class="bi bi-printer me-1 text-primary"></i>ประวัติการพิมพ์</h6>
          <ul class="list-unstyled mb-0">${printRows}</ul>
        </div>` : ''}
      </div>
    </div>`;
}

// ── PREVIEW / PRINT RENDER ────────────────────────────────────────────────────
function _sanitizeFilename(s) {
  return String(s || '').replace(/[\\/:*?"<>|\x00-\x1f]/g, '_').replace(/_+/g, '_').trim();
}

async function renderPreview(pages) {
  const cfg = DB.getSettings();
  const customers = DB.getCustomers();
  const firstPage = pages[0];
  const cust = customers.find(c => c.id === firstPage.customerId);
  const totalPages = firstPage.totalPages || pages.length;
  const paid = DB.getInvoicePaidAmount(firstPage.invoiceNumber);
  const total = parseFloat(firstPage.totalAmount) || 0;
  const remaining = total - paid;
  const editCount   = firstPage.editCount   || 0;
  const reprintCount = firstPage.printCount || 0;

  // Payment status card (shared)
  const statusHtml = `
    <div class="card mt-3 no-print">
      <div class="card-body py-2 d-flex align-items-center gap-3 flex-wrap">
        <span class="fw-semibold">สถานะการชำระ:</span>
        <span>ยอดรวม: <strong>฿${Utils.formatNumber(total)}</strong></span>
        <span>ชำระแล้ว: <strong class="text-success">฿${Utils.formatNumber(paid)}</strong></span>
        <span>ค้าง: <strong class="${remaining>0?'text-danger':'text-success'}">฿${Utils.formatNumber(remaining)}</strong></span>
        ${remaining>0 ? `<a href="payments.html?inv=${firstPage.invoiceNumber}" class="btn btn-sm btn-success ms-auto"><i class="bi bi-cash-coin me-1"></i>บันทึกชำระ</a>` : '<span class="badge bg-success ms-auto">ชำระครบแล้ว</span>'}
      </div>
    </div>`;

  // ── PDF-imported invoice: try to show saved PDF file ──────────────────────
  if (firstPage.importedFrom === 'pdf') {
    const custName  = cust ? cust.name : (firstPage.customerName || '');
    const invNum    = firstPage.invoiceNumber || '';
    const pdfName   = _sanitizeFilename(custName) + '_' + _sanitizeFilename(invNum) + '.pdf';
    let blobUrl = null;
    try {
      const dirHandle = await IDB.get('pdf_dir');
      if (dirHandle) {
        const perm = await dirHandle.requestPermission({ mode: 'read' });
        if (perm === 'granted') {
          try {
            const fh   = await dirHandle.getFileHandle(pdfName);
            const file = await fh.getFile();
            blobUrl = URL.createObjectURL(file);
          } catch(e) { /* file not found */ }
        }
      }
    } catch(e) { console.warn('renderPreview PDF load:', e); }

    if (blobUrl) {
      const iframeHtml = `
        <div class="invoice-preview p-0" style="overflow:hidden;border-radius:8px;">
          <div class="d-flex align-items-center gap-2 px-3 py-2 no-print" style="background:#f8f9fa;border-bottom:1px solid #dee2e6">
            <i class="bi bi-file-earmark-pdf text-danger fs-5"></i>
            <span class="fw-semibold small">${pdfName}</span>
            <a href="${blobUrl}" download="${pdfName}" class="btn btn-sm btn-outline-secondary ms-auto">
              <i class="bi bi-download me-1"></i>ดาวน์โหลด
            </a>
          </div>
          <iframe src="${blobUrl}" style="width:100%;height:70vh;border:none;display:block"></iframe>
        </div>`;
      document.getElementById('invoicePreview').innerHTML = iframeHtml + statusHtml + buildHistorySection(firstPage);
      return;
    }
    // File not found — fall through to HTML preview with a notice
    console.info('PDF file not found in folder, falling back to HTML preview:', pdfName);
  }

  // ── Default: HTML preview ─────────────────────────────────────────────────
  let html = '';
  pages.forEach((page, pi) => {
    if (pi > 0) html += '<div style="margin-top:12px"></div>';
    html += buildInvoicePage(page, cust, cfg, page.page, totalPages, 'Preview Only', reprintCount, editCount);
  });

  document.getElementById('invoicePreview').innerHTML = html + statusHtml + buildHistorySection(firstPage);
}

    <div style="flex:1"></div>
    <!-- Above-footer labels -->
    <div style="display:flex;justify-content:space-between;align-items:flex-end;font-size:9px;margin-bottom:2px">
      <span style="color:#888">${editCount > 0 ? `แก้ไขแล้ว ${editCount} ครั้ง` : ''}</span>
      <span style="color:#cc0000;font-weight:bold;font-size:10px">${reprintCount > 0 ? `พิมพ์ซ้ำครั้งที่ ${reprintCount}` : ''}</span>
    </div>
    <!-- Footer: issued left, page number right -->
    <div style="display:flex;justify-content:space-between;align-items:flex-end;font-size:9px;color:#999;margin-top:2px">
      <span>issued : ${Utils.formatDateTimeTH(page.createdAt)}</span>
      <span>หน้าที่ ${pageNum}/${totalPages}</span>
    </div>
  </div>`;
}
</script>
</body>
</html>
