<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const session = Auth.require();

let _cards = [];
let _custs  = [];

window.addEventListener('DOMContentLoaded', () => {
  _custs = DB.getCustomers();

/* ─── File Handling ─────────────────────────────────────────────────────── */
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (files.length) handleFiles(files);
  else Utils.showAlert('กรุณาเลือกไฟล์ PDF เท่านั้น', 'warning');
}

async function handleFiles(filesInput) {
  const files = Array.from(filesInput);
  const total = files.length;
  document.getElementById('clearBtn').classList.remove('d-none');
  for (let i = 0; i < total; i++) {
    setProgress(true, files[i].name, i, total);
    await processPDF(files[i]);
    setProgress(true, files[i].name, i + 1, total);
  }
  setProgress(false);
  updateSaveBtn();
}

async function processPDF(file) {
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    for (let pn = 1; pn <= pdf.numPages; pn++) {
      const page    = await pdf.getPage(pn);

      // Render page to canvas for visual preview
      const viewport = page.getViewport({ scale: 1.8 });
      const canvas   = document.createElement('canvas');
      canvas.width   = viewport.width;
      canvas.height  = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      const pageImageUrl = canvas.toDataURL('image/png');

      const content = await page.getTextContent();
      // Reconstruct text by grouping items on the same y-line (PDF coords bottom-up)
      const lineMap = {};
      for (const item of content.items) {
        const y = Math.round(item.transform[5] / 4) * 4;
        if (!lineMap[y]) lineMap[y] = [];
        lineMap[y].push({ x: item.transform[4], s: item.str });
      }
      const text = Object.keys(lineMap).map(Number).sort((a,b)=>b-a)
        .map(y => lineMap[y].sort((a,b)=>a.x-b.x).map(i=>i.s).join(' ').trim())
        .filter(l => l.length > 0).join('\n');
      if (text.trim().length < 10) continue;
      // Extract customer name from filename: remove extension, then strip numbers & special chars
      const fileHint = file.name
        .replace(/\.pdf$/i, '')
        .replace(/[^ก-๙a-zA-Z\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      const parsed = parseInvoice(text, fileHint);
      const ci     = _cards.length;
      _cards.push({
        ...parsed, saved: false,
        _buf:           pdf.numPages === 1 ? buf : null,  // keep original for single-page
        _pageImageUrl:  pageImageUrl,
        _canvasW:       canvas.width,
        _canvasH:       canvas.height,
        _totalPdfPages: pdf.numPages,
      });
      renderCard(parsed, ci, file.name, pn, pdf.numPages, pageImageUrl);
    }
  } catch (err) {
    document.getElementById('invoiceCards').insertAdjacentHTML('beforeend',
      `<div class="alert alert-danger mb-3"><i class="bi bi-exclamation-triangle me-1"></i>
       อ่านไฟล์ <strong>${esc(file.name)}</strong> ไม่สำเร็จ: ${esc(err.message)}</div>`);
  }
}

function setProgress(show, txt, current, total) {
  document.getElementById('progressWrap').classList.toggle('d-none', !show);
  if (!show) return;
  document.getElementById('progressText').textContent = txt || '';
  if (total) {
    document.getElementById('progressCounter').textContent = `${current} / ${total}`;
    document.getElementById('progressBar').style.width = `${Math.round(current / total * 100)}%`;
  }
}

/* ─── Parser ────────────────────────────────────────────────────────────── */
function parseInvoice(text, filenameCustHint) {
  const r = {
    invoiceNumber: '', invoiceDate: Utils.todayInputValue(),
    customerId: '', customerName: '',
    shippingMethod: 'จัดส่ง',
    totalAmount: 0,
    rawText: text,
    fields: {}
  };

  // ── Invoice number: DDMMYY-NNN or any common pattern ──
  const mNum = text.match(/\b(\d{6}-\d{3,4})\b/);
  if (mNum) { r.invoiceNumber = mNum[1]; r.fields.invoiceNumber = true; }

  // ── Date: DD/MM/YYYY or D/M/YYYY (BE → CE conversion) ──
  const mDate = text.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (mDate) {
    let y = parseInt(mDate[3]);
    if (y > 2500) y -= 543;
    r.invoiceDate = `${y}-${mDate[2].padStart(2,'0')}-${mDate[1].padStart(2,'0')}`;
    r.fields.invoiceDate = true;
  }

  // ── Shipping method ──
  if (text.includes('รับหน้าโรงงาน'))  { r.shippingMethod = 'รับหน้าโรงงาน';  r.fields.shippingMethod = true; }
  else if (text.includes('จัดส่ง') || text.includes('ณัฐวุฒิ')) {
    r.shippingMethod = text.includes('ณัฐวุฒิ') ? 'ณัฐวุฒิ' : 'จัดส่ง';
    r.fields.shippingMethod = true;
  }

  // ── Customer: priority 1 — match from filename hint (before "_") ──
  if (filenameCustHint) {
    let bestC = null, bestLen = 0;
    for (const c of _custs) {
      if (c.name && c.name.length > bestLen &&
          (c.name === filenameCustHint ||
           filenameCustHint.includes(c.name) ||
           c.name.includes(filenameCustHint))) {
        bestC = c; bestLen = c.name.length;
      }
    }
    if (bestC) {
      r.customerId = bestC.id; r.customerName = bestC.name; r.fields.customerId = true;
    } else {
      // Not in DB yet — prefill the text field so user sees the hint
      r.customerName = filenameCustHint;
    }
  }

  // ── Customer: priority 2 — scan text (only if filename gave nothing) ──
  if (!r.customerId) {
    let bestC = null, bestLen = 0;
    for (const c of _custs) {
      if (c.name && c.name.length > bestLen && text.includes(c.name)) {
        bestC = c; bestLen = c.name.length;
      }
    }
    if (bestC) { r.customerId = bestC.id; r.customerName = bestC.name; r.fields.customerId = true; }
  }

  // ── Total amount ──
  // Priority 1: label "รวมทั้งสิ้น" or "รวมทั้งหมด" or "ยอดรวม"
  const totalLabels = [/รวมทั้งสิ้น[^\d]*([\d,]+(?:\.\d{1,2})?)/,
                       /รวมทั้งหมด[^\d]*([\d,]+(?:\.\d{1,2})?)/,
                       /ยอดรวม[^\d]*([\d,]+(?:\.\d{1,2})?)/,
                       /total[^\d]*([\d,]+(?:\.\d{1,2})?)/i];
  let foundTotal = false;
  for (const re of totalLabels) {
    const m = text.match(re);
    if (m) {
      r.totalAmount = parseFloat(m[1].replace(/,/g,'')) || 0;
      if (r.totalAmount > 0) { r.fields.totalAmount = true; foundTotal = true; break; }
    }
  }
  // Priority 2: largest number in the text ≥ 10
  if (!foundTotal) {
    const allNums = [...text.matchAll(/([\d,]+\.\d{2})/g)]
      .map(m => parseFloat(m[1].replace(/,/g,'')))
      .filter(n => n >= 10 && !isNaN(n));
    if (allNums.length) {
      r.totalAmount = Math.max(...allNums);
      // only mark detected if the max stands out (not just any number)
      if (r.totalAmount > 0) r.fields.totalAmount = false; // flagged as unconfirmed
    }
  }

  return r;
}

/* ─── Card Rendering ────────────────────────────────────────────────────── */
function fieldClass(detected) {
  return detected ? 'field-parsed' : 'field-missing';
}
function fieldIcon(detected) {
  return detected
    ? '<i class="bi bi-check-circle-fill text-success conf-icon ms-1"></i>'
    : '<i class="bi bi-exclamation-circle-fill text-danger conf-icon ms-1"></i>';
}

function confBadge(f) {
  const detected = Object.values(f).filter(Boolean).length;
  const total    = 5;
  const [cls,lbl] = detected>=4?['success','อ่านได้ดี']:detected>=2?['warning','บางส่วน']:['danger','ต้องแก้ไข'];
  return `<span class="badge bg-${cls}">${lbl} (${detected}/${total})</span>`;
}

function renderCard(data, ci, fname, pn, totalPdf, pageImageUrl) {
  const wrap = document.createElement('div');
  wrap.className = 'card mb-4'; wrap.id = `card_${ci}`;
  wrap.innerHTML = `
<div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
  <div class="d-flex align-items-center gap-2">
    <div class="form-check mb-0">
      <input class="form-check-input" type="checkbox" id="sel_${ci}" checked onchange="updateSaveBtn()">
      <label class="form-check-label fw-semibold" for="sel_${ci}">
        <i class="bi bi-file-earmark-pdf text-danger me-1"></i>${esc(fname)} หน้า ${pn}/${totalPdf}
      </label>
    </div>
    ${confBadge(data.fields)}
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="collapse" data-bs-target="#raw_${ci}">
      <i class="bi bi-code-square me-1"></i>ข้อความดิบ
    </button>
    <button class="btn btn-sm btn-success" id="saveBtn_${ci}" onclick="saveSingleCard(${ci})">
      <i class="bi bi-save me-1"></i>บันทึก
    </button>
    <button class="btn btn-sm btn-outline-danger" onclick="closeCard(${ci})" title="ปิด">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
</div>
<div class="collapse" id="raw_${ci}">
  <div class="card-body border-bottom p-2"><pre class="raw-text mb-0">${esc(data.rawText)}</pre></div>
</div>
<div class="row g-0">
  <!-- PDF Visual Preview -->
  <div class="col-lg-4 border-end">
    <div class="pdf-canvas-wrap">
      ${pageImageUrl
        ? `<img src="${pageImageUrl}" alt="PDF preview หน้า ${pn}" style="width:100%;height:auto;display:block;box-shadow:0 2px 8px rgba(0,0,0,.18);">`
        : `<div class="text-muted small p-3"><i class="bi bi-image me-1"></i>ไม่มี preview</div>`}
    </div>
  </div>
  <!-- Form Fields -->
  <div class="col-lg-8">
    <div class="card-body">
      <div class="row g-3">

        <!-- เลขที่ใบกำกับ -->
        <div class="col-sm-5">
          <label class="form-label fw-semibold small">
            เลขที่ใบกำกับ <span class="text-danger">*</span>${fieldIcon(data.fields.invoiceNumber)}
          </label>
          <input type="text" class="form-control ${fieldClass(data.fields.invoiceNumber)}"
                 id="n_${ci}" value="${esc(data.invoiceNumber)}" placeholder="030569-001">
        </div>

        <!-- วันที่ (แสดงและรับเป็น พ.ศ. DD/MM/YYYY) -->
        <div class="col-sm-4">
          <label class="form-label fw-semibold small">
            วันที่ (พ.ศ.)${fieldIcon(data.fields.invoiceDate)}
          </label>
          <input type="text" class="form-control ${fieldClass(data.fields.invoiceDate)}"
                 id="d_${ci}" value="${ceToBeDisplay(data.invoiceDate)}"
                 placeholder="DD/MM/YYYY">
        </div>

        <!-- ลูกค้า (พิมพ์ค้นหาได้) -->
        <div class="col-12">
          <label class="form-label fw-semibold small">
            ลูกค้า <span class="text-danger">*</span>${fieldIcon(data.fields.customerId)}
          </label>
          <input type="text" class="form-control ${fieldClass(data.fields.customerId)}"
                 id="c_${ci}" list="custList_${ci}"
                 value="${esc(data.customerName)}"
                 placeholder="พิมพ์ชื่อลูกค้า..."
                 oninput="updateSaveBtn()">
          <datalist id="custList_${ci}">
            ${_custs.map(c => `<option value="${esc(c.name)}">`).join('')}
          </datalist>
        </div>

        <!-- วิธีจัดส่ง -->
        <div class="col-sm-5">
          <label class="form-label fw-semibold small">
            วิธีจัดส่ง${fieldIcon(data.fields.shippingMethod)}
          </label>
          <select class="form-select ${fieldClass(data.fields.shippingMethod)}" id="s_${ci}">
            <option value="จัดส่ง"${data.shippingMethod==='จัดส่ง'?' selected':''}>จัดส่ง</option>
            <option value="รับหน้าโรงงาน"${data.shippingMethod==='รับหน้าโรงงาน'?' selected':''}>รับหน้าโรงงาน</option>
            <option value="ณัฐวุฒิ"${data.shippingMethod==='ณัฐวุฒิ'?' selected':''}>ณัฐวุฒิ</option>
          </select>
        </div>

        <!-- ยอดเงินรวม -->
        <div class="col-sm-7">
          <label class="form-label fw-semibold small">
            ยอดเงินรวม (บาท) <span class="text-danger">*</span>${fieldIcon(data.fields.totalAmount)}
          </label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-currency-exchange"></i></span>
            <input type="number" class="form-control ${fieldClass(data.fields.totalAmount)}"
                   id="t_${ci}" value="${data.totalAmount ? data.totalAmount.toFixed(2) : ''}"
                   min="0" step="0.01" placeholder="0.00">
            <span class="input-group-text">฿</span>
          </div>
        </div>

        <!-- หมายเหตุ -->
        <div class="col-12">
          <label class="form-label fw-semibold small">หมายเหตุ</label>
          <input type="text" class="form-control form-control-sm" id="note_${ci}"
                 value="นำเข้าจาก pdf เก่า" placeholder="หมายเหตุ (ถ้ามี)">
        </div>

      </div>
    </div>
  </div>
</div>`;
  document.getElementById('invoiceCards').appendChild(wrap);
}

/* ─── Interactions ──────────────────────────────────────────────────────── */
function updateSaveBtn() {
  const n = _cards.filter((c,i) => {
    const el = document.getElementById(`sel_${i}`);
    return el && el.checked && !c.saved;
  }).length;
  document.getElementById('selectedCount').textContent = n;
  document.getElementById('saveAllBtn').classList.toggle('d-none', n === 0);
}

/* ─── Save ──────────────────────────────────────────────────────────────── */
function getCardData(ci) {
  const custName = document.getElementById(`c_${ci}`).value.trim();
  const cust     = findCustByName(custName) || {};
  const dateText = document.getElementById(`d_${ci}`).value.trim();
  const invoiceDate = beInputToCE(dateText) || Utils.todayInputValue();
  const rawAmt   = parseFloat(document.getElementById(`t_${ci}`).value) || 0;
  return {
    invoiceNumber:  document.getElementById(`n_${ci}`).value.trim(),
    invoiceDate,
    customerId:     cust.id || '',
    customerName:   cust.name || custName,
    shippingMethod: document.getElementById(`s_${ci}`).value,
    totalAmount:    parseFloat(rawAmt.toFixed(2)),
    note:           document.getElementById(`note_${ci}`).value.trim(),
  };
}

let _custWarnModal = null;

function saveSelectedInvoices() {
  // Collect selected cards with a typed name that's NOT in the DB
  const unknowns = [];
  for (let ci = 0; ci < _cards.length; ci++) {
    const sel = document.getElementById(`sel_${ci}`);
    if (!sel || !sel.checked || _cards[ci].saved) continue;
    const custName = document.getElementById(`c_${ci}`).value.trim();
    if (custName && !findCustByName(custName)) {
      unknowns.push({ ci, custName });
    }
  }

  if (unknowns.length) {
    document.getElementById('custWarnList').innerHTML = unknowns.map(({ ci, custName }) =>
      `<div class="d-flex align-items-center gap-2 p-2 mb-1 rounded border border-warning bg-warning bg-opacity-10">
         <i class="bi bi-person-x-fill text-warning fs-5"></i>
         <div>
           <div class="fw-semibold small">การ์ด ${ci + 1}</div>
           <div class="text-muted small">"${esc(custName)}" — ไม่พบในฐานข้อมูลลูกค้า</div>
         </div>
       </div>`
    ).join('');
    if (!_custWarnModal) _custWarnModal = new bootstrap.Modal(document.getElementById('custWarnModal'));
    _custWarnModal.show();
    return;
  }

  _doSave();
}

async function confirmSave() {
  if (_custWarnModal) _custWarnModal.hide();
  await _doSave();
}

async function _doSave() {
  let saved = 0;
  const errors = [];

  // Count how many cards are actually going to be saved
  const toSave = [];
  for (let ci = 0; ci < _cards.length; ci++) {
    const sel = document.getElementById(`sel_${ci}`);
    if (sel && sel.checked && !_cards[ci].saved) toSave.push(ci);
  }
  const total = toSave.length;
  if (total > 0) setProgress(true, 'กำลังบันทึก...', 0, total);

  for (let ci = 0; ci < _cards.length; ci++) {
    const sel = document.getElementById(`sel_${ci}`);
    if (!sel || !sel.checked || _cards[ci].saved) continue;

    const d = getCardData(ci);
    if (!d.invoiceNumber)    { errors.push(`การ์ด ${ci+1}: ต้องระบุเลขที่ใบกำกับ`); continue; }
    if (!d.customerId)       { errors.push(`การ์ด ${ci+1}: ไม่พบลูกค้า "${esc(d.customerName)}" ในฐานข้อมูล`); continue; }
    if (!(d.totalAmount > 0)){ errors.push(`การ์ด ${ci+1}: ต้องระบุยอดเงินรวม`); continue; }
    if (DB.getInvoicesByNumber(d.invoiceNumber).length) {
      errors.push(`${d.invoiceNumber}: มีอยู่ในระบบแล้ว`); continue;
    }

    const createdAt = d.invoiceDate
      ? new Date(d.invoiceDate).toISOString()
      : new Date().toISOString();

    DB.addInvoice({
      id:             Utils.uuid(),
      invoiceNumber:  d.invoiceNumber,
      page:           1,
      totalPages:     1,
      customerId:     d.customerId,
      shippingMethod: d.shippingMethod,
      items:          [],
      totalAmount:    d.totalAmount,
      note:           d.note,
      createdAt,
      createdBy:      session.name,
      createdByUser:  session.username,
      printCount:     0,
      importedFrom:   'pdf',
    });
    DB.logActivity(session.userId, session.username, 'นำเข้าใบกำกับจาก PDF',
      { invoiceNumber: d.invoiceNumber, customerName: d.customerName, totalAmount: d.totalAmount });

    // Save PDF file (original or per-page render)
    try { await savePdfForCard(ci, d); } catch(e) { console.warn('PDF save:', e); }

    _cards[ci].saved = true;
    sel.checked = false; sel.disabled = true;
    const card = document.getElementById(`card_${ci}`);
    card.classList.add('card-saved');
    card.querySelector('.card-header')
      .insertAdjacentHTML('beforeend',
        '<span class="badge bg-white text-success ms-2"><i class="bi bi-check-circle-fill"></i> บันทึกแล้ว</span>');
    saved++;
    if (total > 0) setProgress(true, `บันทึก: ${d.invoiceNumber || `การ์ด ${ci+1}`}`, saved, total);
  }

  if (total > 0) setProgress(false);
  let msg = `บันทึกสำเร็จ ${saved} ใบ`;
  if (errors.length) msg += `<br><small>${errors.map(e => `⚠️ ${e}`).join('<br>')}</small>`;
  Utils.showAlert(msg, saved ? 'success' : 'warning');
  updateSaveBtn();
}

function clearAll() {
  _cards = [];
  document.getElementById('invoiceCards').innerHTML = '';
  document.getElementById('clearBtn').classList.add('d-none');
  document.getElementById('saveAllBtn').classList.add('d-none');
  document.getElementById('pdfInput').value = '';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sanitizeFilename(s) {
  return String(s||'').replace(/[\\/:*?"<>|\x00-\x1f]/g,'_').replace(/_+/g,'_').trim();
}

async function savePdfBlob(blob, filename) {
  try {
    const handle = await IDB.get('pdf_dir');
    if (handle) {
      const perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        const fh = await handle.getFileHandle(filename, { create: true });
        const w  = await fh.createWritable();
        await w.write(blob); await w.close();
        return true;
      }
    }
  } catch(e) { console.warn('PDF folder save:', e); }
  // Fallback: browser download
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 3000);
  return false;
}

async function savePdfForCard(ci, d) {
  const card = _cards[ci];
  const fn = sanitizeFilename(d.customerName || 'unknown') + '_' +
             sanitizeFilename(d.invoiceNumber) + '.pdf';

  let blob;
  if (card._buf) {
    blob = new Blob([card._buf], { type: 'application/pdf' });
  } else {
    const { jsPDF } = window.jspdf;
    const dpi  = 96 * 1.8;
    const pdfW = (card._canvasW / dpi) * 25.4;
    const pdfH = (card._canvasH / dpi) * 25.4;
    const pdf  = new jsPDF({ orientation: pdfW < pdfH ? 'portrait' : 'landscape',
                             unit: 'mm', format: [pdfW, pdfH] });
    pdf.addImage(card._pageImageUrl, 'PNG', 0, 0, pdfW, pdfH);
    blob = pdf.output('blob');
  }

  // ── 1. อัปโหลดไปยัง Google Drive (ถ้า sign in แล้ว) ──────────────────────
  if (window.DriveStore?.ready) {
    try {
      const meta = await DriveStore.upload(blob, fn, {
        invoiceNumber: d.invoiceNumber,
        customerId:    d.customerId,
        type:          'pdf',
      });
      console.log('[Drive] PDF uploaded:', fn, meta.driveId);
      // บันทึก driveId ไว้กับใบกำกับด้วย (สำหรับดึงกลับมาใช้)
      try {
        const invs = DB.getInvoices();
        const inv  = invs.find(i => i.invoiceNumber === d.invoiceNumber);
        if (inv) {
          inv.driveFileId   = meta.driveId;
          inv.driveFileName = fn;
          inv.driveUploadAt = meta.uploadedAt;
          DB._set('wt_invoices', invs);
        }
      } catch(e) { console.warn('[Drive] meta save:', e); }
      return; // Drive ได้แล้ว ไม่ต้อง save local
    } catch (e) {
      console.warn('[Drive] upload failed — falling back to local:', e.message);
    }
  }

  // ── 2. Fallback → บันทึก local (เหมือนเดิม) ─────────────────────────────
  await savePdfBlob(blob, fn);
}

// Convert ISO date (CE) → DD/MM/YYYY display in BE year
function ceToBeDisplay(isoDate) {
  if (!isoDate) return '';
  const [y, m, d] = isoDate.split('-');
  return `${d}/${m}/${parseInt(y) + 543}`;
}

// Parse DD/MM/YYYY (BE or CE) typed by user → ISO CE string
function beInputToCE(txt) {
  const m = String(txt||'').trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return null;
  let y = parseInt(m[3]);
  if (y > 2500) y -= 543;
  return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
}

function closeCard(ci) {
  const card = document.getElementById(`card_${ci}`);
  if (card) card.remove();
  _cards[ci] = { ..._cards[ci], _closed: true, saved: true }; // treat as done so batch save ignores it
  updateSaveBtn();
}

// Find customer by exact name
function findCustByName(name) {
  return _custs.find(c => c.name === name.trim()) || null;
}

async function saveSingleCard(ci) {
  if (_cards[ci].saved) return;

  const d = getCardData(ci);
  if (!d.invoiceNumber)    { Utils.showAlert(`การ์ด ${ci+1}: ต้องระบุเลขที่ใบกำกับ`, 'warning'); return; }
  if (!d.customerId)       { Utils.showAlert(`การ์ด ${ci+1}: ไม่พบลูกค้า "${d.customerName}" ในฐานข้อมูล`, 'warning'); return; }
  if (!(d.totalAmount > 0)){ Utils.showAlert(`การ์ด ${ci+1}: ต้องระบุยอดเงินรวม`, 'warning'); return; }
  if (DB.getInvoicesByNumber(d.invoiceNumber).length) {
    Utils.showAlert(`${d.invoiceNumber}: มีอยู่ในระบบแล้ว`, 'warning'); return;
  }

  const btn = document.getElementById(`saveBtn_${ci}`);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>กำลังบันทึก...';

  const createdAt = d.invoiceDate ? new Date(d.invoiceDate).toISOString() : new Date().toISOString();
  DB.addInvoice({
    id: Utils.uuid(), invoiceNumber: d.invoiceNumber, page: 1, totalPages: 1,
    customerId: d.customerId, shippingMethod: d.shippingMethod, items: [],
    totalAmount: d.totalAmount, note: d.note, createdAt,
    createdBy: session.name, createdByUser: session.username, printCount: 0, importedFrom: 'pdf',
  });
  DB.logActivity(session.userId, session.username, 'นำเข้าใบกำกับจาก PDF',
    { invoiceNumber: d.invoiceNumber, customerName: d.customerName, totalAmount: d.totalAmount });

  try { await savePdfForCard(ci, d); } catch(e) { console.warn('PDF save:', e); }

  _cards[ci].saved = true;
  const sel = document.getElementById(`sel_${ci}`);
  if (sel) { sel.checked = false; sel.disabled = true; }
  const card = document.getElementById(`card_${ci}`);
  card.classList.add('card-saved');
  btn.disabled = true;
  btn.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i>บันทึกแล้ว';
  btn.classList.replace('btn-success', 'btn-outline-success');
  updateSaveBtn();
  Utils.showAlert(`บันทึก ${d.invoiceNumber} สำเร็จ`, 'success');
}
