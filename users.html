<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0d6efd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ใบกำกับ">
<title>จัดการผู้ใช้</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="./vendor/bootstrap.min.css">
<link rel="stylesheet" href="./vendor/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navContainer"></div>
<div class="page-wrap">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0 fw-bold"><i class="bi bi-person-gear me-2 text-primary"></i>จัดการผู้ใช้งาน</h5>
    <button class="btn btn-primary" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i>เพิ่มผู้ใช้</button>
  </div>
  <div id="alertBox" class="mb-2"></div>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead><tr>
          <th>#</th><th>ชื่อผู้ใช้</th><th>ชื่อ-นามสกุล</th>
          <th class="text-center">สิทธิ์</th><th class="text-center">สถานะ</th>
          <th>วันที่สร้าง</th><th>เข้าสู่ระบบล่าสุด</th><th class="text-center">จัดการ</th>
        </tr></thead>
        <tbody id="userTable"><tr><td colspan="8" class="text-center text-muted py-3">ยังไม่มีผู้ใช้</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- User Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">เพิ่มผู้ใช้ใหม่</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalAlert"></div>
        <input type="hidden" id="userId">
        <div class="mb-3">
          <label class="form-label fw-semibold">ชื่อผู้ใช้ (username) <span class="text-danger">*</span></label>
          <input type="text" id="uUsername" class="form-control" placeholder="ใช้ภาษาอังกฤษ ตัวเลข">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">ชื่อ-นามสกุล <span class="text-danger">*</span></label>
          <input type="text" id="uName" class="form-control" placeholder="ชื่อที่แสดงในระบบ">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" id="pwLabel">รหัสผ่าน <span class="text-danger">*</span></label>
          <div class="input-group">
            <input type="password" id="uPassword" class="form-control" placeholder="รหัสผ่านอย่างน้อย 6 ตัว">
            <button class="btn btn-outline-secondary" type="button" onclick="togglePw('uPassword','uEye')">
              <i class="bi bi-eye" id="uEye"></i>
            </button>
          </div>
          <div class="form-text" id="pwHint" style="display:none">เว้นว่างหากไม่ต้องการเปลี่ยนรหัสผ่าน</div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">สิทธิ์การใช้งาน <span class="text-danger">*</span></label>
          <select id="uRole" class="form-select">
            <option value="user">ผู้ใช้ทั่วไป (user)</option>
            <option value="admin">ผู้ดูแลระบบ (admin)</option>
          </select>
        </div>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="uActive" checked>
          <label class="form-check-label fw-semibold" for="uActive">เปิดใช้งาน</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
        <button class="btn btn-primary" onclick="saveUser()"><i class="bi bi-save me-1"></i>บันทึก</button>
      </div>
    </div>
  </div>
</div>

<!-- Permissions Modal -->
<div class="modal fade" id="permModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><i class="bi bi-shield-lock me-2"></i>กำหนดสิทธิ์: <span id="permModalName"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="permModalAlert"></div>
        <input type="hidden" id="permUserId">
        <p class="text-muted small mb-3">
          <i class="bi bi-info-circle me-1"></i>
          ผู้ดูแลระบบ (Admin) มีสิทธิ์เต็มทุกอย่างโดยอัตโนมัติ สิทธิ์นี้ใช้สำหรับผู้ใช้ทั่วไปเท่านั้น
        </p>
        <div id="permCheckboxes"></div>
        <div class="d-flex gap-2 mt-3 pt-3 border-top">
          <button class="btn btn-sm btn-outline-primary" onclick="selectAllPerms(true)">
            <i class="bi bi-check2-all me-1"></i>เลือกทั้งหมด
          </button>
          <button class="btn btn-sm btn-outline-secondary" onclick="selectAllPerms(false)">
            <i class="bi bi-x-lg me-1"></i>ยกเลิกทั้งหมด
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
        <button class="btn btn-primary" onclick="savePermissions()">
          <i class="bi bi-shield-check me-1"></i>บันทึกสิทธิ์
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Change own password modal -->
<div class="modal fade" id="pwModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">เปลี่ยนรหัสผ่านของฉัน</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="pwModalAlert"></div>
        <div class="mb-3">
          <label class="form-label fw-semibold">รหัสผ่านเดิม</label>
          <input type="password" id="oldPw" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">รหัสผ่านใหม่</label>
          <input type="password" id="newPw" class="form-control" placeholder="อย่างน้อย 6 ตัว">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">ยืนยันรหัสผ่านใหม่</label>
          <input type="password" id="confirmPw" class="form-control">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
        <button class="btn btn-primary" onclick="changeOwnPassword()">เปลี่ยนรหัสผ่าน</button>
      </div>
    </div>
  </div>
</div>

<script src="./vendor/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script><script src="db.js"></script><script src="auth.js"></script><script src="nav.js"></script>
<script>
const session = Auth.require();
if (!Auth.isAdmin()) { alert('เฉพาะผู้ดูแลระบบเท่านั้น'); location.href='dashboard.html'; }
DB.init();
Nav.render('users');
let modal, pwModal;

let permModal;
window.addEventListener('DOMContentLoaded', () => {
  modal = new bootstrap.Modal(document.getElementById('userModal'));
  pwModal = new bootstrap.Modal(document.getElementById('pwModal'));
  permModal = new bootstrap.Modal(document.getElementById('permModal'));
  render();
});

function render() {
  const users = DB.getUsers();
  const logins = DB.getLogins();
  const tbody = document.getElementById('userTable');
  tbody.innerHTML = users.map((u, i) => {
    const lastLogin = logins.find(l => l.userId === u.id && l.success);
    return `<tr>
      <td class="text-muted">${i+1}</td>
      <td class="fw-semibold">${u.username}</td>
      <td>${u.name}</td>
      <td class="text-center"><span class="badge ${u.role==='admin'?'bg-danger':'bg-primary'}">${u.role==='admin'?'Admin':'User'}</span></td>
      <td class="text-center">
        <span class="badge ${u.active?'bg-success':'bg-secondary'}">${u.active?'ใช้งาน':'ระงับ'}</span>
      </td>
      <td>${Utils.formatDateTH(u.createdAt)}</td>
      <td>${lastLogin ? Utils.formatDateTimeTH(lastLogin.timestamp) : '<span class="text-muted">-</span>'}</td>
      <td class="text-center">
        <div class="btn-group btn-group-sm">
          <button class="btn btn-outline-primary" onclick="openModal('${u.id}')" title="แก้ไข"><i class="bi bi-pencil"></i></button>
          ${u.role !== 'admin' && u.id !== session.userId ? `<button class="btn btn-outline-info" onclick="openPermModal('${u.id}')" title="กำหนดสิทธิ์"><i class="bi bi-shield-lock"></i></button>` : ''}
          ${u.id===session.userId ? `<button class="btn btn-outline-warning" onclick="openPwModal()" title="เปลี่ยนรหัสผ่าน"><i class="bi bi-key"></i></button>` : ''}
          ${u.id!==session.userId ? `<button class="btn btn-outline-${u.active?'secondary':'success'}" onclick="toggleActive('${u.id}',${!u.active})" title="${u.active?'ระงับบัญชี':'เปิดใช้งาน'}">
            <i class="bi bi-${u.active?'pause':'play'}"></i></button>` : ''}
          ${u.id!==session.userId ? `<button class="btn btn-outline-danger" onclick="deleteUser('${u.id}')" title="ลบ"><i class="bi bi-trash"></i></button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

function openModal(id) {
  document.getElementById('userId').value = id || '';
  document.getElementById('modalTitle').textContent = id ? 'แก้ไขผู้ใช้' : 'เพิ่มผู้ใช้ใหม่';
  document.getElementById('modalAlert').innerHTML = '';
  const isEdit = !!id;
  document.getElementById('pwLabel').innerHTML = isEdit ? 'รหัสผ่าน' : 'รหัสผ่าน <span class="text-danger">*</span>';
  document.getElementById('pwHint').style.display = isEdit ? '' : 'none';
  if (id) {
    const u = DB.getUserById(id);
    document.getElementById('uUsername').value = u.username;
    document.getElementById('uName').value = u.name;
    document.getElementById('uPassword').value = '';
    document.getElementById('uRole').value = u.role;
    document.getElementById('uActive').checked = u.active;
  } else {
    ['uUsername','uName','uPassword'].forEach(f => document.getElementById(f).value='');
    document.getElementById('uRole').value = 'user';
    document.getElementById('uActive').checked = true;
  }
  modal.show();
}

function saveUser() {
  const id = document.getElementById('userId').value;
  const username = document.getElementById('uUsername').value.trim();
  const name = document.getElementById('uName').value.trim();
  const password = document.getElementById('uPassword').value;
  const role = document.getElementById('uRole').value;
  const active = document.getElementById('uActive').checked;

  if (!username) { Utils.showAlert('กรุณากรอกชื่อผู้ใช้', 'warning', 'modalAlert'); return; }
  if (!name) { Utils.showAlert('กรุณากรอกชื่อ-นามสกุล', 'warning', 'modalAlert'); return; }
  if (!id && !password) { Utils.showAlert('กรุณากรอกรหัสผ่าน', 'warning', 'modalAlert'); return; }
  if (password && password.length < 6) { Utils.showAlert('รหัสผ่านต้องมีอย่างน้อย 6 ตัว', 'warning', 'modalAlert'); return; }

  const existing = DB.getUserByUsername(username);
  if (existing && existing.id !== id) { Utils.showAlert('ชื่อผู้ใช้นี้มีอยู่แล้ว', 'danger', 'modalAlert'); return; }

  const data = { username, name, role, active };
  if (password) data.password = Utils.hashPassword(password);

  if (id) {
    DB.updateUser(id, data);
    DB.logActivity(session.userId, session.username, 'แก้ไขผู้ใช้', { targetUser: username });
    Utils.showAlert('บันทึกสำเร็จ');
  } else {
    DB.addUser({ id: Utils.uuid(), ...data, password: Utils.hashPassword(password), createdAt: new Date().toISOString(), mustChangePw: true });
    DB.logActivity(session.userId, session.username, 'เพิ่มผู้ใช้', { targetUser: username });
    Utils.showAlert('เพิ่มผู้ใช้สำเร็จ');
  }
  modal.hide();
  render();
}

function toggleActive(id, active) {
  const u = DB.getUserById(id);
  DB.updateUser(id, { active });
  DB.logActivity(session.userId, session.username, active?'เปิดใช้งานผู้ใช้':'ระงับผู้ใช้', { targetUser: u.username });
  Utils.showAlert(active ? 'เปิดใช้งานแล้ว' : 'ระงับบัญชีแล้ว', active ? 'success' : 'warning');
  render();
}

function deleteUser(id) {
  const u = DB.getUserById(id);
  if (!confirm(`ลบผู้ใช้ "${u.name}" (${u.username}) ใช่หรือไม่?`)) return;
  DB.deleteUser(id);
  DB.logActivity(session.userId, session.username, 'ลบผู้ใช้', { targetUser: u.username });
  Utils.showAlert('ลบผู้ใช้แล้ว', 'info');
  render();
}

function openPwModal() {
  document.getElementById('oldPw').value='';
  document.getElementById('newPw').value='';
  document.getElementById('confirmPw').value='';
  document.getElementById('pwModalAlert').innerHTML='';
  pwModal.show();
}

function changeOwnPassword() {
  const oldPw = document.getElementById('oldPw').value;
  const newPw = document.getElementById('newPw').value;
  const confirmPw = document.getElementById('confirmPw').value;
  const user = DB.getUserById(session.userId);
  if (user.password !== Utils.hashPassword(oldPw)) { Utils.showAlert('รหัสผ่านเดิมไม่ถูกต้อง','danger','pwModalAlert'); return; }
  if (newPw.length < 6) { Utils.showAlert('รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัว','warning','pwModalAlert'); return; }
  if (newPw !== confirmPw) { Utils.showAlert('รหัสผ่านใหม่ไม่ตรงกัน','warning','pwModalAlert'); return; }
  DB.updateUser(session.userId, { password: Utils.hashPassword(newPw) });
  DB.logActivity(session.userId, session.username, 'เปลี่ยนรหัสผ่าน', {});
  pwModal.hide();
  Utils.showAlert('เปลี่ยนรหัสผ่านสำเร็จ');
}

function togglePw(inputId, iconId) {
  const el = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  el.type = el.type === 'password' ? 'text' : 'password';
  icon.className = el.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}

/* ─── Permission Modal ─────────────────────────────────── */
function openPermModal(userId) {
  const u = DB.getUserById(userId);
  if (!u) return;
  document.getElementById('permUserId').value = userId;
  document.getElementById('permModalName').textContent = `${u.name} (${u.username})`;
  document.getElementById('permModalAlert').innerHTML = '';

  const userPerms = u.permissions || [];

  // Group perms
  const groups = {};
  Auth.PERMS.forEach(p => {
    if (!groups[p.group]) groups[p.group] = [];
    groups[p.group].push(p);
  });

  const groupColors = { 'ใบกำกับ': 'primary', 'ทั่วไป': 'secondary' };

  let html = '';
  Object.entries(groups).forEach(([groupName, perms]) => {
    const color = groupColors[groupName] || 'secondary';
    html += `<div class="mb-3">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="badge bg-${color}">${groupName}</span>
        <hr class="flex-grow-1 m-0">
      </div>
      <div class="row g-2">`;
    perms.forEach(p => {
      const checked = userPerms.includes(p.key) ? 'checked' : '';
      html += `
        <div class="col-6 col-md-4">
          <div class="form-check">
            <input class="form-check-input perm-check" type="checkbox" id="perm_${p.key}" value="${p.key}" ${checked}>
            <label class="form-check-label" for="perm_${p.key}">${p.label}</label>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('permCheckboxes').innerHTML = html;
  permModal.show();
}

function selectAllPerms(checked) {
  document.querySelectorAll('.perm-check').forEach(cb => { cb.checked = checked; });
}

function savePermissions() {
  const userId = document.getElementById('permUserId').value;
  const selected = Array.from(document.querySelectorAll('.perm-check:checked')).map(cb => cb.value);
  const u = DB.getUserById(userId);

  DB.updateUser(userId, { permissions: selected });

  // If this is the current user's own session data, refresh session
  // (won't apply until next login; note this in the alert)

  DB.logActivity(session.userId, session.username, 'แก้ไขสิทธิ์ผู้ใช้', { targetUser: u.username, permissions: selected });
  permModal.hide();
  Utils.showAlert(`บันทึกสิทธิ์ของ "${u.name}" สำเร็จ — จะมีผลเมื่อผู้ใช้เข้าสู่ระบบใหม่`, 'success');
  render();
}
</script>
</body>
</html>
