<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0d6efd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ใบกำกับ">
<title>ใบกำกับสินค้า</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
</head>
<body>
<div id="navContainer"></div>
<div class="page-wrap">
  <div class="d-flex justify-content-between align-items-center mb-3 page-header">
    <h5 class="mb-0 fw-bold"><i class="bi bi-receipt me-2 text-primary"></i>รายการใบกำกับสินค้า</h5>
    <div class="d-flex gap-2">
      <button id="selModeBtn" class="btn btn-outline-secondary btn-sm d-none" onclick="toggleSelMode()">
        <i class="bi bi-check2-square me-1"></i>เลือก
      </button>
      <a href="invoice-create.html" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i>สร้างใบใหม่</a>
    </div>
  </div>
  <div id="alertBox" class="mb-2"></div>

  <!-- Selection toolbar -->
  <div id="selToolbar" class="mb-2 alert alert-primary py-2 d-flex align-items-center gap-2 flex-wrap" style="display:none!important">
    <input type="checkbox" id="selAllChk" style="width:16px;height:16px;accent-color:#0d6efd;cursor:pointer"
           onchange="toggleAllSel(this.checked)" title="เลือก/ยกเลิกทั้งหมด">
    <span id="selLabel" class="fw-semibold small">เลือก 0 รายการ</span>
    <div class="ms-auto d-flex gap-2 flex-wrap">
      <button class="btn btn-sm btn-light border" onclick="toggleAllSel(true)">เลือกทั้งหมด</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="clearSel()">ยกเลิก</button>
      <button class="btn btn-sm btn-danger" id="bulkDelBtn" disabled onclick="confirmBulkDelete()">
        <i class="bi bi-trash me-1"></i>ลบที่เลือก (<span id="bulkDelCount">0</span>)
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="card mb-3 filter-bar">
    <div class="card-body py-2">
      <div class="row g-2">
        <div class="col-md-3">
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="searchInput" class="form-control" placeholder="เลขที่ / ชื่อลูกค้า...">
          </div>
        </div>
        <div class="col-md-3">
          <select id="filterCustomer" class="form-select form-select-sm">
            <option value="">— ลูกค้าทั้งหมด —</option>
          </select>
        </div>
        <div class="col-md-2">
          <select id="filterStatus" class="form-select form-select-sm">
            <option value="">— สถานะทั้งหมด —</option>
            <option value="pending">ค้างชำระ</option>
            <option value="partial">ชำระบางส่วน</option>
            <option value="paid">ชำระแล้ว</option>
          </select>
        </div>
        <div class="col-6 col-md-2">
          <input type="text" id="filterFrom" class="form-control form-control-sm" placeholder="DD/MM/YYYY">
        </div>
        <div class="col-6 col-md-2">
          <input type="text" id="filterTo" class="form-control form-control-sm" placeholder="DD/MM/YYYY">
        </div>
        <div class="col-12 col-md-auto">
          <button class="btn btn-outline-secondary btn-sm w-100" onclick="clearFilters()">
            <i class="bi bi-x-lg me-1"></i>ล้าง
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Summary -->
  <div class="row g-2 mb-3">
    <div class="col-4"><div class="card text-center py-2"><div class="fw-bold text-primary" id="sumTotal">฿0</div><div class="small text-muted">ยอดรวม</div></div></div>
    <div class="col-4"><div class="card text-center py-2"><div class="fw-bold text-success" id="sumPaid">฿0</div><div class="small text-muted">ชำระแล้ว</div></div></div>
    <div class="col-4"><div class="card text-center py-2"><div class="fw-bold text-danger" id="sumUnpaid">฿0</div><div class="small text-muted">ค้างชำระ</div></div></div>
  </div>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th id="thChk" class="d-none" style="width:36px"></th>
            <th class="sort-th" onclick="setSort('num')">เลขที่ <span id="si_num"></span></th>
            <th class="sort-th" onclick="setSort('date')">วันที่ <span id="si_date">▼</span></th>
            <th class="sort-th" onclick="setSort('cust')">ลูกค้า <span id="si_cust"></span></th>
            <th class="sort-th d-none d-md-table-cell" onclick="setSort('ship')">จัดส่ง <span id="si_ship"></span></th>
            <th class="sort-th text-end d-none d-md-table-cell" onclick="setSort('total')">ยอดรวม <span id="si_total"></span></th>
            <th class="sort-th text-end d-none d-md-table-cell" onclick="setSort('paid')">ชำระแล้ว <span id="si_paid"></span></th>
            <th class="sort-th text-end" onclick="setSort('rem')">ค้าง <span id="si_rem"></span></th>
            <th class="sort-th text-center" onclick="setSort('status')">สถานะ <span id="si_status"></span></th>
            <th id="thActions" class="text-center">จัดการ</th>
          </tr>
        </thead>
        <tbody id="invoiceTable"><tr><td colspan="6" class="text-center text-muted py-4">ยังไม่มีใบกำกับ</td></tr></tbody>
      </table>
    </div>
    <div id="invPagination" class="d-flex justify-content-between align-items-center px-3 py-2 border-top small text-muted" style="display:none!important"></div>
  </div>
</div>

<!-- Bulk Delete Confirm Modal -->
<div class="modal fade" id="bulkDelModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content border-danger">
      <div class="modal-header bg-danger text-white py-2">
        <h6 class="modal-title fw-bold"><i class="bi bi-exclamation-triangle-fill me-1"></i>ยืนยันการลบหลายรายการ</h6>
      </div>
      <div class="modal-body">
        <p class="mb-2">คุณกำลังจะลบ <strong id="bulkDelModalCount"></strong> ใบกำกับ</p>
        <p class="text-danger small mb-0"><i class="bi bi-exclamation-circle me-1"></i>การลบไม่สามารถกู้คืนได้ และจะลบข้อมูลการชำระเงินที่เกี่ยวข้องทั้งหมดด้วย</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
        <button class="btn btn-danger fw-semibold" onclick="executeBulkDelete()">
          <i class="bi bi-trash me-1"></i>ลบทั้งหมดเลย
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="utils.js"></script><script src="db.js"></script><script src="auth.js"></script><script src="nav.js"></script><script src="idb.js"></script><script src="bedate.js"></script>
<script>
const session = Auth.require();
DB.init();
Nav.render('invoices');

// ── Bulk select state ─────────────────────────────────────────────────────────
let _selMode = false;

function toggleSelMode() {
  _selMode = !_selMode;
  const btn       = document.getElementById('selModeBtn');
  const toolbar   = document.getElementById('selToolbar');
  const thChk     = document.getElementById('thChk');
  const thActions = document.getElementById('thActions');

  if (_selMode) {
    btn.classList.add('active', 'btn-primary');
    btn.classList.remove('btn-outline-secondary');
    toolbar.style.removeProperty('display');
    thChk.classList.remove('d-none');
    if (thActions) thActions.classList.add('d-none');
  } else {
    btn.classList.remove('active', 'btn-primary');
    btn.classList.add('btn-outline-secondary');
    toolbar.style.setProperty('display', 'none', 'important');
    thChk.classList.add('d-none');
    if (thActions) thActions.classList.remove('d-none');
    clearSel();
  }
  render();
}

function onInvChkChange() {
  updateSelCount();
}

function updateSelCount() {
  const chks  = document.querySelectorAll('.inv-chk:checked');
  const total = document.querySelectorAll('.inv-chk');
  const n = chks.length;
  document.getElementById('selLabel').textContent   = 'เลือก ' + n + ' รายการ';
  document.getElementById('bulkDelCount').textContent = n;
  document.getElementById('bulkDelBtn').disabled    = n === 0;
  // Highlight selected rows
  document.querySelectorAll('#invoiceTable tr[data-num]').forEach(tr => {
    const chk = tr.querySelector('.inv-chk');
    if (chk) tr.classList.toggle('table-danger', chk.checked);
  });
  // Sync header checkbox state
  const allChk = document.getElementById('selAllChk');
  if (allChk) {
    allChk.checked       = n > 0 && n === total.length;
    allChk.indeterminate = n > 0 && n < total.length;
  }
}

function toggleAllSel(v) {
  document.querySelectorAll('.inv-chk').forEach(c => c.checked = v);
  updateSelCount();
}

function clearSel() {
  document.querySelectorAll('.inv-chk').forEach(c => c.checked = false);
  updateSelCount();
}

function confirmBulkDelete() {
  const nums = [...document.querySelectorAll('.inv-chk:checked')].map(c => c.dataset.num);
  if (!nums.length) return;
  document.getElementById('bulkDelModalCount').textContent = nums.length;
  new bootstrap.Modal(document.getElementById('bulkDelModal')).show();
}

function executeBulkDelete() {
  const nums = new Set([...document.querySelectorAll('.inv-chk:checked')].map(c => c.dataset.num));
  if (!nums.size) return;
  bootstrap.Modal.getInstance(document.getElementById('bulkDelModal'))?.hide();

  // Delete invoices + associated payments + cap deductions
  const allInvoices = DB.getInvoices().filter(i => !nums.has(i.invoiceNumber));
  DB.saveInvoices(allInvoices);
  const allPayments = DB.getPayments().filter(p => !nums.has(p.invoiceNumber));
  DB.savePayments(allPayments);
  nums.forEach(num => DB.removeCapDeductionsByInvoice(num));

  // Log activity
  DB.logActivity(session.userId, session.username, 'ลบใบกำกับ (หลายรายการ)', { invoiceNumbers: [...nums] });

  Utils.showAlert(`ลบ ${nums.size} ใบกำกับแล้ว`, 'warning');
  _selMode = false;
  document.getElementById('selModeBtn').classList.remove('active','btn-primary');
  document.getElementById('selModeBtn').classList.add('btn-outline-secondary');
  document.getElementById('selToolbar').style.setProperty('display', 'none', 'important');
  document.getElementById('thChk').classList.add('d-none');
  render();
}

window.addEventListener('DOMContentLoaded', () => {
  // Show select-mode button for users with delete permission
  if (Auth.can('invoice_delete')) {
    document.getElementById('selModeBtn').classList.remove('d-none');
  }

  const customers = DB.getCustomers();
  const custSel = document.getElementById('filterCustomer');
  custSel.innerHTML = '<option value="">— ลูกค้าทั้งหมด —</option>' +
    customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  const params = new URLSearchParams(location.search);
  if (params.get('cust')) custSel.value = params.get('cust');
  if (params.get('num')) document.getElementById('searchInput').value = params.get('num');

  ['searchInput','filterCustomer','filterStatus'].forEach(id =>
    document.getElementById(id).addEventListener('change', () => { _invPage = 1; render(); }));
  document.getElementById('searchInput').addEventListener('input', Utils.debounce(() => { _invPage = 1; render(); }, 200));
  BEDate.byId('filterFrom', { onChange: () => { _invPage = 1; render(); } });
  BEDate.byId('filterTo',   { onChange: () => { _invPage = 1; render(); } });
  render();
});

const INV_PAGE_SIZE = 30;
let _invPage = 1;
let _sortCol = 'date', _sortDir = -1;

function clearFilters() {
  ['searchInput','filterCustomer','filterStatus'].forEach(id => document.getElementById(id).value = '');
  ['filterFrom','filterTo'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    if (el._flatpickr) el._flatpickr.clear();
  });
  _invPage = 1;
  render();
}

function setSort(col) {
  if (_sortCol === col) _sortDir = -_sortDir; else { _sortCol = col; _sortDir = -1; }
  _invPage = 1; render();
}
const _pdfInvMap = {};

function sanitizeFilename(s) {
  return String(s||'').replace(/[:*?"<>|\x00-\x1f]/g,'_').replace(/_+/g,'_').trim();
}

async function viewPdfInvoice(num) {
  const inv = _pdfInvMap[num];
  if (!inv) return;
  // Drive-backed PDF
  if (inv.driveFileId) {
    window.open('https://drive.google.com/file/d/' + inv.driveFileId + '/view', '_blank');
    return;
  }
  // Local IDB directory
  try {
    const handle = await IDB.get('pdf_dir');
    if (!handle) { alert('ไม่พบโฟลเดอร์ PDF ที่บันทึกไว้\nกรุณาตั้งค่าโฟลเดอร์ในหน้าเชื่อมต่อ'); return; }
    const perm = await handle.requestPermission({ mode: 'read' });
    if (perm !== 'granted') { alert('ไม่ได้รับสิทธิ์เข้าถึงโฟลเดอร์ PDF'); return; }
    const custName = inv.customerName || (DB.getCustomers().find(c => c.id === inv.customerId)?.name) || 'unknown';
    const fn = sanitizeFilename(custName) + '_' + sanitizeFilename(num) + '.pdf';
    const fileHandle = await handle.getFileHandle(fn);
    const file = await fileHandle.getFile();
    const url = URL.createObjectURL(file);
    const w = window.open(url, '_blank');
    if (!w) { alert('กรุณาอนุญาต popup เพื่อดู PDF'); }
    setTimeout(() => URL.revokeObjectURL(url), 120000);
  } catch(e) {
    console.error('[viewPdfInvoice]', e);
    alert('ไม่พบไฟล์ PDF: ' + (e.message || e));
  }
}

function statusInfo(paid, total) {
  if (paid >= total && total > 0) return { key:'paid', label:'ชำระแล้ว', cls:'badge-paid' };
  if (paid > 0) return { key:'partial', label:'ชำระบางส่วน', cls:'badge-partial' };
  return { key:'pending', label:'ค้างชำระ', cls:'badge-pending' };
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fc = document.getElementById('filterCustomer').value;
  const fs = document.getElementById('filterStatus').value;
  const from = Utils.parseBEToISO(document.getElementById('filterFrom').value);
  const to   = Utils.parseBEToISO(document.getElementById('filterTo').value);

  const allInvoices = DB.getInvoices();
  const customers   = DB.getCustomers();

  // ── Build lookup maps once (O(n)) instead of per-row (O(n²)) ───────────────
  // customer map: id → customer object
  const custMap = Object.fromEntries(customers.map(c => [c.id, c]));
  // paid amount map: invoiceNumber → total paid (non-cancelled)
  const paidMap = {};
  for (const p of DB.getPayments()) {
    if (!p.cancelled) paidMap[p.invoiceNumber] = (paidMap[p.invoiceNumber] || 0) + (parseFloat(p.amount) || 0);
  }
  // page count map: invoiceNumber → number of pages
  const pageCountMap = {};
  for (const inv of allInvoices) pageCountMap[inv.invoiceNumber] = (pageCountMap[inv.invoiceNumber] || 0) + 1;

  const seen = new Map();
  for (const inv of allInvoices) {
    if (!seen.has(inv.invoiceNumber)) seen.set(inv.invoiceNumber, inv);
  }

  let list = [...seen.values()];
  list = list.filter(inv => {
    const cust  = custMap[inv.customerId];
    const paid  = paidMap[inv.invoiceNumber] || 0;
    const total = parseFloat(inv.totalAmount) || 0;
    const si    = statusInfo(paid, total);
    const d     = new Date(inv.createdAt);
    if (q && !inv.invoiceNumber.toLowerCase().includes(q) && !(cust && cust.name.toLowerCase().includes(q))) return false;
    if (fc && inv.customerId !== fc) return false;
    if (fs && si.key !== fs) return false;
    if (from && d < new Date(from)) return false;
    if (to && d > new Date(to + 'T23:59:59')) return false;
    return true;
  });

  // Update sort indicators
  ['num','date','cust','ship','total','paid','rem','status'].forEach(k => {
    const el = document.getElementById('si_' + k);
    if (el) el.textContent = k === _sortCol ? (_sortDir === 1 ? '▲' : '▼') : '';
  });

  list.sort((a, b) => {
    const pa = paidMap[a.invoiceNumber] || 0;
    const pb = paidMap[b.invoiceNumber] || 0;
    const ta = parseFloat(a.totalAmount) || 0;
    const tb = parseFloat(b.totalAmount) || 0;
    let cmp = 0;
    switch (_sortCol) {
      case 'num':    cmp = a.invoiceNumber.localeCompare(b.invoiceNumber, 'th'); break;
      case 'date':   cmp = new Date(a.createdAt) - new Date(b.createdAt); break;
      case 'cust':   cmp = (custMap[a.customerId]?.name||'').localeCompare(custMap[b.customerId]?.name||'', 'th'); break;
      case 'ship':   cmp = (a.shippingMethod||'').localeCompare(b.shippingMethod||'', 'th'); break;
      case 'total':  cmp = ta - tb; break;
      case 'paid':   cmp = pa - pb; break;
      case 'rem':    cmp = (ta - pa) - (tb - pb); break;
      case 'status': cmp = statusInfo(pa,ta).key.localeCompare(statusInfo(pb,tb).key); break;
      default:       cmp = new Date(a.createdAt) - new Date(b.createdAt);
    }
    return cmp * _sortDir;
  });

  // Rebuild PDF map for current filtered list
  list.forEach(inv => { if (inv.importedFrom === 'pdf') _pdfInvMap[inv.invoiceNumber] = inv; });

  // Summary totals (all filtered, not just current page)
  let sumTotal = 0, sumPaid = 0;
  for (const inv of list) {
    const total = parseFloat(inv.totalAmount) || 0;
    const paid  = paidMap[inv.invoiceNumber] || 0;
    sumTotal += total; sumPaid += Math.min(paid, total);
  }
  document.getElementById('sumTotal').textContent   = '฿' + Utils.formatNumber(sumTotal);
  document.getElementById('sumPaid').textContent    = '฿' + Utils.formatNumber(sumPaid);
  document.getElementById('sumUnpaid').textContent  = '฿' + Utils.formatNumber(Math.max(0, sumTotal - sumPaid));

  const tbody = document.getElementById('invoiceTable');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">ไม่พบใบกำกับ</td></tr>';
    document.getElementById('invPagination').style.display = 'none';
    return;
  }

  // Pagination
  const totalPages = Math.ceil(list.length / INV_PAGE_SIZE);
  if (_invPage > totalPages) _invPage = totalPages;
  const pageList = list.slice((_invPage - 1) * INV_PAGE_SIZE, _invPage * INV_PAGE_SIZE);

  tbody.innerHTML = pageList.map(inv => {
    const cust      = custMap[inv.customerId];
    const total     = parseFloat(inv.totalAmount) || 0;
    const paid      = paidMap[inv.invoiceNumber] || 0;
    const remaining = Math.max(0, total - paid);
    const si        = statusInfo(paid, total);
    const pages     = pageCountMap[inv.invoiceNumber] || 1;
    return `<tr data-num="${inv.invoiceNumber}">
      <td class="text-center sel-chk-cell ${_selMode ? '' : 'd-none'}">
        <input type="checkbox" class="inv-chk" data-num="${inv.invoiceNumber}"
               style="width:15px;height:15px;accent-color:#dc3545;cursor:pointer"
               onchange="onInvChkChange()">
      </td>
      <td><a href="invoice-create.html?view=${inv.invoiceNumber}" class="fw-semibold text-decoration-none">${inv.invoiceNumber}</a>
        ${pages > 1 ? `<span class="badge bg-secondary ms-1">${pages} หน้า</span>` : ''}
      </td>
      <td>${Utils.formatDateTH(inv.createdAt)}</td>
      <td>${cust ? cust.name : '-'}</td>
      <td class="d-none d-md-table-cell"><span class="badge bg-light text-dark border">${inv.shippingMethod||'-'}</span></td>
      <td class="text-end d-none d-md-table-cell">฿${Utils.formatNumber(total)}</td>
      <td class="text-end text-success d-none d-md-table-cell">฿${Utils.formatNumber(paid)}</td>
      <td class="text-end ${remaining>0?'text-danger fw-semibold':'text-muted'}">฿${Utils.formatNumber(remaining)}</td>
      <td class="text-center"><span class="badge ${si.cls}">${si.label}</span></td>
      <td class="text-center sel-action-cell${_selMode ? ' d-none' : ''}">
        <div class="btn-group btn-group-sm">
          <a class="btn btn-outline-primary" href="invoice-create.html?view=${inv.invoiceNumber}" title="ดู/พิมพ์"><i class="bi bi-eye"></i></a>
          ${inv.importedFrom === 'pdf' ? `<button class="btn btn-outline-danger" onclick="viewPdfInvoice('${inv.invoiceNumber}')" title="ดูไฟล์ PDF ต้นฉบับ"><i class="bi bi-file-earmark-pdf"></i></button>` : ''}
          <a class="btn btn-outline-warning" href="invoice-create.html?edit=${inv.invoiceNumber}" title="แก้ไข"><i class="bi bi-pencil"></i></a>
          <a class="btn btn-outline-success" href="payments.html?inv=${inv.invoiceNumber}" title="ชำระเงิน"><i class="bi bi-cash-coin"></i></a>
          <button class="btn btn-outline-danger" onclick="deleteInvoice('${inv.invoiceNumber}')" title="ลบ"><i class="bi bi-trash"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');

  // Render pagination bar
  const pg = document.getElementById('invPagination');
  if (totalPages <= 1) { pg.style.display = 'none'; return; }
  pg.style.display = '';
  pg.innerHTML = `
    <span>แสดง ${(_invPage-1)*INV_PAGE_SIZE+1}–${Math.min(_invPage*INV_PAGE_SIZE, list.length)} จาก ${list.length} รายการ</span>
    <div class="d-flex gap-1 align-items-center">
      <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="_invPage=1;render()" ${_invPage===1?'disabled':''}>«</button>
      <button class="btn btn-sm btn-outline-secondary py-
