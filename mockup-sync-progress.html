<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mockup: Sync Progress</title>
<link rel="stylesheet" href="./vendor/bootstrap.min.css">
<link rel="stylesheet" href="./vendor/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Sarabun', sans-serif; background: #f8f9fa; }

  /* ── Sync Progress Overlay ── */
  #syncOverlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .sync-card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 32px;
    width: 420px;
    max-width: 95vw;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  }
  .sync-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #0d6efd;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .sync-subtitle {
    font-size: 0.82rem;
    color: #6c757d;
    margin-bottom: 20px;
  }
  .progress { height: 10px; border-radius: 8px; }
  .progress-bar { transition: width 0.4s ease; }
  .sync-percent {
    font-size: 1.4rem;
    font-weight: 700;
    color: #0d6efd;
    text-align: right;
    min-width: 52px;
  }
  .sync-current-label {
    font-size: 0.9rem;
    color: #495057;
    margin-top: 10px;
    min-height: 22px;
  }
  .sync-current-label .badge-action {
    font-size: 0.72rem;
    padding: 2px 7px;
    border-radius: 20px;
  }

  /* ── Item checklist ── */
  .sync-list {
    margin-top: 16px;
    max-height: 200px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .sync-list::-webkit-scrollbar { width: 4px; }
  .sync-list::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 4px; }
  .sync-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  .sync-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.88rem;
    color: #495057;
  }
  .sync-item:last-child { border-bottom: none; }
  .sync-item .icon {
    width: 22px;
    text-align: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .sync-item .item-name { flex: 1; }
  .sync-item .item-status {
    font-size: 0.75rem;
    color: #adb5bd;
    min-width: 60px;
    text-align: right;
  }
  .sync-item.done .icon { color: #198754; }
  .sync-item.done .item-name { color: #212529; }
  .sync-item.done .item-status { color: #198754; }
  .sync-item.active .icon { color: #0d6efd; }
  .sync-item.active .item-name { color: #0d6efd; font-weight: 600; }
  .sync-item.active .item-status { color: #0d6efd; }
  .sync-item.merge-action .item-status { color: #fd7e14; font-weight: 600; }
  .sync-item.pending .icon { color: #dee2e6; }
  .sync-item.pending .item-name { color: #adb5bd; }

  .spinner-sm {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #c8d8ff;
    border-top-color: #0d6efd;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Done state ── */
  .sync-done-icon { font-size: 2.5rem; color: #198754; }
  .sync-done-title { font-size: 1.1rem; font-weight: 700; color: #198754; }

  /* ── Demo controls ── */
  .demo-controls {
    position: fixed; bottom: 20px; right: 20px;
    display: flex; gap: 8px; z-index: 10000;
  }

  /* page behind overlay */
  .fake-page {
    padding: 40px;
    opacity: 0.3;
  }
</style>
</head>
<body>

<!-- Fake page content behind overlay -->
<div class="fake-page">
  <h4>Dashboard</h4>
  <p>เนื้อหาหน้าแดชบอร์ด...</p>
</div>

<!-- ── Sync Progress Overlay ── -->
<div id="syncOverlay">
  <div class="sync-card">

    <!-- Header -->
    <div class="sync-title">
      <span class="spinner-sm" id="headerSpinner"></span>
      <span id="headerTitle">กำลังซิงค์ข้อมูล...</span>
    </div>
    <div class="sync-subtitle" id="headerSubtitle">กำลังดึงข้อมูลล่าสุดจากเซิร์ฟเวอร์ โปรดรอสักครู่</div>

    <!-- Progress bar row -->
    <div class="d-flex align-items-center gap-3 mb-1">
      <div class="progress flex-grow-1">
        <div class="progress-bar bg-primary" id="mainBar" role="progressbar" style="width: 0%"></div>
      </div>
      <div class="sync-percent" id="percentText">0%</div>
    </div>

    <!-- Current item label -->
    <div class="sync-current-label" id="currentLabel">
      <span class="spinner-sm"></span>
      <span id="currentLabelText"> เริ่มต้น...</span>
    </div>

    <!-- Item list -->
    <div class="sync-list" id="syncList"></div>

  </div>
</div>

<!-- Demo controls -->
<div class="demo-controls">
  <button class="btn btn-sm btn-secondary" onclick="resetDemo()">↺ รีเซ็ต</button>
  <button class="btn btn-sm btn-primary" onclick="runDemo()">▶ เล่น Demo</button>
</div>

<script>
// ── Sync items definition ──
const SYNC_ITEMS = [
  { key: 'wt_customers',         label: 'ลูกค้า',             icon: 'bi-people-fill',       type: 'doc' },
  { key: 'wt_products',          label: 'สินค้า',             icon: 'bi-box-seam-fill',     type: 'doc' },
  { key: 'wt_pricing',           label: 'ราคาพิเศษ',          icon: 'bi-tag-fill',          type: 'doc' },
  { key: 'wt_settings',          label: 'การตั้งค่า',          icon: 'bi-gear-fill',         type: 'doc' },
  { key: 'wt_users',             label: 'ผู้ใช้งาน',           icon: 'bi-person-badge-fill', type: 'doc' },
  { key: 'wt_returns',           label: 'การคืนสินค้า',        icon: 'bi-arrow-return-left', type: 'doc' },
  { key: 'wt_pay_methods',       label: 'วิธีชำระเงิน',        icon: 'bi-credit-card-fill',  type: 'doc' },
  { key: 'wt_transfer_accounts', label: 'บัญชีรับโอน',         icon: 'bi-bank',              type: 'doc' },
  { key: 'wt_cap_colors',        label: 'สต๊อกฝา',            icon: 'bi-droplet-half',      type: 'doc' },
  { key: 'wt_price_history',     label: 'ประวัติราคา',         icon: 'bi-clock-history',     type: 'doc' },
  { key: 'wt_versions',          label: 'บันทึกเวอร์ชัน',      icon: 'bi-journal-text',      type: 'doc' },
  { key: 'wt_inv_counter',       label: 'เลขที่ใบกำกับ',       icon: 'bi-hash',              type: 'doc' },
  { key: 'invoices',             label: 'ใบกำกับ (6 เดือน)',   icon: 'bi-receipt',           type: 'col' },
  { key: 'payments',             label: 'การชำระเงิน (6 เดือน)', icon: 'bi-cash-coin',       type: 'col' },
];

// Simulate some items having merge actions
const MOCK_ACTIONS = {
  'wt_customers':   { status: 'อัปเดต 3 รายการ',  merge: false },
  'wt_settings':    { status: 'ซิงค์แล้ว',        merge: false },
  'wt_users':       { status: 'ซิงค์แล้ว',        merge: false },
  'invoices':       { status: 'รวม 12 รายการ',    merge: true  },
  'payments':       { status: 'รวม 5 รายการ',     merge: true  },
};

function buildList() {
  const list = document.getElementById('syncList');
  list.innerHTML = '';
  SYNC_ITEMS.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'sync-item pending';
    div.id = 'item-' + item.key;
    div.innerHTML = `
      <span class="icon"><i class="bi ${item.icon}"></i></span>
      <span class="item-name">${item.label}</span>
      <span class="item-status" id="status-${item.key}">รอ...</span>
    `;
    list.appendChild(div);
  });
}

function setItemActive(key) {
  const el = document.getElementById('item-' + key);
  if (!el) return;
  el.className = 'sync-item active';
  const statusEl = document.getElementById('status-' + key);
  statusEl.innerHTML = '<span class="spinner-sm"></span>';
}

function setItemDone(key, action) {
  const el = document.getElementById('item-' + key);
  if (!el) return;
  const isMerge = action && action.merge;
  el.className = 'sync-item done' + (isMerge ? ' merge-action' : '');
  const iconEl = el.querySelector('.icon i');
  iconEl.className = 'bi bi-check-circle-fill';
  const statusEl = document.getElementById('status-' + key);
  statusEl.textContent = (action && action.status) || 'ซิงค์แล้ว';
  // scroll into view
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setPercent(pct) {
  document.getElementById('mainBar').style.width = pct + '%';
  document.getElementById('percentText').textContent = pct + '%';
}

function setCurrentLabel(text, type) {
  const label = document.getElementById('currentLabel');
  const badgeColor = type === 'merge' ? 'bg-warning text-dark' : 'bg-primary text-white';
  const badgeText  = type === 'merge' ? 'รวมข้อมูล' : 'ดึงข้อมูล';
  label.innerHTML = `
    <span class="spinner-sm"></span>
    <span class="ms-1">${text}</span>
    <span class="badge badge-action ms-1 ${badgeColor}">${badgeText}</span>
  `;
}

function showDone(merged, updated) {
  const card = document.querySelector('.sync-card');
  const spinner = document.getElementById('headerSpinner');
  spinner.style.display = 'none';
  document.getElementById('headerTitle').innerHTML = '<span style="color:#198754">ซิงค์เสร็จสมบูรณ์</span>';
  document.getElementById('headerSubtitle').textContent = `อัปเดต ${updated} รายการ · รวมข้อมูล ${merged} ชุด`;
  document.getElementById('currentLabel').innerHTML = `
    <i class="bi bi-check-circle-fill text-success me-1"></i>
    <span class="text-success fw-semibold">ข้อมูลทันสมัยแล้ว</span>
  `;
  setPercent(100);
  setTimeout(() => {
    document.getElementById('syncOverlay').style.opacity = '0';
    document.getElementById('syncOverlay').style.transition = 'opacity 0.5s';
    setTimeout(() => {
      document.getElementById('syncOverlay').style.display = 'none';
    }, 500);
  }, 1500);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runDemo() {
  // Reset first
  resetDemo(false);
  await sleep(200);

  let mergeCount = 0;
  let updateCount = 0;

  for (let i = 0; i < SYNC_ITEMS.length; i++) {
    const item = SYNC_ITEMS[i];
    const pctStart = Math.round((i / SYNC_ITEMS.length) * 100);
    const pctEnd   = Math.round(((i + 1) / SYNC_ITEMS.length) * 100);
    const action   = MOCK_ACTIONS[item.key];

    setPercent(pctStart);
    setItemActive(item.key);

    const isMerge = action && action.merge;
    setCurrentLabel(`${item.label}`, isMerge ? 'merge' : 'fetch');

    // Simulate fetch time (collections take longer)
    await sleep(item.type === 'col' ? 700 : 280);

    setItemDone(item.key, action);
    setPercent(pctEnd);

    if (isMerge) mergeCount++;
    if (action && action.status && action.status !== 'ซิงค์แล้ว') updateCount++;
  }

  showDone(mergeCount, updateCount);
}

function resetDemo(showOverlay = true) {
  document.getElementById('syncOverlay').style.display = showOverlay ? 'flex' : 'flex';
  document.getElementById('syncOverlay').style.opacity = '1';
  document.getElementById('syncOverlay').style.transition = '';
  document.getElementById('headerSpinner').style.display = '';
  document.getElementById('headerTitle').textContent = 'กำลังซิงค์ข้อมูล...';
  document.getElementById('headerTitle').style.color = '';
  document.getElementById('headerSubtitle').textContent = 'กำลังดึงข้อมูลล่าสุดจากเซิร์ฟเวอร์ โปรดรอสักครู่';
  document.getElementById('currentLabel').innerHTML = `<span class="spinner-sm"></span><span id="currentLabelText"> เริ่มต้น...</span>`;
  setPercent(0);
  buildList();
}

// Init
buildList();
</script>
</body>
</html>
